<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mais Frio Climatização | Catálogo Profissional</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0a192f;
            --secondary: #007aff;
            --accent: #25d366;
            --bg: #f8fafc;
            --spring: cubic-bezier(0.3, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--primary); overflow-x: hidden; width: 100%; }
        body.modal-open { overflow: hidden; height: 100vh; }

        @keyframes reveal {
            from { opacity: 0; transform: translateY(25px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes pulse-soft {
            0% { transform: translate(-50%, 0) scale(1); }
            50% { transform: translate(-50%, -6px) scale(1.03); }
            100% { transform: translate(-50%, 0) scale(1); }
        }

        header { 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px);
            padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-weight: 800; font-size: 1rem; text-transform: uppercase; }
        .logo span { color: var(--secondary); }
        
        .btn-cart-top { 
            background: var(--primary); color: white; padding: 8px 16px; border-radius: 12px; 
            cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 700;
        }

        .hero { 
            background: linear-gradient(135deg, #0a192f 0%, #112240 100%); 
            color: white; padding: 40px 6% 60px; text-align: center;
            border-bottom-left-radius: 35px; border-bottom-right-radius: 35px;
        }
        .hero h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 20px; }

        .search-area { 
            background: white; border-radius: 15px; padding: 4px 15px; 
            width: 100%; max-width: 450px; display: flex; align-items: center; 
            margin: 0 auto 25px;
        }
        .search-area input { width: 100%; padding: 12px; border: none; outline: none; }

        .tabs { display: flex; gap: 8px; justify-content: center; }
        .tab { padding: 10px 20px; background: rgba(255,255,255,0.1); border-radius: 12px; color: white; cursor: pointer; }
        .tab.active { background: white; color: var(--primary); }

        .container { padding: 25px 4% 140px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

        .card { background: white; border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; }
        .img-box { width: 100%; height: 140px; display: flex; align-items: center; justify-content: center; }
        .img-box img { max-width: 85%; max-height: 85%; object-fit: contain; }

        .card-body { padding: 12px; }
        .card h3 { font-size: 0.8rem; font-weight: 700; }
        .price { font-size: 1.1rem; font-weight: 800; }

        .btn-add { width: 100%; background: #f1f5f9; padding: 12px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo">MAIS FRIO <span>CLIMATIZAÇÃO</span></div>
    <div class="btn-cart-top" onclick="toggleCart()">
        <i class="fas fa-shopping-basket"></i> <span id="cart-count-top">0</span>
    </div>
</header>

<section class="hero">
    <h1>Peças & Serviços</h1>
    <div class="search-area">
        <input type="text" id="searchInput" placeholder="O que você precisa?" onkeyup="render()">
    </div>
    <div class="tabs">
        <div class="tab active" onclick="filter('all')">Todos</div>
        <div class="tab" onclick="filter('servico')">Serviços</div>
        <div class="tab" onclick="filter('peca')">Peças</div>
    </div>
</section>

<main class="container">
    <div class="grid" id="grid"></div>
</main>

<script>
const inventory = [
    { name: "Mão de Obra Instalação (Ar Novo)", price: 400.00, img: "Seção de Serviços.png", cat: "servico" },
    { name: "Mão de Obra Instalação (Ar Usado)", price: 250.00, img: "Seção de Serviços.png", cat: "servico" },
    { name: "Limpeza + Higienização Completa", price: 150.00, img: "ManutencaoPreventiva.png", cat: "servico" },
    { name: "Carga de Gás (Mão de Obra + Gás)", price: 200.00, img: "CargadeGas.png", cat: "servico" },

    { name: "Capacitor Duplo 25+2.5UF", price: 30.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
    { name: "Controle Ar Universal", price: 80.00, img: "ControlArUniversal.png", cat: "peca" },

    { name: "Serra Copo", price: 125.00, img: "serracopo.png", cat: "peca" }
];

let cart = [];
let currentFilter = 'all';

function render() {
    const grid = document.getElementById('grid');
    const term = document.getElementById('searchInput').value.toLowerCase();
    grid.innerHTML = "";

    inventory.filter(i => {
        return (currentFilter === 'all' || i.cat === currentFilter) &&
               i.name.toLowerCase().includes(term);
    }).forEach(item => {
        grid.innerHTML += `
        <div class="card">
            <div class="img-box">
                <img src="${item.img}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/952/952771.png'">
            </div>
            <div class="card-body">
                <h3>${item.name}</h3>
                <div class="price">R$ ${item.price.toFixed(2).replace('.',',')}</div>
                <button class="btn-add">Adicionar</button>
            </div>
        </div>`;
    });
}

function filter(c) {
    currentFilter = c;
    render();
}

window.onload = render;
</script>

</body>
</html>
