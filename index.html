<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mais Frio Climatização | Profissional</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0a192f;
            --secondary: #007aff;
            --accent: #25d366;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --spring-soft: cubic-bezier(0.23, 1, 0.32, 1);
            --spring-bounce: cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--primary); overflow-x: hidden; }
        body.modal-open { overflow: hidden; position: fixed; width: 100%; }

        /* --- ANIMAÇÕES PROFISSIONAIS --- */
        @keyframes revealItem {
            0% { opacity: 0; transform: translateY(20px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        /* --- HEADER --- */
        header { 
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 15px 6%; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-weight: 800; font-size: 1.1rem; letter-spacing: -0.5px; }
        .logo span { color: var(--secondary); }
        
        .btn-cart-top { 
            background: var(--primary); color: white; padding: 10px 20px; border-radius: 14px; 
            cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 700;
            transition: all 0.3s var(--spring-soft);
        }
        .btn-cart-top:active { transform: scale(0.9); }

        /* --- HERO --- */
        .hero { 
            background: linear-gradient(135deg, #0a192f 0%, #112240 100%); 
            color: white; padding: 60px 6% 80px; text-align: center;
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
        }
        .hero h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 25px; letter-spacing: -1px; }
        
        .search-area { 
            background: rgba(255, 255, 255, 1); border-radius: 18px; padding: 5px 15px; 
            width: 100%; max-width: 500px; display: flex; align-items: center; 
            margin: 0 auto 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
        }
        .search-area:focus-within { transform: translateY(-3px); box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
        .search-area input { width: 100%; padding: 14px; border: none; outline: none; font-size: 1rem; font-weight: 600; background: transparent; }

        .tabs { display: flex; gap: 10px; justify-content: center; overflow-x: auto; padding: 5px; scrollbar-width: none; }
        .tab { padding: 10px 24px; background: rgba(255,255,255,0.08); border-radius: 12px; font-size: 0.85rem; font-weight: 700; cursor: pointer; white-space: nowrap; color: white; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s var(--spring-soft); }
        .tab.active { background: white; color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        /* --- GRID & CARDS --- */
        .container { padding: 40px 5% 150px; max-width: 1400px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; } }

        .card { 
            background: var(--card-bg); border-radius: 24px; overflow: hidden; display: flex; 
            flex-direction: column; transition: all 0.5s var(--spring-soft); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
            opacity: 0; animation: revealItem 0.6s var(--spring-soft) forwards;
        }
        .card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 30px 60px rgba(0,0,0,0.08); }

        .img-box { width: 100%; height: 180px; position: relative; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .img-box img { max-width: 90%; max-height: 90%; object-fit: contain; transition: transform 0.5s var(--spring-soft); }
        .card:hover .img-box img { transform: scale(1.1); }
        
        .badge { position: absolute; top: 15px; left: 15px; padding: 6px 12px; border-radius: 10px; font-size: 0.6rem; font-weight: 800; color: white; text-transform: uppercase; letter-spacing: 0.5px; z-index: 5; }
        .badge.peca { background: var(--secondary); }
        .badge.servico { background: var(--accent); }

        .card-body { padding: 18px; text-align: left; flex: 1; display: flex; flex-direction: column; }
        .card h3 { font-size: 0.9rem; font-weight: 700; min-height: 40px; margin-bottom: 8px; color: var(--primary); line-height: 1.3; }
        .price { font-size: 1.3rem; font-weight: 800; color: var(--primary); margin-bottom: 15px; display: block; }
        
        .btn-add { width: 100%; background: #f1f5f9; padding: 14px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; transition: all 0.3s; font-size: 0.8rem; color: var(--primary); }
        .btn-add:hover { background: var(--primary); color: white; }
        .btn-add:active { transform: scale(0.95); }

        /* --- CARRINHO --- */
        #sideCart { 
            position: fixed; right: -100%; top: 0; width: 92%; max-width: 420px; height: 100%; 
            background: white; z-index: 2000; transition: transform 0.6s var(--spring-soft); 
            display: flex; flex-direction: column; box-shadow: -20px 0 60px rgba(0,0,0,0.1);
        }
        #sideCart.open { transform: translateX(-100%); right: -100%; /* Ajuste para animação fluida */ }
        /* Simplificando o movimento do carrinho */
        #sideCart.open { right: 0; }

        .cart-header { padding: 25px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
        
        .cart-item { 
            background: #f8fafc; padding: 15px; border-radius: 18px; margin-bottom: 12px; 
            display: flex; justify-content: space-between; align-items: center;
            animation: revealItem 0.4s var(--spring-soft);
        }

        .cart-footer { padding: 25px; border-top: 1px solid #f1f5f9; background: white; }
        .premium-input { width: 100%; padding: 14px; border-radius: 14px; border: 2px solid #f1f5f9; margin-bottom: 12px; font-weight: 600; outline: none; transition: 0.3s; }
        .premium-input:focus { border-color: var(--secondary); background: #fff; }

        #pix-info { 
            display:none; background:#f0fdf4; padding:18px; border-radius:18px; 
            text-align:center; margin-bottom:15px; border: 2px dashed var(--accent); 
            cursor: pointer; transition: 0.3s; animation: revealItem 0.4s var(--spring-soft);
        }
        #pix-info:hover { background: #dcfce7; }

        .btn-finish { 
            width: 100%; padding: 18px; background: var(--accent); color: white; border: none; 
            border-radius: 16px; font-weight: 800; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; gap: 10px; transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2);
        }
        .btn-finish:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(37, 211, 102, 0.3); }

        /* BARRA FLUTUANTE */
        .cart-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(150%);
            width: 90%; max-width: 450px; background: var(--primary); color: white;
            padding: 18px 25px; border-radius: 22px; display: flex; justify-content: space-between;
            align-items: center; z-index: 900; transition: 0.6s var(--spring-soft);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); cursor: pointer;
        }
        .cart-bar.active { transform: translateX(-50%) translateY(0); }

        #toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--primary); color: white; padding: 15px 30px; border-radius: 16px; z-index: 3000; transition: 0.5s var(--spring-soft); font-weight: 700; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        #toast.active { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<header>
    <div class="logo">MAIS FRIO <span>CLIMATIZAÇÃO</span></div>
    <div class="btn-cart-top" onclick="toggleCart()">
        <i class="fas fa-shopping-basket"></i> <span id="cart-count-top">0</span>
    </div>
</header>

<section class="hero">
    <h1>Excelência em Climatização</h1>
    <div class="search-area">
        <i class="fas fa-search" style="color: #cbd5e1; margin-left: 5px;"></i>
        <input type="text" id="searchInput" placeholder="Buscar peça ou serviço..." onkeyup="render()">
    </div>
    <div class="tabs">
        <div class="tab active" id="tab-all" onclick="filter('all')">Todos</div>
        <div class="tab" id="tab-servico" onclick="filter('servico')">Serviços</div>
        <div class="tab" id="tab-peca" onclick="filter('peca')">Peças</div>
    </div>
</section>

<main class="container">
    <div class="grid" id="grid"></div>
</main>

<div class="cart-bar" id="cartSummaryBar" onclick="toggleCart()">
    <div style="display:flex; align-items:center; gap:12px">
        <span id="cart-count-bar" style="background:rgba(255,255,255,0.15); padding:6px 14px; border-radius:10px; font-weight:800;">0</span>
        <span style="font-weight:700; font-size:0.9rem">Ver Itens</span>
    </div>
    <span id="cart-total-bar" style="font-weight:800; font-size:1.1rem">R$ 0,00</span>
</div>

<div class="overlay" id="cartOverlay" onclick="toggleCart()"></div>

<div id="sideCart">
    <div class="cart-header">
        <h2 style="font-weight: 800; letter-spacing: -0.5px;">Carrinho</h2>
        <div onclick="toggleCart()" style="width: 40px; height: 40px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;">
            <i class="fas fa-times" style="opacity: 0.5;"></i>
        </div>
    </div>
    <div class="cart-items" id="cart-list"></div>
    <div class="cart-footer">
        <input type="text" id="userAddr" class="premium-input" placeholder="Endereço de entrega completo">
        <select id="userPay" class="premium-input" onchange="checkPix()">
            <option value="Pix">Pagar com Pix (CNPJ)</option>
            <option value="Cartão">Cartão na Entrega</option>
            <option value="Dinheiro">Dinheiro</option>
        </select>
        
        <div id="pix-info" onclick="copyPix()">
            <small style="color: #157347; font-weight: 700; text-transform: uppercase; font-size: 0.6rem;">Toque para copiar o Pix</small><br>
            <strong style="color: #157347; font-size: 1.2rem;">59874260220</strong>
        </div>

        <div style="display: flex; justify-content: space-between; margin: 15px 0 20px;">
            <span style="font-weight: 600; color: #94a3b8;">Total do Pedido</span>
            <span id="cart-total-side" style="font-weight: 800; font-size: 1.4rem;">R$ 0,00</span>
        </div>
        <button onclick="sendOrder()" class="btn-finish">
            <i class="fab fa-whatsapp" style="font-size: 1.2rem;"></i> FINALIZAR PEDIDO
        </button>
    </div>
</div>

<div id="toast">Item adicionado com sucesso!</div>

<script>
    const inventory = [
        { name: "Mão de Obra Instalação (Ar Novo)", price: 400.00, img: "Seção de Serviços.png", cat: "servico" },
        { name: "Mão de Obra Instalação (Ar Usado)", price: 250.00, img: "Seção de Serviços.png", cat: "servico" },
        { name: "Limpeza + Higienização Completa", price: 150.00, img: "ManutencaoPreventiva.png", cat: "servico" },
        { name: "Carga de Gás (Mão de Obra + Gás)", price: 200.00, img: "CargadeGas.png", cat: "servico" },
        { name: "Capacitor Duplo 25+2.5UF", price: 30.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 30UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 35UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 40UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Ventilador 1.0UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 1.5UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 2.5UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 3.0UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Contactor 18A", price: 53.50, img: "Contactor18A.png", cat: "peca" },
        { name: "Contactor 25A", price: 135.00, img: "Contactor25A.png", cat: "peca" },
        { name: "Sensor Degelo AC 05k", price: 10.00, img: "SensorDegeloAC05k.png", cat: "peca" },
        { name: "Controle Ar Universal", price: 80.00, img: "ControlArUniversal.png", cat: "peca" },
        { name: "Gás R32 (13kg)", price: 1150.00, img: "gasr3213kg.png", cat: "peca" },
        { name: "Gás R-22 Lata 1kg", price: 130.00, img: "GasR-22Lata1kg.png", cat: "peca" },
        { name: "Gás R-410A Lata 800g", price: 110.00, img: "GásR-410ALata800g.png", cat: "peca" },
        { name: "Tubulação de Cobre (kg)", price: 165.00, img: "TubulaçãodeCobre(kg).png", cat: "peca" },
        { name: "Suporte L Condensadora 47cm", price: 27.00, img: "SuporteLCondensadora47cm.png", cat: "peca" },
        { name: "Válvula de Serviço 1/4", price: 36.50, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Válvula de Serviço 3/8", price: 55.99, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Válvula de Serviço 1/2", price: 62.99, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Polipex 1/4", price: 3.99, img: "Polipex.png", cat: "peca" },
        { name: "Polipex 3/8", price: 4.90, img: "Polipex.png", cat: "peca" },
        { name: "Polipex 1/2", price: 5.90, img: "Polipex.png", cat: "peca" },
        { name: "Fita Isolante 10mm x 0,5m", price: 4.99, img: "FitaIsolante18mmx10m.png", cat: "peca" },
        { name: "Fita Isolante 18mm x 10m", price: 6.90, img: "FitaIsolante18mmx10m.png", cat: "peca" },
        { name: "Fita De PVC", price: 3.99, img: "FitaDePVC.png", cat: "peca" },
        { name: "Bucha Plástica 0,8 C", price: 0.20, img: "BuchaPlástica0,8C.png", cat: "peca" },
        { name: "Bucha Plástica 0,10 C", price: 0.50, img: "BuchaPlástica0,10C.png", cat: "peca" },
        { name: "Bucha Plástica 0,12 C", price: 0.60, img: "BuchaPlástic0,12C.png", cat: "peca" },
        { name: "Parafuso Cônico", price: 0.35, img: "ParafusoCônico.png", cat: "peca" },
        { name: "Parafuso Sextavado", price: 1.50, img: "ParafusoSextavado.png", cat: "peca" }
    ];

    let cart = JSON.parse(localStorage.getItem('cart_mf_v5')) || [];
    let currentFilter = 'all';

    function render() {
        const grid = document.getElementById('grid');
        const term = document.getElementById('searchInput').value.toLowerCase();
        grid.innerHTML = "";
        
        const filtered = inventory.filter(i => i.name.toLowerCase().includes(term) && (currentFilter === 'all' || i.cat === currentFilter));
        
        filtered.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.animationDelay = `${idx * 0.05}s`;
            card.innerHTML = `
                <div class="img-box">
                    <div class="badge ${item.cat}">${item.cat}</div>
                    <img src="${item.img}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/952/952771.png'">
                </div>
                <div class="card-body">
                    <h3>${item.name}</h3>
                    <div class="price">R$ ${item.price.toFixed(2).replace('.',',')}</div>
                    <button class="btn-add" onclick="add('${item.name}', ${item.price})">Adicionar</button>
                </div>`;
            grid.appendChild(card);
        });
    }

    function add(n, p) {
        let x = cart.find(i => i.n === n);
        if(x) x.q++; else cart.push({n, p, q:1});
        save();
        const t = document.getElementById('toast');
        t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 2500);
    }

    function save() {
        localStorage.setItem('cart_mf_v5', JSON.stringify(cart));
        updateUI();
    }

    function updateUI() {
        const list = document.getElementById('cart-list');
        let tot = 0, count = 0;
        list.innerHTML = "";
        cart.forEach((item, idx) => {
            tot += item.p * item.q;
            count += item.q;
            list.innerHTML += `<div class="cart-item">
                <div><div style="font-weight:700; font-size:0.85rem">${item.n}</div><div style="color:var(--secondary); font-weight:800; margin-top:4px">R$ ${(item.p*item.q).toFixed(2).replace('.',',')}</div></div>
                <div style="display:flex; align-items:center; gap:10px">
                    <button onclick="changeQty(${idx},-1)" style="width:28px; height:28px; border-radius:8px; border:1px solid #e2e8f0; background:#fff; cursor:pointer">-</button>
                    <span style="font-weight:800">${item.q}</span>
                    <button onclick="changeQty(${idx},1)" style="width:28px; height:28px; border-radius:8px; border:1px solid #e2e8f0; background:#fff; cursor:pointer">+</button>
                </div></div>`;
        });
        const val = "R$ " + tot.toFixed(2).replace('.',',');
        document.getElementById('cart-total-side').innerText = val;
        document.getElementById('cart-total-bar').innerText = val;
        document.getElementById('cart-count-top').innerText = count;
        document.getElementById('cart-count-bar').innerText = count;
        document.getElementById('cartSummaryBar').classList.toggle('active', count > 0);
    }

    function changeQty(idx, v) {
        cart[idx].q += v;
        if(cart[idx].q <= 0) cart.splice(idx, 1);
        save();
    }

    function toggleCart() {
        const cartEl = document.getElementById('sideCart');
        const overlay = document.getElementById('cartOverlay');
        cartEl.classList.toggle('open');
        overlay.classList.toggle('active');
        document.body.classList.toggle('modal-open');
        if(cartEl.classList.contains('open')) checkPix();
    }

    function checkPix() {
        const isPix = document.getElementById('userPay').value === 'Pix';
        const pixBox = document.getElementById('pix-info');
        pixBox.style.display = isPix ? 'block' : 'none';
    }

    function copyPix() {
        navigator.clipboard.writeText("59874260220");
        const pixBox = document.getElementById('pix-info');
        pixBox.style.transform = "scale(0.95)";
        setTimeout(() => {
            pixBox.style.transform = "scale(1)";
            alert("Chave Pix copiada!");
        }, 100);
    }

    function filter(c) {
        currentFilter = c;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-'+c).classList.add('active');
        render();
    }

    function sendOrder() {
        const ad = document.getElementById('userAddr').value;
        if(!ad || cart.length === 0) return alert("Por favor, informe o endereço!");
        let m = `*PEDIDO MAIS FRIO*\n\n`;
        cart.forEach(i => m += `▪️ ${i.n} (x${i.q})\n`);
        m += `\n*Pagamento:* ${document.getElementById('userPay').value}\n*Total:* ${document.getElementById('cart-total-side').innerText}\n*Endereço:* ${ad}`;
        window.open(`https://wa.me/556993060469?text=${encodeURIComponent(m)}`);
    }

    window.onload = () => { render(); updateUI(); };
</script>
</body>
</html>
