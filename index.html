<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mais Frio | Climatização Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0a192f;
            --secondary: #007aff;
            --accent: #28cd41;
            --bg: #f8f9fc;
            --card-bg: #ffffff;
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --transition: all 0.4s var(--spring);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--primary); overflow-x: hidden; line-height: 1.6; }
        body.modal-open { overflow: hidden; }

        /* --- ANIMAÇÕES DE ENTRADA --- */
        @keyframes reveal { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- HEADER --- */
        header { 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 15px 6%; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: -0.8px; text-transform: uppercase; color: var(--primary); }
        .logo span { color: var(--secondary); }
        
        .cart-trigger { 
            position: relative; background: var(--primary); color: white; padding: 12px 24px; border-radius: 50px; 
            cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 0.9rem;
            box-shadow: 0 10px 20px rgba(10, 25, 47, 0.15); transition: var(--transition);
        }
        .cart-trigger:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(10, 25, 47, 0.25); }
        .cart-count-badge { background: var(--secondary); color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; }

        /* --- HERO SECTION --- */
        .hero { 
            background: radial-gradient(circle at top right, #112240, #0a192f); 
            color: white; padding: 80px 6% 100px; text-align: center;
            border-bottom-left-radius: 60px; border-bottom-right-radius: 60px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .hero span.tagline { background: rgba(0,122,255,0.2); color: #74b9ff; padding: 6px 16px; border-radius: 50px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 1px; }
        .hero h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 20px; line-height: 1.1; max-width: 700px; animation: reveal 0.8s forwards; }
        
        /* --- SEARCH --- */
        .search-container { 
            background: white; border-radius: 25px; padding: 6px; 
            width: 100%; max-width: 550px; display: flex; align-items: center; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.2); margin-top: 10px;
            transition: var(--transition);
        }
        .search-container:focus-within { transform: scale(1.02); }
        .search-container i { margin-left: 20px; color: #adb5bd; }
        .search-container input { width: 100%; padding: 15px; border: none; outline: none; font-size: 1rem; font-weight: 600; color: #333; }

        /* --- TABS --- */
        .category-tabs { display: flex; gap: 12px; justify-content: center; margin-top: 35px; width: 100%; overflow-x: auto; padding: 5px; scrollbar-width: none; }
        .tab-item { 
            padding: 14px 28px; background: rgba(255,255,255,0.05); color: white; 
            border-radius: 50px; font-size: 0.85rem; font-weight: 700; cursor: pointer; 
            white-space: nowrap; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1);
        }
        .tab-item.active { background: white; color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        /* --- MAIN CONTENT --- */
        .main-wrapper { padding: 50px 6%; max-width: 1300px; margin: auto; }
        .section-header { margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-end; }
        .section-header h2 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }

        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        @media (min-width: 768px) { .products-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; } }

        /* --- CARD --- */
        .product-card { 
            background: white; border-radius: 30px; overflow: hidden; display: flex; 
            flex-direction: column; transition: var(--transition); border: 1px solid rgba(0,0,0,0.03);
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }
        .product-card:hover { transform: translateY(-12px); box-shadow: 0 30px 60px rgba(0,0,0,0.08); }

        .image-viewport { 
            width: 100%; height: 200px; background: #fff; position: relative; 
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .image-viewport img { max-width: 90%; max-height: 90%; object-fit: contain; transition: 0.6s var(--spring); }
        .product-card:hover .image-viewport img { transform: scale(1.1); }

        .category-badge { position: absolute; top: 15px; left: 15px; padding: 6px 14px; border-radius: 50px; font-size: 0.65rem; font-weight: 800; color: white; text-transform: uppercase; z-index: 2; }
        .cat-peca { background: var(--secondary); }
        .cat-servico { background: var(--accent); }

        .info-pane { padding: 20px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; }
        .info-pane h3 { font-size: 1rem; font-weight: 700; color: var(--primary); margin-bottom: 10px; height: 45px; overflow: hidden; }
        .info-pane .price-tag { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 20px; display: block; }
        
        .add-to-cart-btn { 
            margin-top: auto; width: 100%; background: #f0f2f5; color: var(--primary); 
            padding: 16px; border: none; border-radius: 20px; font-weight: 800; 
            cursor: pointer; transition: 0.3s; font-size: 0.9rem;
        }
        .add-to-cart-btn:hover { background: var(--primary); color: white; }

        /* --- SIDE CART & OVERLAY --- */
        .cart-overlay { position: fixed; inset: 0; background: rgba(10, 25, 47, 0.4); backdrop-filter: blur(8px); z-index: 1900; display: none; }
        .cart-overlay.show { display: block; animation: fadeIn 0.4s; }

        #cartPanel { 
            position: fixed; right: -100%; top: 0; width: 92%; max-width: 450px; height: 100%; 
            background: #fff; z-index: 2000; transition: 0.5s var(--spring); 
            display: flex; flex-direction: column; box-shadow: -20px 0 60px rgba(0,0,0,0.1);
        }
        #cartPanel.visible { right: 0; }

        .cart-title { padding: 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; }
        .cart-body { flex: 1; overflow-y: auto; padding: 25px; }

        /* --- PIX COPY BOX --- */
        .copy-card { background: #f0fff4; border: 2px dashed #c3e6cb; border-radius: 20px; padding: 20px; cursor: pointer; text-align: center; transition: 0.3s; margin-bottom: 20px; }
        .copy-card:hover { transform: scale(1.02); background: #e6ffed; }
        .copy-card strong { font-size: 1.2rem; display: block; color: #1e7e34; margin-top: 5px; }

        /* --- TOAST --- */
        #notification { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--primary); color: white; padding: 18px 40px; border-radius: 50px; z-index: 3000; font-weight: 700; box-shadow: 0 20px 40px rgba(0,0,0,0.2); transition: 0.5s var(--spring); }
        #notification.active { transform: translateX(-50%) translateY(0); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div class="logo">MAIS FRIO <span>CLIMATIZAÇÃO</span></div>
    <div class="cart-trigger" onclick="toggleCartPanel()">
        <i class="fas fa-shopping-basket"></i>
        <span>Carrinho</span>
        <span class="cart-count-badge" id="badge-count">0</span>
    </div>
</header>

<section class="hero">
    <span class="tagline">Soluções em Refrigeração</span>
    <h1>Qualidade que você sente no ar.</h1>
    <div class="search-container">
        <i class="fas fa-search"></i>
        <input type="text" id="mainSearch" placeholder="Busque por peças ou serviços..." onkeyup="renderCatalog()">
    </div>
    <div class="category-tabs">
        <div class="tab-item active" id="filter-all" onclick="setFilter('all')">Todos</div>
        <div class="tab-item" id="filter-servico" onclick="setFilter('servico')">Serviços</div>
        <div class="tab-item" id="filter-peca" onclick="setFilter('peca')">Peças e Peças</div>
    </div>
</section>

<main class="main-wrapper">
    <div class="section-header">
        <h2 id="view-title">Todos os Itens</h2>
    </div>
    <div class="products-grid" id="catalog-grid"></div>
</main>

<div class="cart-overlay" id="uiOverlay" onclick="toggleCartPanel()"></div>

<div id="cartPanel">
    <div class="cart-title">
        <h2 style="font-weight: 800;">Meu Pedido</h2>
        <i class="fas fa-times" onclick="toggleCartPanel()" style="cursor:pointer; font-size: 1.5rem; opacity: 0.3;"></i>
    </div>
    <div class="cart-body" id="cart-content"></div>
    <div style="padding: 30px; border-top: 1px solid #f0f0f0;">
        <input type="text" id="orderAddr" class="premium-input" placeholder="Endereço de Entrega" style="width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #f1f5f9; margin-bottom: 15px; font-weight: 600;">
        <select id="orderPay" class="premium-input" onchange="togglePixUI()" style="width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #f1f5f9; margin-bottom: 15px; font-weight: 600;">
            <option value="Pix">Pagar com Pix</option>
            <option value="Cartão de Crédito/Débito">Cartão de Crédito/Débito</option>
            <option value="Dinheiro">Dinheiro</option>
        </select>

        <div id="pix-area" style="display:none;">
            <div class="copy-card" onclick="copyPixCNPJ()">
                <small>Clique para copiar o CNPJ:</small>
                <strong>59874260220</strong>
                <span id="copy-status" style="font-size: 0.7rem; color: #28cd41; display: none;">COPIADO!</span>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <span style="font-weight: 600; opacity: 0.5;">Total Geral:</span>
            <span id="order-total" style="font-weight: 800; font-size: 1.6rem;">R$ 0,00</span>
        </div>
        <button onclick="finalizeWhatsApp()" style="width: 100%; background: var(--accent); color: white; padding: 20px; border-radius: 20px; border: none; font-weight: 800; cursor: pointer; box-shadow: 0 10px 20px rgba(40,205,65,0.2);">
            FINALIZAR NO WHATSAPP
        </button>
    </div>
</div>

<div id="notification">✅ Item adicionado!</div>

<script>
    const db = [
        { name: "Instalação Ar Novo", price: 400.00, img: "Seção de Serviços.png", cat: "servico" },
        { name: "Instalação Ar Usado", price: 250.00, img: "Seção de Serviços.png", cat: "servico" },
        { name: "Manutenção Preventiva", price: 150.00, img: "ManutencaoPreventiva.png", cat: "servico" },
        { name: "Carga de Gás", price: 200.00, img: "CargadeGas.png", cat: "servico" },
        { name: "Capacitor Duplo 25+2.5UF", price: 30.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 30UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 35UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 40UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Ventilador 1.0UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 1.5UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 2.5UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 3.0UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Contactor 18A", price: 53.50, img: "Contactor18A.png", cat: "peca" },
        { name: "Contactor 25A", price: 135.00, img: "Contactor25A.png", cat: "peca" },
        { name: "Sensor Degelo AC 05k", price: 10.00, img: "SensorDegeloAC05k.png", cat: "peca" },
        { name: "Controle Ar Universal", price: 80.00, img: "ControlArUniversal.png", cat: "peca" },
        { name: "Gás R32 (13kg)", price: 1150.00, img: "gasr3213kg.png", cat: "peca" },
        { name: "Gás R-22 Lata 1kg", price: 130.00, img: "GasR-22Lata1kg.png", cat: "peca" },
        { name: "Gás R-410A Lata 800g", price: 110.00, img: "GásR-410ALata800g.png", cat: "peca" },
        { name: "Tubulação de Cobre (kg)", price: 165.00, img: "TubulaçãodeCobre(kg).png", cat: "peca" },
        { name: "Suporte L Condensadora 47cm", price: 27.00, img: "SuporteLCondensadora47cm.png", cat: "peca" },
        { name: "Válvula de Serviço 1/4", price: 36.50, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Válvula de Serviço 3/8", price: 55.99, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Válvula de Serviço 1/2", price: 62.99, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Polipex 1/4", price: 3.99, img: "Polipex.png", cat: "peca" },
        { name: "Polipex 3/8", price: 4.90, img: "Polipex.png", cat: "peca" },
        { name: "Polipex 1/2", price: 5.90, img: "Polipex.png", cat: "peca" },
        { name: "Fita Isolante 10mm x 0,5m", price: 4.99, img: "FitaIsolante18mmx10m.png", cat: "peca" },
        { name: "Fita Isolante 18mm x 10m", price: 6.90, img: "FitaIsolante18mmx10m.png", cat: "peca" },
        { name: "Fita De PVC", price: 3.99, img: "FitaDePVC.png", cat: "peca" },
        { name: "Bucha Plástica 0,8 C", price: 0.20, img: "BuchaPlástica0,8C.png", cat: "peca" },
        { name: "Bucha Plástica 0,10 C", price: 0.50, img: "BuchaPlástica0,10C.png", cat: "peca" },
        { name: "Bucha Plástica 0,12 C", price: 0.60, img: "BuchaPlástic0,12C.png", cat: "peca" },
        { name: "Parafuso Cônico", price: 0.35, img: "ParafusoCônico.png", cat: "peca" },
        { name: "Parafuso Sextavado", price: 1.50, img: "ParafusoSextavado.png", cat: "peca" }
    ];

    let cart = JSON.parse(localStorage.getItem('maisfrio_cart')) || [];
    let activeFilter = 'all';

    function renderCatalog() {
        const grid = document.getElementById('catalog-grid');
        const search = document.getElementById('mainSearch').value.toLowerCase();
        grid.innerHTML = "";
        
        const filtered = db.filter(item => 
            item.name.toLowerCase().includes(search) && 
            (activeFilter === 'all' || item.cat === activeFilter)
        );

        filtered.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div class="image-viewport">
                    <span class="category-badge cat-${item.cat}">${item.cat}</span>
                    <img src="${item.img}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/952/952771.png'">
                </div>
                <div class="info-pane">
                    <h3>${item.name}</h3>
                    <span class="price-tag">R$ ${item.price.toFixed(2).replace('.',',')}</span>
                    <button class="add-to-cart-btn" onclick="addToCart('${item.name}', ${item.price})">Adicionar ao Carrinho</button>
                </div>
            `;
            grid.appendChild(card);
            setTimeout(() => card.style.animation = 'reveal 0.6s forwards', i * 30);
        });
    }

    function setFilter(cat) {
        activeFilter = cat;
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById('filter-'+cat).classList.add('active');
        document.getElementById('view-title').innerText = cat === 'all' ? 'Todos os Itens' : cat.charAt(0).toUpperCase() + cat.slice(1) + 's';
        renderCatalog();
    }

    function addToCart(n, p) {
        let item = cart.find(i => i.n === n);
        if(item) item.q++; else cart.push({n, p, q: 1});
        syncCart();
        showToast();
    }

    function syncCart() {
        localStorage.setItem('maisfrio_cart', JSON.stringify(cart));
        const list = document.getElementById('cart-content');
        let total = 0;
        list.innerHTML = "";
        
        cart.forEach((item, idx) => {
            total += item.p * item.q;
            list.innerHTML += `
                <div style="background:#f8fafc; padding:15px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <div style="font-weight:700; font-size:0.9rem;">${item.n}</div>
                        <div style="color:var(--secondary); font-weight:800;">R$ ${(item.p*item.q).toFixed(2).replace('.',',')}</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <button onclick="updateQty(${idx},-1)" style="width:30px; height:30px; border-radius:8px; border:1px solid #ddd; background:white;">-</button>
                        <span style="font-weight:800;">${item.q}</span>
                        <button onclick="updateQty(${idx},1)" style="width:30px; height:30px; border-radius:8px; border:1px solid #ddd; background:white;">+</button>
                    </div>
                </div>
            `;
        });
        document.getElementById('order-total').innerText = `R$ ${total.toFixed(2).replace('.',',')}`;
        document.getElementById('badge-count').innerText = cart.reduce((a,b) => a + b.q, 0);
        togglePixUI();
    }

    function updateQty(i, v) {
        cart[i].q += v;
        if(cart[i].q <= 0) cart.splice(i, 1);
        syncCart();
    }

    function toggleCartPanel() {
        document.getElementById('cartPanel').classList.toggle('visible');
        document.getElementById('uiOverlay').classList.toggle('show');
        document.body.classList.toggle('modal-open');
    }

    function togglePixUI() {
        const pay = document.getElementById('orderPay').value;
        document.getElementById('pix-area').style.display = pay === 'Pix' ? 'block' : 'none';
    }

    function copyPixCNPJ() {
        navigator.clipboard.writeText("59874260220");
        const status = document.getElementById('copy-status');
        status.style.display = 'inline';
        setTimeout(() => status.style.display = 'none', 2000);
    }

    function showToast() {
        const t = document.getElementById('notification');
        t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 2500);
    }

    function finalizeWhatsApp() {
        const addr = document.getElementById('orderAddr').value;
        if(!addr || cart.length === 0) return alert("Por favor, preencha o endereço e adicione itens.");
        let msg = `*NOVO PEDIDO - MAIS FRIO*\n\n`;
        cart.forEach(i => msg += `🔹 ${i.n} (x${i.q})\n`);
        msg += `\n*Pagamento:* ${document.getElementById('orderPay').value}\n*Total:* ${document.getElementById('order-total').innerText}\n*Endereço:* ${addr}`;
        window.open(`https://wa.me/556993060469?text=${encodeURIComponent(msg)}`);
    }

    window.onload = () => { renderCatalog(); syncCart(); };
</script>
</body>
</html>
