<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mais Frio Climatização | Elite Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0a192f;
            --secondary: #007aff;
            --accent: #28cd41;
            --bg: #f5f5f7;
            --glass: rgba(255, 255, 255, 0.9);
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Trava de Scroll */
        body.modal-open { overflow: hidden; position: fixed; width: 100%; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--primary); }

        /* Status & Header */
        .status-bar { background: white; padding: 10px; display: flex; justify-content: center; align-items: center; gap: 8px; font-size: 0.75rem; font-weight: 800; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot.online { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

        header { 
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 15px 6%; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-weight: 800; font-size: 1.1rem; }
        .logo span { color: var(--secondary); }
        .btn-cart-top { background: var(--primary); color: white; padding: 10px 18px; border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 700; transition: 0.3s var(--spring); }

        /* Hero */
        .hero { background: var(--primary); color: white; padding: 50px 6% 40px; text-align: center; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; }
        .search-area { background: white; border-radius: 18px; padding: 5px 15px; max-width: 500px; margin: 20px auto; display: flex; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .search-area input { width: 100%; padding: 12px; border: none; outline: none; font-size: 16px; }

        /* Grid & Cards */
        .container { padding: 25px 5%; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); } }

        .card { background: white; border-radius: 25px; overflow: hidden; display: flex; flex-direction: column; transition: 0.4s var(--spring); border: 1px solid rgba(0,0,0,0.03); opacity: 0; transform: translateY(20px); }
        .card.active { opacity: 1; transform: translateY(0); }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        
        /* Imagens Zoom In */
        .img-box { width: 100%; height: 160px; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover .img-box img { transform: scale(1.1); }

        .card-body { padding: 15px; text-align: center; }
        .card h3 { font-size: 0.9rem; height: 40px; margin-bottom: 10px; }
        .price { font-size: 1.3rem; font-weight: 800; color: var(--secondary); margin-bottom: 12px; }
        .btn-add { width: 100%; background: var(--bg); padding: 12px; border-radius: 15px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-add:hover { background: var(--primary); color: white; }

        /* CARRINHO (CORRIGIDO) */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1900; display: none; backdrop-filter: blur(5px); }
        .overlay.active { display: block; }

        #sideCart { 
            position: fixed; right: -100%; top: 0; width: 85%; max-width: 400px; 
            height: 100%; background: white; z-index: 2000; 
            transition: 0.5s var(--spring); display: flex; flex-direction: column;
        }
        #sideCart.open { right: 0; }

        .cart-header { padding: 25px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-footer { padding: 25px; border-top: 1px solid #eee; background: white; }

        .premium-input { width: 100%; padding: 15px; background: #f2f2f7; border-radius: 12px; border: none; margin-bottom: 10px; font-size: 16px; }
        .btn-finish { width: 100%; padding: 18px; background: var(--accent); color: white; border-radius: 18px; border: none; font-weight: 800; font-size: 1rem; cursor: pointer; box-shadow: 0 10px 20px rgba(40,205,65,0.2); }

        /* Toast */
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--primary); color: white; padding: 12px 25px; border-radius: 50px; z-index: 3000; transition: 0.4s var(--spring); font-weight: 700; }
        #toast.active { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="status-bar">
    <div id="st-dot" class="dot online"></div>
    <span id="st-text">ABERTO AGORA • MAIS FRIO</span>
</div>

<header>
    <div class="logo">MAIS FRIO <span>CLIMATIZAÇÃO</span></div>
    <div class="btn-cart-top" onclick="toggleCart()">
        <i class="fas fa-shopping-bag"></i> <span id="cart-count">0</span>
    </div>
</header>

<section class="hero">
    <h1>Peças e Serviços Pro</h1>
    <div class="search-area">
        <i class="fas fa-search" style="color:#ccc"></i>
        <input type="text" id="searchInput" placeholder="O que você procura?" onkeyup="render()">
    </div>
</section>

<main class="container">
    <div class="grid" id="grid"></div>
</main>

<div class="overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div id="sideCart">
    <div class="cart-header">
        <h2 style="font-weight: 800;">Meu Pedido</h2>
        <i class="fas fa-times" onclick="toggleCart()" style="font-size: 1.5rem; cursor: pointer;"></i>
    </div>
    
    <div class="cart-items" id="cart-list"></div>
    
    <div class="cart-footer">
        <input type="text" id="userAddr" class="premium-input" placeholder="Endereço de entrega">
        <select id="userPay" class="premium-input">
            <option value="Pix">Pix (Copiável)</option>
            <option value="Cartão">Cartão na Entrega</option>
            <option value="Dinheiro">Dinheiro</option>
        </select>
        <div style="display: flex; justify-content: space-between; margin: 15px 0;">
            <span style="font-weight: 600;">Total:</span>
            <span id="cart-total" style="font-weight: 800; font-size: 1.4rem;">R$ 0,00</span>
        </div>
        <button class="btn-finish" onclick="sendOrder()">FINALIZAR NO WHATSAPP</button>
    </div>
</div>

<div id="toast">✅ Adicionado!</div>

<script>
    const inventory = [
        { name: "Instalação Ar Novo", price: 400.00, img: "Seção de Serviços.png" },
        { name: "Instalação Ar Usado", price: 250.00, img: "Seção de Serviços.png" },
        { name: "Manutenção Preventiva", price: 150.00, img: "ManutencaoPreventiva.png" },
        { name: "Carga de Gás", price: 200.00, img: "CargadeGas.png" },
        { name: "Capacitor Duplo 25+2.5UF", price: 30.00, img: "CapacitorDuplo25+2.5UF.png" },
        { name: "Capacitor Duplo 30UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png" },
        { name: "Capacitor Duplo 35UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png" },
        { name: "Capacitor Duplo 40UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png" },
        { name: "Capacitor Ventilador 1.0UF", price: 8.50, img: "capacitordeventilador.png" },
        { name: "Capacitor Ventilador 1.5UF", price: 8.50, img: "capacitordeventilador.png" },
        { name: "Capacitor Ventilador 2.5UF", price: 8.50, img: "capacitordeventilador.png" },
        { name: "Capacitor Ventilador 3.0UF", price: 8.50, img: "capacitordeventilador.png" },
        { name: "Contactor 18A", price: 53.50, img: "Contactor18A.png" },
        { name: "Contactor 25A", price: 135.00, img: "Contactor25A.png" },
        { name: "Sensor Degelo AC 05k", price: 10.00, img: "SensorDegeloAC05k.png" },
        { name: "Controle Ar Universal", price: 80.00, img: "ControlArUniversal.png" },
        { name: "Gás R32 (13kg)", price: 1150.00, img: "gasr3213kg.png" },
        { name: "Gás R-22 Lata 1kg", price: 130.00, img: "GasR-22Lata1kg.png" },
        { name: "Gás R-410A Lata 800g", price: 110.00, img: "GásR-410ALata800g.png" },
        { name: "Tubulação de Cobre (kg)", price: 165.00, img: "TubulaçãodeCobre(kg).png" },
        { name: "Suporte L Condensadora 47cm", price: 27.00, img: "SuporteLCondensadora47cm.png" },
        { name: "Válvula de Serviço 1/4", price: 36.50, img: "valvuladeservicio.png" },
        { name: "Válvula de Serviço 3/8", price: 55.99, img: "valvuladeservicio.png" },
        { name: "Válvula de Serviço 1/2", price: 62.99, img: "valvuladeservicio.png" },
        { name: "Polipex 1/4", price: 3.99, img: "Polipex.png" },
        { name: "Polipex 3/8", price: 4.90, img: "Polipex.png" },
        { name: "Polipex 1/2", price: 5.90, img: "Polipex.png" },
        { name: "Fita Isolante 10mm x 0,5m", price: 4.99, img: "FitaIsolante18mmx10m.png" },
        { name: "Fita Isolante 18mm x 10m", price: 6.90, img: "FitaIsolante18mmx10m.png" },
        { name: "Fita De PVC", price: 3.99, img: "FitaDePVC.png" },
        { name: "Bucha Plástica 0,8 C", price: 0.20, img: "BuchaPlástica0,8C.png" },
        { name: "Bucha Plástica 0,10 C", price: 0.50, img: "BuchaPlástica0,10C.png" },
        { name: "Bucha Plástica 0,12 C", price: 0.60, img: "BuchaPlástic0,12C.png" },
        { name: "Parafuso Cônico", price: 0.35, img: "ParafusoCônico.png" },
        { name: "Parafuso Sextavado", price: 1.50, img: "ParafusoSextavado.png" }
    ];

    let cart = [];

    function render() {
        const grid = document.getElementById('grid');
        const term = document.getElementById('searchInput').value.toLowerCase();
        grid.innerHTML = "";
        
        inventory.filter(i => i.name.toLowerCase().includes(term)).forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = "card";
            card.innerHTML = `
                <div class="img-box"><img src="${item.img}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/952/952771.png'"></div>
                <div class="card-body">
                    <h3>${item.name}</h3>
                    <div class="price">R$ ${item.price.toFixed(2).replace('.',',')}</div>
                    <button class="btn-add" onclick="add('${item.name}', ${item.price})">ADICIONAR</button>
                </div>
            `;
            grid.appendChild(card);
            setTimeout(() => card.classList.add('active'), idx * 50);
        });
    }

    function toggleCart() {
        const cart = document.getElementById('sideCart');
        const overlay = document.getElementById('cartOverlay');
        cart.classList.toggle('open');
        overlay.classList.toggle('active');
        document.body.classList.toggle('modal-open');
    }

    function add(n, p) {
        let x = cart.find(i => i.n === n);
        if(x) x.q++; else cart.push({n, p, q:1});
        update();
        const t = document.getElementById('toast');
        t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 2000);
    }

    function update() {
        let tot = 0, c = 0;
        document.getElementById('cart-list').innerHTML = cart.map((i, idx) => {
            tot += i.p * i.q; c += i.q;
            return `<div style="background:#f9f9f9; padding:12px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                <div><b>${i.n}</b><br><small>R$ ${(i.p*i.q).toFixed(2)}</small></div>
                <div style="display:flex; gap:10px; align-items:center;">
                    <button onclick="changeQty(${idx},-1)" style="width:25px; height:25px; border-radius:50%; border:none;">-</button>
                    <span>${i.q}</span>
                    <button onclick="changeQty(${idx},1)" style="width:25px; height:25px; border-radius:50%; border:none;">+</button>
                </div>
            </div>`;
        }).join('');
        document.getElementById('cart-total').innerText = "R$ " + tot.toFixed(2).replace('.',',');
        document.getElementById('cart-count').innerText = c;
    }

    function changeQty(idx, v) {
        cart[idx].q += v;
        if(cart[idx].q <= 0) cart.splice(idx, 1);
        update();
    }

    function sendOrder() {
        const ad = document.getElementById('userAddr').value;
        if(!ad || cart.length === 0) return alert("Preencha o endereço!");
        let m = `*PEDIDO MAIS FRIO*\n\n`;
        cart.forEach(i => m += `• ${i.n} (x${i.q})\n`);
        m += `\n*Total:* ${document.getElementById('cart-total').innerText}\n*Endereço:* ${ad}`;
        window.open(`https://wa.me/556993060469?text=${encodeURIComponent(m)}`);
    }

    window.onload = render;
</script>
</body>
</html>
