<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mais Frio Climatização | Catálogo Profissional</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0a192f;
            --secondary: #007aff;
            --accent: #25d366;
            --bg: #f5f5f7;
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --transition: all 0.4s var(--spring);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--primary); overflow-x: hidden; }
        body.modal-open { overflow: hidden; position: fixed; width: 100%; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- UI COMPONENTS --- */
        header { 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 15px 6%; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-weight: 800; font-size: 1.1rem; text-transform: uppercase; }
        .logo span { color: var(--secondary); }
        
        .btn-cart-top { 
            background: var(--primary); color: white; padding: 10px 22px; border-radius: 50px; 
            cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 700;
            transition: var(--transition);
        }

        .hero { 
            background: linear-gradient(135deg, #0a192f 0%, #061121 100%); 
            color: white; padding: 60px 6% 80px; text-align: center;
            border-bottom-left-radius: 50px; border-bottom-right-radius: 50px;
        }
        .hero h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 25px; line-height: 1.1; }
        
        .search-area { 
            background: white; border-radius: 20px; padding: 5px 20px; 
            width: 100%; max-width: 500px; display: flex; align-items: center; 
            margin: 0 auto 35px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transition: var(--transition);
        }
        .search-area input { width: 100%; padding: 12px; border: none; outline: none; font-size: 1rem; font-weight: 600; color: #333; }

        .tabs { display: flex; gap: 12px; justify-content: center; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .tab { padding: 12px 25px; background: rgba(255,255,255,0.1); border-radius: 50px; font-size: 0.8rem; font-weight: 700; cursor: pointer; white-space: nowrap; transition: var(--transition); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .tab.active { background: white; color: var(--primary); transform: scale(1.05); }

        /* --- GRID & CARDS --- */
        .container { padding: 40px 5% 120px; max-width: 1300px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; } }

        .card { 
            background: white; border-radius: 25px; overflow: hidden; display: flex; 
            flex-direction: column; transition: var(--transition); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            animation: fadeInUp 0.6s ease backwards;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

        .img-box { width: 100%; height: 160px; position: relative; display: flex; align-items: center; justify-content: center; padding: 15px; background: #fff; }
        .img-box img { max-width: 85%; max-height: 85%; object-fit: contain; }
        
        .badge { position: absolute; top: 12px; left: 12px; padding: 5px 12px; border-radius: 50px; font-size: 0.55rem; font-weight: 800; color: white; text-transform: uppercase; z-index: 5; }
        .badge.peca { background: var(--secondary); }
        .badge.servico { background: #28cd41; }

        .card-body { padding: 15px; text-align: center; flex: 1; display: flex; flex-direction: column; }
        .card h3 { font-size: 0.85rem; font-weight: 700; min-height: 38px; margin-bottom: 5px; color: var(--primary); line-height: 1.2; }
        .service-note { font-size: 0.65rem; color: #ff3b30; font-weight: 700; margin-bottom: 8px; display: block; text-transform: uppercase; }
        .price { font-size: 1.2rem; font-weight: 800; color: var(--primary); margin-bottom: 12px; display: block; }
        
        .btn-add { width: 100%; background: #f0f2f5; padding: 12px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; transition: var(--transition); font-size: 0.8rem; }
        .btn-add:hover { background: var(--primary); color: white; }

        /* --- BARRA FLUTUANTE (BOTTOM BAR) --- */
        .cart-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 450px; background: var(--primary); color: white;
            padding: 16px 24px; border-radius: 22px; display: flex; justify-content: space-between;
            align-items: center; z-index: 900; box-shadow: 0 20px 30px rgba(0,0,0,0.3);
            cursor: pointer; transition: var(--transition); visibility: hidden; opacity: 0;
        }
        .cart-bar.active { visibility: visible; opacity: 1; bottom: 30px; }

        /* --- SIDE CARRINHO --- */
        .overlay { position: fixed; inset: 0; background: rgba(10, 25, 47, 0.4); backdrop-filter: blur(8px); z-index: 1900; display: none; }
        .overlay.active { display: block; }

        #sideCart { position: fixed; right: -100%; top: 0; width: 90%; max-width: 420px; height: 100%; background: white; z-index: 2000; transition: 0.5s var(--spring); display: flex; flex-direction: column; }
        #sideCart.open { right: 0; }
        .cart-header { padding: 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-item { background: #f8fafc; padding: 15px; border-radius: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }

        .cart-footer { padding: 25px; border-top: 1px solid #eee; }
        .premium-input { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #f1f5f9; margin-bottom: 10px; font-weight: 600; outline: none; }
        .btn-finish { width: 100%; padding: 18px; background: #28cd41; color: white; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: var(--transition); }

        /* WHATSAPP FLOAT */
        .whatsapp-float { position: fixed; width: 55px; height: 55px; bottom: 100px; right: 20px; background-color: var(--accent); color: #FFF; border-radius: 50px; text-align: center; font-size: 28px; box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3); z-index: 800; display: flex; align-items: center; justify-content: center; text-decoration: none; transition: var(--transition); }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--primary); color: white; padding: 15px 35px; border-radius: 50px; z-index: 3000; transition: 0.5s var(--spring); font-weight: 800; }
        #toast.active { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<a href="https://wa.me/556993060469" class="whatsapp-float" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

<header>
    <div class="logo">MAIS FRIO <span>CLIMATIZAÇÃO</span></div>
    <div class="btn-cart-top" onclick="toggleCart()">
        <i class="fas fa-shopping-basket"></i> <span id="cart-count-top">0</span>
    </div>
</header>

<section class="hero">
    <h1>Peças & Serviços<br>Especializados</h1>
    <div class="search-area">
        <i class="fas fa-search" style="color:#ccc"></i>
        <input type="text" id="searchInput" placeholder="O que você precisa?" onkeyup="render()">
    </div>
    <div class="tabs">
        <div class="tab active" id="tab-all" onclick="filter('all')">Todos Itens</div>
        <div class="tab" id="tab-servico" onclick="filter('servico')">Serviços</div>
        <div class="tab" id="tab-peca" onclick="filter('peca')">Peças</div>
    </div>
</section>

<main class="container">
    <div class="grid" id="grid"></div>
</main>

<div class="cart-bar" id="cartSummaryBar" onclick="toggleCart()">
    <div style="display:flex; align-items:center; gap:12px">
        <div style="background:rgba(255,255,255,0.2); padding:8px 12px; border-radius:10px; font-weight:800;" id="cart-count-bar">0</div>
        <span style="font-weight:700; font-size:0.9rem">Ver Carrinho</span>
    </div>
    <div id="cart-total-bar" style="font-weight:800; font-size:1.1rem">R$ 0,00</div>
</div>

<div class="overlay" id="cartOverlay" onclick="toggleCart()"></div>

<div id="sideCart">
    <div class="cart-header">
        <h2 style="font-weight: 800;">Meu Carrinho</h2>
        <i class="fas fa-times" onclick="toggleCart()" style="cursor:pointer; font-size: 1.5rem; opacity: 0.3;"></i>
    </div>
    <div class="cart-items" id="cart-list"></div>
    <div class="cart-footer">
        <input type="text" id="userAddr" class="premium-input" placeholder="Endereço de Entrega Completo">
        <select id="userPay" class="premium-input" onchange="checkPix()">
            <option value="Pix">Pagar com Pix</option>
            <option value="Cartão">Cartão de Crédito/Débito</option>
            <option value="Dinheiro">Dinheiro</option>
        </select>
        <div id="pix-info" style="display:none; background:#e6ffed; padding:12px; border-radius:12px; text-align:center; margin-bottom:10px; border: 1px dashed #28cd41;" onclick="copyPix()">
            <small>Clique p/ copiar o CNPJ Pix:</small><br><strong>59874260220</strong>
        </div>
        <div style="display: flex; justify-content: space-between; margin: 15px 0;">
            <span style="font-weight: 600; opacity: 0.6;">Total:</span>
            <span id="cart-total-side" style="font-weight: 800; font-size: 1.5rem;">R$ 0,00</span>
        </div>
        <button onclick="sendOrder()" class="btn-finish">
            <i class="fab fa-whatsapp"></i> FINALIZAR NO WHATSAPP
        </button>
    </div>
</div>

<div id="toast">✅ Adicionado ao carrinho!</div>

<script>
    const inventory = [
        { name: "Mão de Obra Instalação (Ar Novo)", price: 400.00, img: "Seção de Serviços.png", cat: "servico" },
        { name: "Mão de Obra Instalação (Ar Usado)", price: 250.00, img: "Seção de Serviços.png", cat: "servico" },
        { name: "Limpeza + Higienização Completa", price: 150.00, img: "ManutencaoPreventiva.png", cat: "servico" },
        { name: "Carga de Gás (Mão de Obra + Gás)", price: 200.00, img: "CargadeGas.png", cat: "servico" },
        { name: "Capacitor Duplo 25+2.5UF", price: 30.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 30UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 35UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 40UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Ventilador 1.0UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 1.5UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 2.5UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 3.0UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Contactor 18A", price: 53.50, img: "Contactor18A.png", cat: "peca" },
        { name: "Contactor 25A", price: 135.00, img: "Contactor25A.png", cat: "peca" },
        { name: "Sensor Degelo AC 05k", price: 10.00, img: "SensorDegeloAC05k.png", cat: "peca" },
        { name: "Controle Ar Universal", price: 80.00, img: "ControlArUniversal.png", cat: "peca" },
        { name: "Gás R32 (13kg)", price: 1150.00, img: "gasr3213kg.png", cat: "peca" },
        { name: "Gás R-22 Lata 1kg", price: 130.00, img: "GasR-22Lata1kg.png", cat: "peca" },
        { name: "Gás R-410A Lata 800g", price: 110.00, img: "GásR-410ALata800g.png", cat: "peca" },
        { name: "Tubulação de Cobre (kg)", price: 165.00, img: "TubulaçãodeCobre(kg).png", cat: "peca" },
        { name: "Suporte L Condensadora 47cm", price: 27.00, img: "SuporteLCondensadora47cm.png", cat: "peca" },
        { name: "Válvula de Serviço 1/4", price: 36.50, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Válvula de Serviço 3/8", price: 55.99, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Válvula de Serviço 1/2", price: 62.99, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Polipex 1/4", price: 3.99, img: "Polipex.png", cat: "peca" },
        { name: "Polipex 3/8", price: 4.90, img: "Polipex.png", cat: "peca" },
        { name: "Polipex 1/2", price: 5.90, img: "Polipex.png", cat: "peca" },
        { name: "Fita Isolante 10mm x 0,5m", price: 4.99, img: "FitaIsolante18mmx10m.png", cat: "peca" },
        { name: "Fita Isolante 18mm x 10m", price: 6.90, img: "FitaIsolante18mmx10m.png", cat: "peca" },
        { name: "Fita De PVC", price: 3.99, img: "FitaDePVC.png", cat: "peca" },
        { name: "Bucha Plástica 0,8 C", price: 0.20, img: "BuchaPlástica0,8C.png", cat: "peca" },
        { name: "Bucha Plástica 0,10 C", price: 0.50, img: "BuchaPlástica0,10C.png", cat: "peca" },
        { name: "Bucha Plástica 0,12 C", price: 0.60, img: "BuchaPlástic0,12C.png", cat: "peca" },
        { name: "Parafuso Cônico", price: 0.35, img: "ParafusoCônico.png", cat: "peca" },
        { name: "Parafuso Sextavado", price: 1.50, img: "ParafusoSextavado.png", cat: "peca" }
    ];

    let cart = JSON.parse(localStorage.getItem('cart_mf_vfinal')) || [];
    let currentFilter = 'all';

    function removeAccents(str) {
        return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
    }

    function render() {
        const grid = document.getElementById('grid');
        const term = removeAccents(document.getElementById('searchInput').value);
        grid.innerHTML = "";
        
        const filtered = inventory.filter(item => {
            return removeAccents(item.name).includes(term) && (currentFilter === 'all' || item.cat === currentFilter);
        });
        
        filtered.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = "card";
            card.style.animationDelay = `${index * 0.03}s`;
            const note = item.cat === 'servico' ? '<span class="service-note">* Somente Mão de Obra</span>' : '';

            card.innerHTML = `
                <div class="img-box">
                    <div class="badge ${item.cat}">${item.cat}</div>
                    <img src="${item.img}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/952/952771.png'">
                </div>
                <div class="card-body">
                    <h3>${item.name}</h3>
                    ${note}
                    <div class="price">R$ ${item.price.toFixed(2).replace('.',',')}</div>
                    <button class="btn-add" onclick="add('${item.name}', ${item.price})">ADICIONAR</button>
                </div>`;
            grid.appendChild(card);
        });
    }

    function add(n, p) {
        let x = cart.find(i => i.n === n);
        if(x) x.q++; else cart.push({n, p, q:1});
        save();
        showToast();
    }

    function save() {
        localStorage.setItem('cart_mf_vfinal', JSON.stringify(cart));
        updateUI();
    }

    function updateUI() {
        const list = document.getElementById('cart-list');
        const summaryBar = document.getElementById('cartSummaryBar');
        let tot = 0;
        let count = 0;
        list.innerHTML = "";
        
        cart.forEach((item, idx) => {
            tot += item.p * item.q;
            count += item.q;
            list.innerHTML += `
                <div class="cart-item">
                    <div>
                        <div style="font-weight:700; font-size:0.85rem;">${item.n}</div>
                        <div style="color:var(--secondary); font-weight:800; margin-top:3px;">R$ ${(item.p * item.q).toFixed(2).replace('.',',')}</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:10px">
                        <button onclick="changeQty(${idx}, -1)" style="width:26px; height:26px; border-radius:6px; border:1px solid #ddd; background:white;">-</button>
                        <span style="font-weight:800;">${item.q}</span>
                        <button onclick="changeQty(${idx}, 1)" style="width:26px; height:26px; border-radius:6px; border:1px solid #ddd; background:white;">+</button>
                    </div>
                </div>`;
        });

        const totalStr = "R$ " + tot.toFixed(2).replace('.',',');
        document.getElementById('cart-total-side').innerText = totalStr;
        document.getElementById('cart-total-bar').innerText = totalStr;
        document.getElementById('cart-count-top').innerText = count;
        document.getElementById('cart-count-bar').innerText = count;
        
        if(count > 0) summaryBar.classList.add('active');
        else summaryBar.classList.remove('active');
    }

    function changeQty(idx, val) {
        cart[idx].q += val;
        if(cart[idx].q <= 0) cart.splice(idx, 1);
        save();
    }

    function filter(cat) {
        currentFilter = cat;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-'+cat).classList.add('active');
        render();
    }

    function toggleCart() {
        document.getElementById('sideCart').classList.toggle('open');
        document.getElementById('cartOverlay').classList.toggle('active');
        document.body.classList.toggle('modal-open');
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 2000);
    }

    function checkPix() {
        document.getElementById('pix-info').style.display = (document.getElementById('userPay').value === 'Pix') ? 'block' : 'none';
    }

    function copyPix() {
        navigator.clipboard.writeText("59874260220");
        alert("CNPJ Pix Copiado!");
    }

    function sendOrder() {
        const ad = document.getElementById('userAddr').value;
        const pay = document.getElementById('userPay').value;
        if(!ad || cart.length === 0) return alert("Preencha os dados do pedido!");

        let m = `*PEDIDO MAIS FRIO CLIMATIZAÇÃO*\n\n`;
        cart.forEach(i => m += `▪️ ${i.n} (x${i.q})\n`);
        m += `\n*Pagamento:* ${pay}\n*Total:* ${document.getElementById('cart-total-side').innerText}\n*Endereço:* ${ad}\n`;
        if(pay === 'Pix') m += `\n*PIX CNPJ:* 59874260220`;

        window.open(`https://wa.me/556993060469?text=${encodeURIComponent(m)}`);
    }

    window.onload = () => { render(); updateUI(); };
</script>
</body>
</html>
