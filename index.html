<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mais Frio Climatização | Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #0a192f;
            --secondary: #007aff;
            --accent: #28cd41;
            --bg: #f5f5f7;
            --radius-lg: 28px;
            --bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; border: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--primary); overflow-x: hidden; }

        /* ANIMAÇÃO DE ENTRADA */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        .reveal { opacity: 0; animation: slideIn 0.8s var(--bounce) forwards; }

        header { 
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 15px 6%; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-weight: 800; font-size: 1.3rem; letter-spacing: -1px; }
        .logo span { color: var(--secondary); }

        .cart-btn {
            background: var(--primary); color: white; padding: 10px 18px; border-radius: 50px; 
            cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600;
        }

        .hero { 
            background: radial-gradient(circle at top right, #1e3a8a, #0a192f);
            color: white; padding: 60px 6% 50px; text-align: center; 
            border-bottom-left-radius: 50px; border-bottom-right-radius: 50px;
        }

        /* BUSCA SEM ZOOM: Fonte em 16px obrigatória */
        .search-box { 
            background: white; border-radius: 20px; display: flex; align-items: center; 
            padding: 5px 20px; max-width: 600px; margin: 25px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .search-box input { 
            width: 100%; padding: 12px; font-size: 16px !important; /* Força 16px para evitar zoom */
            font-family: inherit; background: transparent; 
        }

        .filter-nav { display: flex; justify-content: center; gap: 8px; margin-top: 20px; overflow-x: auto; padding-bottom: 10px; }
        .nav-btn { 
            background: rgba(255,255,255,0.1); color: white; padding: 10px 20px; border-radius: 15px; 
            white-space: nowrap; font-weight: 600; font-size: 0.85rem;
        }
        .nav-btn.active { background: white; color: var(--primary); }

        .info-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin: -30px 6% 40px; }
        .info-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 15px; }
        .info-card i { color: var(--secondary); font-size: 1.2rem; }

        .container { padding: 0 6% 60px; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; } /* Mobile foca em 2 colunas */
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); } }

        .card { background: white; border-radius: 24px; overflow: hidden; transition: 0.4s var(--bounce); border: 1px solid rgba(0,0,0,0.03); }
        .card:active { transform: scale(0.95); }
        .card-img { width: 100%; height: 150px; background-size: contain; background-repeat: no-repeat; background-position: center; padding: 15px; margin-top: 10px; }
        .card-info { padding: 15px; text-align: center; }
        .card-price { font-size: 1.1rem; font-weight: 800; color: var(--primary); margin: 8px 0; }
        
        .btn-add { 
            width: 100%; padding: 12px; background: #f2f2f7; color: var(--primary); 
            font-weight: 700; border-radius: 14px; cursor: pointer; font-size: 0.8rem;
        }

        /* CARRINHO */
        .cart-panel { 
            position: fixed; right: -100%; top: 0; width: 100%; max-width: 400px; 
            height: 100%; background: white; z-index: 2000; transition: 0.5s var(--bounce); 
            display: flex; flex-direction: column;
        }
        .cart-panel.open { right: 0; }
        
        /* FORMULÁRIO SEM ZOOM: Fonte em 16px */
        .form-input { 
            width: 100%; padding: 16px; border-radius: 16px; background: #f2f2f7; 
            margin-bottom: 10px; font-size: 16px !important; font-family: inherit;
        }

        .btn-checkout {
            width: 100%; padding: 18px; background: var(--accent); color: white; 
            border-radius: 20px; font-weight: 800; font-size: 1rem; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        #toast { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--primary); color: white; padding: 12px 25px; border-radius: 50px; z-index: 3000; transition: 0.4s;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div id="toast">Adicionado!</div>

<header>
    <div class="logo">MAIS FRIO <span>CLIMATIZAÇÃO</span></div>
    <div onclick="toggleCart()" class="cart-btn">
        <i class="fas fa-shopping-bag"></i> <span id="cart-count">0</span>
    </div>
</header>

<section class="hero reveal">
    <h1>Conforto para sua família</h1>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar peça ou serviço..." onkeyup="filterItems()">
    </div>
    <div class="filter-nav">
        <button class="nav-btn active" id="btnAll" onclick="filterByCategory('all')">Todos</button>
        <button class="nav-btn" id="btnServ" onclick="filterByCategory('serviço')">Serviços</button>
        <button class="nav-btn" id="btnPeca" onclick="filterByCategory('peça')">Peças</button>
    </div>
</section>

<div class="info-bar container">
    <div class="info-card reveal">
        <i class="fas fa-clock"></i>
        <div style="font-size: 0.75rem;"><b>Atendimento:</b> Seg-Sex: 8h às 18h</div>
    </div>
    <div class="info-card reveal">
        <i class="fas fa-map-marker-alt"></i>
        <div style="font-size: 0.75rem;"><b>Região:</b> Presidente Médici-RO</div>
    </div>
</div>

<main class="container">
    <div class="grid" id="main-grid"></div>
</main>

<div id="cartPreview" class="cart-panel">
    <div style="padding:30px; display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid #f1f1f1;">
        <h2 style="font-weight:800;">Pedido</h2>
        <button onclick="toggleCart()" style="font-size:1.5rem; background:#f2f2f7; width:40px; height:40px; border-radius:50%;">&times;</button>
    </div>
    
    <div id="cartItems" style="flex:1; overflow-y:auto; padding: 20px;"></div>
    
    <div style="padding:25px; border-top:1px solid #f1f1f1;">
        <input type="text" id="address" class="form-input" placeholder="Seu Endereço">
        <select id="paymentMethod" class="form-input" onchange="checkPix()">
            <option value="Pix">Pix (Copiável)</option>
            <option value="Cartão">Cartão</option>
            <option value="Dinheiro">Dinheiro</option>
        </select>

        <div id="pix-area" style="display:none; background:#f0fdf4; padding:15px; border-radius:15px; margin-bottom:15px; text-align:center; border: 1px dashed #28cd41;">
            <div style="font-size: 0.7rem; font-weight:700;">CHAVE PIX: 59874260220</div>
            <button onclick="copyPix()" id="copyBtn" style="margin-top:8px; background:var(--accent); color:white; padding:8px 15px; border-radius:10px; font-size:0.8rem;">Copiar Chave</button>
        </div>

        <div style="display:flex; justify-content:space-between; font-weight:800; font-size:1.3rem; margin-bottom:20px;">
            <span>Total:</span> <span id="total-price">R$ 0,00</span>
        </div>

        <button onclick="sendWhatsAppOrder()" class="btn-checkout">
            <span>PEDIR NO WHATSAPP</span>
            <i class="fab fa-whatsapp"></i>
        </button>
    </div>
</div>

<script>
    // LISTA COMPLETA DOS 35 ITENS
    const inventory = [
        { name: "Instalação Ar Novo", price: 400, img: "Seção de Serviços.png", cat: "serviço" },
        { name: "Instalação Ar Usado", price: 250, img: "Seção de Serviços.png", cat: "serviço" },
        { name: "Manutenção Preventiva", price: 150, img: "ManutencaoPreventiva.png", cat: "serviço" },
        { name: "Carga de Gás", price: 200, img: "CargadeGas.png", cat: "serviço" },
        { name: "Capacitor Duplo 25+2.5UF", price: 30, img: "CapacitorDuplo25+2.5UF.png", cat: "peça" },
        { name: "Capacitor Duplo 30UF", price: 36, img: "CapacitorDuplo25+2.5UF.png", cat: "peça" },
        { name: "Capacitor Duplo 35UF", price: 36, img: "CapacitorDuplo25+2.5UF.png", cat: "peça" },
        { name: "Capacitor Duplo 40UF", price: 36, img: "CapacitorDuplo25+2.5UF.png", cat: "peça" },
        { name: "Capacitor Ventilador 1.0UF", price: 8.50, img: "capacitordeventilador.png", cat: "peça" },
        { name: "Capacitor Ventilador 1.5UF", price: 8.50, img: "capacitordeventilador.png", cat: "peça" },
        { name: "Capacitor Ventilador 2.5UF", price: 8.50, img: "capacitordeventilador.png", cat: "peça" },
        { name: "Capacitor Ventilador 3.0UF", price: 8.50, img: "capacitordeventilador.png", cat: "peça" },
        { name: "Contactor 18A", price: 53.50, img: "Contactor18A.png", cat: "peça" },
        { name: "Contactor 25A", price: 135.00, img: "Contactor25A.png", cat: "peça" },
        { name: "Sensor Degelo AC 05k", price: 10, img: "SensorDegeloAC05k.png", cat: "peça" },
        { name: "Controle Ar Universal", price: 80, img: "ControlArUniversal.png", cat: "peça" },
        { name: "Gás R32 (13kg)", price: 1150.00, img: "gasr3213kg.png", cat: "peça" },
        { name: "Gás R-22 Lata 1kg", price: 130, img: "GasR-22Lata1kg.png", cat: "peça" },
        { name: "Gás R-410A Lata 800g", price: 110, img: "GásR-410ALata800g.png", cat: "peça" },
        { name: "Tubulação de Cobre (kg)", price: 165, img: "TubulaçãodeCobre(kg).png", cat: "peça" },
        { name: "Suporte L Condensadora 47cm", price: 27, img: "SuporteLCondensadora47cm.png", cat: "peça" },
        { name: "Válvula de Serviço 1/4", price: 36.50, img: "valvuladeservicio.png", cat: "peça" },
        { name: "Válvula de Serviço 3/8", price: 36.50, img: "valvuladeservicio.png", cat: "peça" },
        { name: "Válvula de Serviço 1/2", price: 36.50, img: "valvuladeservicio.png", cat: "peça" },
        { name: "Polipex 1/4", price: 3.99, img: "Polipex.png", cat: "peça" },
        { name: "Polipex 3/8", price: 3.99, img: "Polipex.png", cat: "peça" },
        { name: "Polipex 1/2", price: 3.99, img: "Polipex.png", cat: "peça" },
        { name: "Fita Isolante 10mm x 0,5m", price: 5.00, img: "FitaIsolante18mmx10m.png", cat: "peça" },
        { name: "Fita Isolante 18mm x 10m", price: 12.00, img: "FitaIsolante18mmx10m.png", cat: "peça" },
        { name: "Fita De PVC", price: 3.99, img: "FitaDePVC.png", cat: "peça" },
        { name: "Bucha Plástica 0,8 C", price: 0.40, img: "BuchaPlástica0,8C.png", cat: "peça" },
        { name: "Bucha Plástica 0,10 C", price: 0.50, img: "BuchaPlástica0,10C.png", cat: "peça" },
        { name: "Bucha Plástica 0,12 C", price: 0.60, img: "BuchaPlástic0,12C.png", cat: "peça" },
        { name: "Parafuso Cônico", price: 1.00, img: "ParafusoCônico.png", cat: "peça" },
        { name: "Parafuso Sextavado", price: 1.50, img: "ParafusoSextavado.png", cat: "peça" }
    ];

    let cart = JSON.parse(localStorage.getItem('maisFrioCart')) || [];
    let currentCategory = 'all';

    function renderItems() {
        const grid = document.getElementById('main-grid');
        const term = document.getElementById('searchInput').value.toLowerCase();
        grid.innerHTML = "";
        const filtered = inventory.filter(i => i.name.toLowerCase().includes(term) && (currentCategory === 'all' || i.cat === currentCategory));
        filtered.forEach((item, index) => {
            grid.innerHTML += `
                <div class="card reveal" style="animation-delay: ${index * 0.05}s">
                    <div class="card-img" style="background-image: url('${item.img}')"></div>
                    <div class="card-info">
                        <span style="font-weight:600; font-size:0.8rem; display:block; min-height:35px;">${item.name}</span>
                        <div class="card-price">R$ ${item.price.toFixed(2).replace('.',',')}</div>
                        <button class="btn-add" onclick="addToCart('${item.name}', ${item.price})">Adicionar</button>
                    </div>
                </div>`;
        });
    }

    function addToCart(n, p) {
        let item = cart.find(x => x.name === n);
        if(item) item.qty++; else cart.push({name:n, price:p, qty:1});
        save(); showToast();
    }

    function changeQty(n, d) {
        let item = cart.find(x => x.name === n);
        if(item) { item.qty += d; if(item.qty <= 0) cart = cart.filter(x => x.name !== n); }
        save();
    }

    function save() { localStorage.setItem('maisFrioCart', JSON.stringify(cart)); updateCart(); }

    function updateCart() {
        let total = 0, count = 0;
        document.getElementById("cartItems").innerHTML = cart.map(i => {
            total += i.price * i.qty; count += i.qty;
            return `
                <div style="background:#f9f9f9; padding:15px; border-radius:15px; margin-bottom:10px;">
                    <div style="font-weight:700; font-size:0.85rem; margin-bottom:10px;">${i.name}</div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="color:var(--secondary); font-weight:800;">R$ ${(i.price * i.qty).toFixed(2).replace('.',',')}</span>
                        <div style="display:flex; align-items:center; gap:10px; background:white; padding:5px; border-radius:10px;">
                            <button onclick="changeQty('${i.name}', -1)" style="width:25px; height:25px; background:#f2f2f7; border-radius:5px;">-</button>
                            <span style="font-weight:800; font-size:0.9rem;">${i.qty}</span>
                            <button onclick="changeQty('${i.name}', 1)" style="width:25px; height:25px; background:#f2f2f7; border-radius:5px;">+</button>
                        </div>
                    </div>
                </div>`;
        }).join('');
        document.getElementById("total-price").innerText = `R$ ${total.toFixed(2).replace('.',',')}`;
        document.getElementById("cart-count").innerText = count;
    }

    function toggleCart() { document.getElementById("cartPreview").classList.toggle("open"); }
    function filterItems() { renderItems(); }
    function checkPix() { document.getElementById('pix-area').style.display = (document.getElementById('paymentMethod').value === 'Pix') ? 'block' : 'none'; }
    function showToast() { const t = document.getElementById('toast'); t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
    
    function copyPix() {
        navigator.clipboard.writeText("59874260220");
        const btn = document.getElementById('copyBtn');
        btn.innerText = "Copiado!";
        setTimeout(() => btn.innerText = "Copiar Chave", 2000);
    }

    function filterByCategory(cat) {
        currentCategory = cat;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(cat === 'all') document.getElementById('btnAll').classList.add('active');
        if(cat === 'serviço') document.getElementById('btnServ').classList.add('active');
        if(cat === 'peça') document.getElementById('btnPeca').classList.add('active');
        renderItems();
    }

    function sendWhatsAppOrder() {
        const addr = document.getElementById("address").value;
        if (!addr || cart.length === 0) return alert("Adicione itens e seu endereço!");
        let msg = `*NOVO PEDIDO - MAIS FRIO*\n\n`;
        cart.forEach(i => msg += `• ${i.name} (x${i.qty})\n`);
        msg += `\n*Total:* ${document.getElementById("total-price").innerText}\n*Endereço:* ${addr}\n*Pagamento:* ${document.getElementById('paymentMethod').value}`;
        window.open(`https://wa.me/556993060469?text=${encodeURIComponent(msg)}`);
        cart = []; save();
    }

    renderItems();
    updateCart();
    checkPix();
</script>
</body>
</html>
