<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Mais Frio Climatização | Presidente Médici</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #0d2a57;
            --secondary: #3498db;
            --accent: #25D366;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --white: #ffffff;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-light); color: var(--text-dark); line-height: 1.6; overflow-x: hidden; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reveal { animation: fadeInUp 0.6s ease forwards; }

        .top-bar {
            background: #061731; color: white; font-size: 0.75rem; padding: 8px 5%;
            display: flex; justify-content: space-between; align-items: center;
        }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-open { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
        .status-closed { background: #ef4444; }

        header {
            background: var(--white); padding: 15px 5%; display: flex; justify-content: space-between;
            align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }
        .logo { font-weight: 700; color: var(--primary); font-size: 1.2rem; }

        .whatsapp-float {
            position: fixed; width: 60px; height: 60px; bottom: 20px; right: 20px;
            background-color: #25d366; color: #FFF; border-radius: 50px; text-align: center;
            font-size: 30px; box-shadow: 2px 10px 20px rgba(0,0,0,0.1); z-index: 2500;
            display: flex; align-items: center; justify-content: center; text-decoration: none; 
            transition: var(--transition);
        }
        .whatsapp-float:hover { transform: scale(1.1); }

        .hero { background: linear-gradient(135deg, var(--primary) 0%, #1e40af 100%); color: white; padding: 60px 5%; text-align: center; }
        .search-box { background: white; border-radius: 15px; display: flex; padding: 5px 20px; max-width: 600px; margin: 20px auto; }
        .search-box input { border: none; padding: 15px; width: 100%; outline: none; }

        .container { padding: 40px 5%; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        
        .card { 
            background: var(--white); border-radius: 20px; overflow: hidden; 
            border: 1px solid rgba(0,0,0,0.05); transition: var(--transition); opacity: 0;
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 12px 25px rgba(0,0,0,0.1); }
        .card-img { width: 100%; height: 180px; background-size: cover; background-position: center; transition: 0.5s; }
        .card:hover .card-img { transform: scale(1.05); }

        .btn-add {
            width: 100%; padding: 10px; border-radius: 8px; border: none; 
            background: #f1f5f9; color: var(--primary); font-weight: 700; 
            cursor: pointer; transition: var(--transition);
        }
        .btn-add:hover { background: var(--primary); color: white; }

        .cart-panel { 
            position: fixed; right: -100%; top: 0; width: 100%; max-width: 420px; 
            height: 100%; background: white; z-index: 2000; 
            transition: 0.4s cubic-bezier(0.77, 0, 0.175, 1); box-shadow: -5px 0 30px rgba(0,0,0,0.1);
        }
        .cart-panel.open { right: 0; }

        @media (max-width: 480px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } }
    </style>
</head>
<body>

<a href="https://wa.me/556993060469" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

<div class="top-bar">
    <div id="business-status"></div>
    <div><i class="fas fa-phone-alt"></i> (69) 9306-0469</div>
</div>

<header>
    <div class="logo">MAIS FRIO <span>CLIMATIZAÇÃO</span></div>
    <button onclick="toggleCart()" style="background:var(--primary); color:white; border:none; padding:10px 20px; border-radius:50px; cursor:pointer;">
        <i class="fas fa-shopping-basket"></i> <span id="cart-count">0</span>
    </button>
</header>

<section class="hero">
    <h1 class="reveal">Peças e Serviços em Presidente Médici</h1>
    <div class="search-box reveal" style="animation-delay: 0.2s;">
        <input type="text" id="searchInput" placeholder="Buscar peça ou serviço..." onkeyup="filterItems()">
    </div>
</section>

<main class="container">
    <div class="grid" id="main-grid"></div>
</main>

<div id="cartPreview" class="cart-panel">
    <div style="padding:25px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
        <h3>Seu Pedido</h3>
        <button onclick="toggleCart()" style="border:none; background:none; font-size:2rem; cursor:pointer;">&times;</button>
    </div>
    <div id="cartItems" style="padding:20px; flex-grow:1; overflow-y:auto;"></div>
    <div style="padding:25px; background:#f8fafc; border-top:1px solid #eee;">
        <input type="text" id="address" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;" placeholder="Endereço de entrega">
        <div style="display:flex; justify-content:space-between; font-weight:700; margin-bottom:15px;">
            <span>Total:</span> <span id="total-price">R$ 0,00</span>
        </div>
        <button onclick="sendWhatsAppOrder()" style="width:100%; padding:18px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:700; cursor:pointer;">Finalizar no WhatsApp</button>
    </div>
</div>

<script>
    const inventory = [
        { name: "Instalação Ar Novo", price: 400 },
        { name: "Manutenção Preventiva", price: 150 },
        { name: "Carga de Gás", price: 200 },
        { name: "Capacitor Duplo 35UF", price: 36 }
    ];

    let cart = JSON.parse(localStorage.getItem('maisFrioCart')) || [];

    function updateBusinessStatus() {
        const d = new Date(), h = d.getHours(), day = d.getDay();
        const el = document.getElementById('business-status');
        let open = (day >= 1 && day <= 5 && h >= 8 && h < 18) || (day == 6 && h >= 8 && h < 12);
        el.innerHTML = open ? `<span class="status-dot status-open"></span> Aberto Agora` : `<span class="status-dot status-closed"></span> Fechado Agora`;
    }

    function renderItems(term = "") {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = "";
        inventory.filter(i => i.name.toLowerCase().includes(term.toLowerCase()))
        .forEach((item, index) => {
            grid.innerHTML += `<div class="card reveal" style="animation-delay: ${index * 0.1}s">
                <div class="card-img" style="background-color:#eee;"></div>
                <div style="padding:15px;">
                    <h3 style="font-size:0.9rem; min-height:40px;">${item.name}</h3>
                    <div style="font-weight:700; color:var(--primary); margin:10px 0;">R$ ${item.price.toFixed(2).replace('.', ',')}</div>
                    <button class="btn-add" onclick="addToCart('${item.name}', ${item.price})">Adicionar</button>
                </div>
            </div>`;
        });
    }

    function addToCart(name, price) {
        let item = cart.find(p => p.name === name);
        if (item) item.qty++; else cart.push({ name, price, qty: 1 });
        
        localStorage.setItem('maisFrioCart', JSON.stringify(cart));
        renderCart();

        // --- MENSAGEM RESTAURADA AQUI ---
        alert(`✅ ${name} foi adicionado ao seu carrinho!`);
    }

    function renderCart() {
        let total = 0, count = 0;
        document.getElementById("cartItems").innerHTML = cart.map(i => {
            total += i.price * i.qty; count += i.qty;
            return `<div style="display:flex;justify-content:space-between;margin-bottom:10px;">${i.name} (x${i.qty}) <span>R$ ${(i.price*i.qty).toFixed(2)}</span></div>`;
        }).join('');
        document.getElementById("total-price").innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
        document.getElementById("cart-count").innerText = count;
    }

    function toggleCart() { document.getElementById("cartPreview").classList.toggle("open"); }
    function filterItems() { renderItems(document.getElementById('searchInput').value); }
    function sendWhatsAppOrder() {
        const addr = document.getElementById("address").value;
        if (!addr) return alert("Por favor, informe seu endereço em Médici.");
        window.open(`https://wa.me/556993060469?text=${encodeURIComponent("*PEDIDO MAIS FRIO*\n" + cart.map(i => `${i.name} x${i.qty}`).join("\n") + "\n\nEndereço: " + addr)}`);
    }

    updateBusinessStatus(); renderItems(); renderCart();
</script>
</body>
</html>
