<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mais Frio Climatização | Catálogo Profissional</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0a192f;
            --secondary: #007aff;
            --accent: #28cd41;
            --bg: #f8f9fa;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.85);
            --shadow: 0 20px 40px rgba(0,0,0,0.06);
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Reset Profissional */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--primary); overflow-x: hidden; scroll-behavior: smooth; }

        /* Animação de Entrada Superior */
        .reveal { opacity: 0; transform: translateY(30px); transition: var(--transition); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* Header Estilo Apple */
        header { 
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 18px 6%; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.06);
        }
        .logo { font-weight: 800; font-size: 1.3rem; letter-spacing: -0.5px; }
        .logo span { color: var(--secondary); }

        .cart-trigger {
            background: var(--primary); color: white; padding: 12px 22px; border-radius: 50px; 
            cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 600;
            transition: var(--transition); box-shadow: 0 4px 15px rgba(10,25,47,0.2);
        }
        .cart-trigger:hover { transform: translateY(-2px); background: var(--secondary); }

        /* Hero Moderno */
        .hero { 
            background: linear-gradient(135deg, #0a192f 0%, #1e3a8a 100%);
            color: white; padding: 80px 6% 60px; text-align: center; 
            border-bottom-left-radius: 50px; border-bottom-right-radius: 50px;
        }
        .hero h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 25px; line-height: 1.2; }

        .search-container { 
            background: white; border-radius: 20px; display: flex; align-items: center; 
            padding: 5px 20px; max-width: 600px; margin: 0 auto 30px; box-shadow: var(--shadow);
        }
        .search-container i { color: #999; margin-right: 12px; }
        .search-container input { width: 100%; padding: 15px 0; font-size: 16px; border: none; outline: none; }

        .nav-tabs { display: flex; justify-content: center; gap: 12px; overflow-x: auto; padding-bottom: 10px; }
        .tab { 
            background: rgba(255,255,255,0.1); color: white; padding: 12px 25px; border-radius: 16px; 
            font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: 0.3s; white-space: nowrap;
        }
        .tab.active { background: white; color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        /* Grid de Produtos Premium */
        .main-content { padding: 40px 6% 80px; max-width: 1300px; margin: auto; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; } }

        .product-card { 
            background: white; border-radius: 30px; padding: 20px; transition: var(--transition);
            display: flex; flex-direction: column; position: relative; border: 1px solid rgba(0,0,0,0.02);
        }
        .product-card:hover { transform: translateY(-10px); box-shadow: var(--shadow); }
        
        .img-wrapper { 
            width: 100%; height: 160px; background: #f9fafb; border-radius: 20px; 
            display: flex; align-items: center; justify-content: center; margin-bottom: 15px;
            overflow: hidden;
        }
        .img-wrapper img { max-width: 85%; max-height: 85%; object-fit: contain; }

        .product-card h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 8px; color: #2d3436; min-height: 44px; }
        .price-tag { font-size: 1.4rem; font-weight: 800; color: var(--primary); margin-bottom: 15px; }
        
        .add-btn { 
            width: 100%; padding: 14px; background: var(--bg); color: var(--primary); 
            font-weight: 700; border-radius: 16px; cursor: pointer; transition: 0.3s;
        }
        .add-btn:hover { background: var(--primary); color: white; }

        /* Carrinho Lateral Profissional */
        .side-cart { 
            position: fixed; right: -100%; top: 0; width: 100%; max-width: 450px; 
            height: 100%; background: white; z-index: 2000; transition: var(--transition); 
            display: flex; flex-direction: column; box-shadow: -20px 0 60px rgba(0,0,0,0.15);
        }
        .side-cart.open { right: 0; }
        
        .cart-header { padding: 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f1f1; }
        .cart-body { flex: 1; overflow-y: auto; padding: 25px; }
        .cart-footer { padding: 30px; border-top: 1px solid #f1f1f1; background: #fff; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 8px; color: #666; }
        .premium-input { width: 100%; padding: 16px; border-radius: 14px; background: #f5f5f7; border: 1px solid transparent; font-size: 16px; transition: 0.3s; }
        .premium-input:focus { background: #fff; border-color: var(--secondary); box-shadow: 0 0 0 4px rgba(0,122,255,0.1); }

        /* Área Pix Copiável */
        .pix-box { 
            background: #f0fdf4; border: 2px dashed var(--accent); border-radius: 20px; 
            padding: 20px; margin-bottom: 20px; text-align: center; display: none;
        }
        .pix-key { font-weight: 800; font-size: 1.1rem; color: #166534; display: block; margin: 10px 0; }
        .copy-pix-btn { background: var(--accent); color: white; padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; font-size: 0.8rem; }

        .checkout-btn {
            width: 100%; padding: 20px; background: var(--accent); color: white; 
            border-radius: 20px; font-weight: 800; font-size: 1rem; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 10px 25px rgba(40,205,65,0.25);
        }

        /* Toast de Sucesso */
        #toast { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(150px);
            background: var(--primary); color: white; padding: 16px 32px; border-radius: 100px; 
            z-index: 3000; transition: var(--transition); font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        #toast.active { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div id="toast"><i class="fas fa-check-circle" style="color:var(--accent); margin-right: 8px;"></i> Item adicionado com sucesso</div>

<header>
    <div class="logo">MAIS FRIO <span>CLIMATIZAÇÃO</span></div>
    <div class="cart-trigger" onclick="toggleCart()">
        <i class="fas fa-shopping-basket"></i>
        <span id="cart-count">0</span>
    </div>
</header>

<section class="hero">
    <div class="reveal">
        <h1>Excelência em Climatização</h1>
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="search" placeholder="Buscar peças ou serviços..." onkeyup="render()">
        </div>
        <div class="nav-tabs">
            <div class="tab active" id="tab-all" onclick="filterCat('all')">Todos</div>
            <div class="tab" id="tab-serv" onclick="filterCat('serviço')">Serviços</div>
            <div class="tab" id="tab-peca" onclick="filterCat('peça')">Peças e Elétrica</div>
        </div>
    </div>
</section>

<main class="main-content">
    <div class="product-grid" id="grid"></div>
</main>

<div class="side-cart" id="sideCart">
    <div class="cart-header">
        <h2 style="font-weight:800;">Meu Pedido</h2>
        <i class="fas fa-times" onclick="toggleCart()" style="cursor:pointer; font-size: 1.5rem;"></i>
    </div>
    
    <div class="cart-body" id="cartItems">
        </div>
    
    <div class="cart-footer">
        <div class="input-group">
            <label>LOCAL DE ENTREGA/SERVIÇO</label>
            <input type="text" id="addr" class="premium-input" placeholder="Rua, Número, Bairro...">
        </div>
        
        <div class="input-group">
            <label>FORMA DE PAGAMENTO</label>
            <select id="payMethod" class="premium-input" onchange="togglePixUI()">
                <option value="Pix">Pix (Copiável)</option>
                <option value="Cartão">Cartão de Crédito/Débito</option>
                <option value="Dinheiro">Dinheiro</option>
            </select>
        </div>

        <div id="pixArea" class="pix-box">
            <small style="font-weight:bold; color:#166534">CNPJ PARA TRANSFERÊNCIA</small>
            <span class="pix-key" id="cnpj">59874260220</span>
            <button class="copy-pix-btn" onclick="copyPix()">COPIAR CHAVE PIX</button>
        </div>

        <div style="display:flex; justify-content:space-between; margin-bottom: 25px;">
            <span style="font-weight:600; color:#666;">Total Geral</span>
            <span id="total" style="font-weight:800; font-size:1.6rem; color:var(--primary);">R$ 0,00</span>
        </div>

        <button class="checkout-btn" onclick="checkout()">
            <i class="fab fa-whatsapp"></i>
            FINALIZAR PEDIDO
        </button>
    </div>
</div>

<script>
    const inventory = [
        { name: "Instalação Ar Novo", price: 400.00, img: "Seção de Serviços.png", cat: "serviço" },
        { name: "Instalação Ar Usado", price: 250.00, img: "Seção de Serviços.png", cat: "serviço" },
        { name: "Manutenção Preventiva", price: 150.00, img: "ManutencaoPreventiva.png", cat: "serviço" },
        { name: "Carga de Gás", price: 200.00, img: "CargadeGas.png", cat: "serviço" },
        { name: "Capacitor Duplo 25+2.5UF", price: 30.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peça" },
        { name: "Capacitor Duplo 30UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peça" },
        { name: "Capacitor Duplo 35UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peça" },
        { name: "Capacitor Duplo 40UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peça" },
        { name: "Capacitor Ventilador 1.0UF", price: 8.50, img: "capacitordeventilador.png", cat: "peça" },
        { name: "Capacitor Ventilador 1.5UF", price: 8.50, img: "capacitordeventilador.png", cat: "peça" },
        { name: "Capacitor Ventilador 2.5UF", price: 8.50, img: "capacitordeventilador.png", cat: "peça" },
        { name: "Capacitor Ventilador 3.0UF", price: 8.50, img: "capacitordeventilador.png", cat: "peça" },
        { name: "Contactor 18A", price: 53.50, img: "Contactor18A.png", cat: "peça" },
        { name: "Contactor 25A", price: 135.00, img: "Contactor25A.png", cat: "peça" },
        { name: "Sensor Degelo AC 05k", price: 10.00, img: "SensorDegeloAC05k.png", cat: "peça" },
        { name: "Controle Ar Universal", price: 80.00, img: "ControlArUniversal.png", cat: "peça" },
        { name: "Gás R32 (13kg)", price: 1150.00, img: "gasr3213kg.png", cat: "peça" },
        { name: "Gás R-22 Lata 1kg", price: 130.00, img: "GasR-22Lata1kg.png", cat: "peça" },
        { name: "Gás R-410A Lata 800g", price: 110.00, img: "GásR-410ALata800g.png", cat: "peça" },
        { name: "Tubulação de Cobre (kg)", price: 165.00, img: "TubulaçãodeCobre(kg).png", cat: "peça" },
        { name: "Suporte L Condensadora 47cm", price: 27.00, img: "SuporteLCondensadora47cm.png", cat: "peça" },
        { name: "Válvula de Serviço 1/4", price: 36.50, img: "valvuladeservicio.png", cat: "peça" },
        { name: "Válvula de Serviço 3/8", price: 55.99, img: "valvuladeservicio.png", cat: "peça" },
        { name: "Válvula de Serviço 1/2", price: 62.99, img: "valvuladeservicio.png", cat: "peça" },
        { name: "Polipex 1/4", price: 3.99, img: "Polipex.png", cat: "peça" },
        { name: "Polipex 3/8", price: 4.90, img: "Polipex.png", cat: "peça" },
        { name: "Polipex 1/2", price: 5.90, img: "Polipex.png", cat: "peça" },
        { name: "Fita Isolante 10mm x 0,5m", price: 4.99, img: "FitaIsolante18mmx10m.png", cat: "peça" },
        { name: "Fita Isolante 18mm x 10m", price: 6.90, img: "FitaIsolante18mmx10m.png", cat: "peça" },
        { name: "Fita De PVC", price: 3.99, img: "FitaDePVC.png", cat: "peça" },
        { name: "Bucha Plástica 0,8 C", price: 0.20, img: "BuchaPlástica0,8C.png", cat: "peça" },
        { name: "Bucha Plástica 0,10 C", price: 0.50, img: "BuchaPlástica0,10C.png", cat: "peça" },
        { name: "Bucha Plástica 0,12 C", price: 0.60, img: "BuchaPlástic0,12C.png", cat: "peça" },
        { name: "Parafuso Cônico", price: 0.35, img: "ParafusoCônico.png", cat: "peça" },
        { name: "Parafuso Sextavado", price: 1.50, img: "ParafusoSextavado.png", cat: "peça" }
    ];

    let cart = [];
    let currentCat = 'all';

    // Sistema de Observação para Animações
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
    }, { threshold: 0.1 });

    function render() {
        const grid = document.getElementById('grid');
        const term = document.getElementById('search').value.toLowerCase();
        grid.innerHTML = "";
        
        const filtered = inventory.filter(i => 
            i.name.toLowerCase().includes(term) && 
            (currentCat === 'all' || i.cat === currentCat)
        );

        filtered.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = "product-card reveal";
            card.style.transitionDelay = `${idx * 0.05}s`;
            card.innerHTML = `
                <div class="img-wrapper">
                    <img src="${item.img}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/952/952771.png'">
                </div>
                <h3>${item.name}</h3>
                <div class="price-tag">R$ ${item.price.toFixed(2).replace('.',',')}</div>
                <button class="add-btn" onclick="addToCart('${item.name}', ${item.price})">Adicionar</button>
            `;
            grid.appendChild(card);
            observer.observe(card);
        });
    }

    function addToCart(n, p) {
        let item = cart.find(x => x.name === n);
        if(item) item.qty++; else cart.push({name:n, price:p, qty:1});
        updateCart();
        showToast();
    }

    function updateCart() {
        let total = 0, count = 0;
        document.getElementById('cartItems').innerHTML = cart.map((item, idx) => {
            total += item.price * item.qty;
            count += item.qty;
            return `
                <div style="display:flex; justify-content:space-between; align-items:center; background:#f9fafb; padding:15px; border-radius:18px; margin-bottom:12px;">
                    <div>
                        <div style="font-weight:700; font-size:0.85rem;">${item.name}</div>
                        <div style="color:var(--secondary); font-weight:800; font-size:0.9rem; margin-top:4px;">R$ ${(item.price * item.qty).toFixed(2)}</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <button onclick="changeQty(${idx}, -1)" style="width:30px; height:30px; border-radius:8px; background:white; cursor:pointer;">-</button>
                        <span style="font-weight:800;">${item.qty}</span>
                        <button onclick="changeQty(${idx}, 1)" style="width:30px; height:30px; border-radius:8px; background:white; cursor:pointer;">+</button>
                    </div>
                </div>`;
        }).join('');
        document.getElementById('total').innerText = `R$ ${total.toFixed(2).replace('.',',')}`;
        document.getElementById('cart-count').innerText = count;
    }

    function changeQty(idx, val) {
        cart[idx].qty += val;
        if(cart[idx].qty <= 0) cart.splice(idx, 1);
        updateCart();
    }

    function toggleCart() { document.getElementById('sideCart').classList.toggle('open'); }
    
    function togglePixUI() {
        document.getElementById('pixArea').style.display = (document.getElementById('payMethod').value === 'Pix') ? 'block' : 'none';
    }

    function copyPix() {
        const key = "59874260220";
        navigator.clipboard.writeText(key).then(() => {
            const btn = document.querySelector('.copy-pix-btn');
            btn.innerText = "CHAVE COPIADA!";
            btn.style.background = "#15803d";
            setTimeout(() => { btn.innerText = "COPIAR CHAVE PIX"; btn.style.background = "var(--accent)"; }, 2000);
        });
    }

    function filterCat(cat) {
        currentCat = cat;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + (cat === 'all' ? 'all' : cat === 'serviço' ? 'serv' : 'peca')).classList.add('active');
        render();
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 2500);
    }

    function checkout() {
        const addr = document.getElementById('addr').value;
        if(!addr || cart.length === 0) return alert("Por favor, preencha o endereço e adicione produtos!");
        let msg = `🚀 *NOVO PEDIDO - MAIS FRIO*\n\n`;
        cart.forEach(i => msg += `*${i.qty}x* ${i.name}\n`);
        msg += `\n💰 *Total:* ${document.getElementById('total').innerText}`;
        msg += `\n📍 *Endereço:* ${addr}`;
        msg += `\n💳 *Pagamento:* ${document.getElementById('payMethod').value}`;
        window.open(`https://wa.me/556993060469?text=${encodeURIComponent(msg)}`);
    }

    // Inicialização Profissional
    window.onload = () => {
        render();
        togglePixUI();
        document.querySelector('.hero .reveal').classList.add('active');
    };
</script>
</body>
</html>
