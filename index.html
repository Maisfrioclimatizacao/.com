<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mais Frio | Climatização Profissional</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0f172a;
            --secondary: #2563eb;
            --accent: #10b981;
            --text-main: #1e293b;
            --text-light: #64748b;
            --bg: #f8fafc;
            --white: #ffffff;
            --spring: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); overflow-x: hidden; scroll-behavior: smooth; }
        body.modal-open { overflow: hidden; }

        /* --- HEADER PREMIUM --- */
        header { 
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 18px 6%; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: -1px; text-transform: uppercase; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .logo i { color: var(--secondary); font-size: 1.4rem; }
        .logo span { color: var(--secondary); }
        
        .cart-btn { 
            background: var(--primary); color: white; padding: 10px 20px; border-radius: 14px; 
            cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 700; 
            transition: all 0.3s var(--spring); border: none;
        }
        .cart-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(15, 23, 42, 0.2); }
        .cart-badge { background: var(--secondary); color: white; min-width: 20px; height: 20px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; }

        /* --- HERO SECTION --- */
        .hero { 
            background: var(--primary); padding: 60px 6% 80px; text-align: center;
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
        }
        .hero h1 { color: white; font-size: 2.2rem; font-weight: 800; margin-bottom: 24px; letter-spacing: -1px; line-height: 1.2; }
        
        .search-wrapper { 
            background: white; border-radius: 18px; padding: 4px; 
            width: 100%; max-width: 550px; display: flex; align-items: center; 
            margin: 0 auto; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .search-wrapper i { margin-left: 18px; color: var(--text-light); }
        .search-wrapper input { width: 100%; padding: 14px; border: none; outline: none; font-size: 1rem; font-weight: 500; color: var(--primary); }

        .filter-bar { display: flex; gap: 10px; justify-content: center; margin-top: 30px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .filter-chip { 
            padding: 10px 22px; background: rgba(255,255,255,0.1); color: white; 
            border-radius: 12px; font-size: 0.85rem; font-weight: 600; cursor: pointer; 
            white-space: nowrap; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1);
        }
        .filter-chip.active { background: var(--white); color: var(--primary); }

        /* --- GRID DE PRODUTOS --- */
        .content { padding: 40px 6%; max-width: 1400px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; } }

        .item-card { 
            background: var(--white); border-radius: 24px; overflow: hidden; display: flex; 
            flex-direction: column; transition: all 0.4s var(--spring); border: 1px solid #f1f5f9;
        }
        .item-card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.08); }

        .img-container { 
            width: 100%; height: 200px; background: #fff; position: relative; 
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .img-container img { max-width: 90%; max-height: 90%; object-fit: contain; }
        
        .tag { position: absolute; top: 15px; left: 15px; padding: 5px 12px; border-radius: 8px; font-size: 0.65rem; font-weight: 700; color: white; text-transform: uppercase; }
        .tag-peca { background: var(--secondary); }
        .tag-servico { background: var(--accent); }

        .card-info { padding: 20px; text-align: left; display: flex; flex-direction: column; flex-grow: 1; }
        .card-info h3 { font-size: 0.95rem; font-weight: 700; color: var(--primary); margin-bottom: 8px; line-height: 1.4; height: 42px; overflow: hidden; }
        .card-info .price { font-size: 1.3rem; font-weight: 800; color: var(--primary); margin-bottom: 18px; }
        
        .btn-buy { 
            width: 100%; background: #f1f5f9; color: var(--primary); padding: 14px; 
            border: none; border-radius: 14px; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .btn-buy:hover { background: var(--primary); color: white; }

        /* --- CARRINHO LATERAL --- */
        .cart-drawer { 
            position: fixed; right: -100%; top: 0; width: 100%; max-width: 450px; height: 100%; 
            background: white; z-index: 2000; transition: 0.5s var(--spring); 
            display: flex; flex-direction: column; box-shadow: -20px 0 50px rgba(0,0,0,0.1);
        }
        .cart-drawer.open { right: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); z-index: 1900; display: none; }
        .overlay.active { display: block; }

        .cart-head { padding: 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; }
        .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
        
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #f8fafc; padding: 15px; border-radius: 18px; }

        /* --- PIX DESIGN --- */
        .pix-container { background: #f0fdf4; border: 2px dashed #bbf7d0; border-radius: 18px; padding: 18px; margin-bottom: 20px; cursor: pointer; position: relative; }
        .pix-container strong { display: block; font-size: 1.1rem; color: #166534; margin-top: 4px; }
        .copy-toast { position: absolute; top: 10px; right: 10px; font-size: 0.6rem; background: var(--accent); color: white; padding: 2px 8px; border-radius: 5px; opacity: 0; transition: 0.3s; }
        .pix-container.copied .copy-toast { opacity: 1; }

        .footer-cart { padding: 25px; border-top: 1px solid #f1f5f9; }
        .input-pro { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 12px; font-weight: 500; outline: none; transition: 0.3s; }
        .input-pro:focus { border-color: var(--secondary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .btn-finish { width: 100%; background: var(--accent); color: white; padding: 18px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; font-size: 1rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-finish:hover { filter: brightness(1.1); transform: translateY(-2px); }

        #toast-msg { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--primary); color: white; padding: 14px 30px; border-radius: 12px; z-index: 3000; font-weight: 600; transition: 0.4s var(--spring); }
        #toast-msg.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<header>
    <div class="logo"><i class="fas fa-snowflake"></i> MAIS FRIO <span>CLIMATIZAÇÃO</span></div>
    <button class="cart-btn" onclick="toggleCart()">
        <i class="fas fa-shopping-bag"></i>
        <span class="cart-badge" id="count">0</span>
    </button>
</header>

<section class="hero">
    <h1>Peças e Serviços de<br>Alta Performance</h1>
    <div class="search-wrapper">
        <i class="fas fa-search"></i>
        <input type="text" id="search" placeholder="O que você está procurando?" onkeyup="render()">
    </div>
    <div class="filter-bar">
        <div class="filter-chip active" id="f-all" onclick="filter('all')">Todos Itens</div>
        <div class="filter-chip" id="f-servico" onclick="filter('servico')">Serviços</div>
        <div class="filter-chip" id="f-peca" onclick="filter('peca')">Peças Originais</div>
    </div>
</section>

<main class="content">
    <div class="grid" id="grid"></div>
</main>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<div class="cart-drawer" id="cart">
    <div class="cart-head">
        <h2 style="font-weight: 800;">Seu Carrinho</h2>
        <i class="fas fa-times" onclick="toggleCart()" style="cursor:pointer; font-size: 1.2rem; opacity: 0.4;"></i>
    </div>
    <div class="cart-items" id="cart-list"></div>
    
    <div class="footer-cart">
        <input type="text" id="address" class="input-pro" placeholder="Endereço de Entrega">
        <select id="payment" class="input-pro" onchange="togglePix()">
            <option value="Pix">Pix (Copia e Cola)</option>
            <option value="Cartão de Crédito/Débito">Cartão de Crédito/Débito</option>
            <option value="Dinheiro">Dinheiro</option>
        </select>

        <div id="pix-box" class="pix-container" onclick="copyPix()">
            <span class="copy-toast">COPIADO!</span>
            <small style="color: #166534; font-weight: 600;"><i class="fas fa-copy"></i> Clique para copiar o CNPJ Pix:</small>
            <strong>59874260220</strong>
        </div>

        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <span style="font-weight: 600; color: var(--text-light);">Subtotal</span>
            <span id="total" style="font-weight: 800; font-size: 1.4rem;">R$ 0,00</span>
        </div>
        
        <button class="btn-finish" onclick="checkout()">
            <i class="fab fa-whatsapp"></i> FINALIZAR PEDIDO
        </button>
    </div>
</div>

<div id="toast-msg">Item adicionado com sucesso!</div>

<script>
    const products = [
        { name: "Instalação Ar Novo", price: 400.00, img: "Seção de Serviços.png", cat: "servico" },
        { name: "Instalação Ar Usado", price: 250.00, img: "Seção de Serviços.png", cat: "servico" },
        { name: "Manutenção Preventiva", price: 150.00, img: "ManutencaoPreventiva.png", cat: "servico" },
        { name: "Carga de Gás", price: 200.00, img: "CargadeGas.png", cat: "servico" },
        { name: "Capacitor Duplo 25+2.5UF", price: 30.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 30UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 35UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 40UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Ventilador 1.0UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 1.5UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 2.5UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 3.0UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Contactor 18A", price: 53.50, img: "Contactor18A.png", cat: "peca" },
        { name: "Contactor 25A", price: 135.00, img: "Contactor25A.png", cat: "peca" },
        { name: "Sensor Degelo AC 05k", price: 10.00, img: "SensorDegeloAC05k.png", cat: "peca" },
        { name: "Controle Ar Universal", price: 80.00, img: "ControlArUniversal.png", cat: "peca" },
        { name: "Gás R32 (13kg)", price: 1150.00, img: "gasr3213kg.png", cat: "peca" },
        { name: "Gás R-22 Lata 1kg", price: 130.00, img: "GasR-22Lata1kg.png", cat: "peca" },
        { name: "Gás R-410A Lata 800g", price: 110.00, img: "GásR-410ALata800g.png", cat: "peca" },
        { name: "Tubulação de Cobre (kg)", price: 165.00, img: "TubulaçãodeCobre(kg).png", cat: "peca" },
        { name: "Suporte L Condensadora 47cm", price: 27.00, img: "SuporteLCondensadora47cm.png", cat: "peca" },
        { name: "Válvula de Serviço 1/4", price: 36.50, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Válvula de Serviço 3/8", price: 55.99, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Válvula de Serviço 1/2", price: 62.99, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Polipex 1/4", price: 3.99, img: "Polipex.png", cat: "peca" },
        { name: "Polipex 3/8", price: 4.90, img: "Polipex.png", cat: "peca" },
        { name: "Polipex 1/2", price: 5.90, img: "Polipex.png", cat: "peca" },
        { name: "Fita Isolante 10mm x 0,5m", price: 4.99, img: "FitaIsolante18mmx10m.png", cat: "peca" },
        { name: "Fita Isolante 18mm x 10m", price: 6.90, img: "FitaIsolante18mmx10m.png", cat: "peca" },
        { name: "Fita De PVC", price: 3.99, img: "FitaDePVC.png", cat: "peca" },
        { name: "Bucha Plástica 0,8 C", price: 0.20, img: "BuchaPlástica0,8C.png", cat: "peca" },
        { name: "Bucha Plástica 0,10 C", price: 0.50, img: "BuchaPlástica0,10C.png", cat: "peca" },
        { name: "Bucha Plástica 0,12 C", price: 0.60, img: "BuchaPlástic0,12C.png", cat: "peca" },
        { name: "Parafuso Cônico", price: 0.35, img: "ParafusoCônico.png", cat: "peca" },
        { name: "Parafuso Sextavado", price: 1.50, img: "ParafusoSextavado.png", cat: "peca" }
    ];

    let cart = JSON.parse(localStorage.getItem('maisfrio_pro_cart')) || [];
    let activeFilter = 'all';

    function render() {
        const grid = document.getElementById('grid');
        const query = document.getElementById('search').value.toLowerCase();
        grid.innerHTML = "";
        
        const filtered = products.filter(p => p.name.toLowerCase().includes(query) && (activeFilter === 'all' || p.cat === activeFilter));

        filtered.forEach((p, i) => {
            const card = document.createElement('div');
            card.className = 'item-card';
            card.innerHTML = `
                <div class="img-container">
                    <span class="tag tag-${p.cat}">${p.cat}</span>
                    <img src="${p.img}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/952/952771.png'">
                </div>
                <div class="card-info">
                    <h3>${p.name}</h3>
                    <div class="price">R$ ${p.price.toFixed(2).replace('.',',')}</div>
                    <button class="btn-buy" onclick="add('${p.name}', ${p.price})">Adicionar</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function filter(c) {
        activeFilter = c;
        document.querySelectorAll('.filter-chip').forEach(t => t.classList.remove('active'));
        document.getElementById('f-'+c).classList.add('active');
        render();
    }

    function add(n, p) {
        let item = cart.find(i => i.n === n);
        if(item) item.q++; else cart.push({n, p, q: 1});
        update();
        showToast();
    }

    function update() {
        localStorage.setItem('maisfrio_pro_cart', JSON.stringify(cart));
        const list = document.getElementById('cart-list');
        let total = 0;
        list.innerHTML = "";
        
        cart.forEach((item, idx) => {
            total += item.p * item.q;
            list.innerHTML += `
                <div class="cart-item">
                    <div style="flex:1">
                        <div style="font-weight:700; font-size:0.9rem;">${item.n}</div>
                        <div style="color:var(--secondary); font-weight:800; font-size:1rem;">R$ ${(item.p*item.q).toFixed(2).replace('.',',')}</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <button onclick="qty(${idx},-1)" style="width:28px; height:28px; border-radius:8px; border:1px solid #ddd; background:white;">-</button>
                        <span style="font-weight:700;">${item.q}</span>
                        <button onclick="qty(${idx},1)" style="width:28px; height:28px; border-radius:8px; border:1px solid #ddd; background:white;">+</button>
                    </div>
                </div>
            `;
        });
        document.getElementById('total').innerText = `R$ ${total.toFixed(2).replace('.',',')}`;
        document.getElementById('count').innerText = cart.reduce((a,b) => a + b.q, 0);
        togglePix();
    }

    function qty(i, v) {
        cart[i].q += v;
        if(cart[i].q <= 0) cart.splice(i, 1);
        update();
    }

    function toggleCart() {
        document.getElementById('cart').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
        document.body.classList.toggle('modal-open');
    }

    function togglePix() {
        const pay = document.getElementById('payment').value;
        document.getElementById('pix-box').style.display = pay === 'Pix' ? 'block' : 'none';
    }

    function copyPix() {
        navigator.clipboard.writeText("59874260220");
        const box = document.getElementById('pix-box');
        box.classList.add('copied');
        setTimeout(() => box.classList.remove('copied'), 2000);
    }

    function showToast() {
        const t = document.getElementById('toast-msg');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    function checkout() {
        const addr = document.getElementById('address').value;
        if(!addr || cart.length === 0) return alert("Por favor, preencha o endereço de entrega.");
        let msg = `*NOVO PEDIDO - MAIS FRIO*\n\n`;
        cart.forEach(i => msg += `📦 *${i.n}* (x${i.q}) - R$ ${(i.p*i.q).toFixed(2)}\n`);
        msg += `\n*Pagamento:* ${document.getElementById('payment').value}\n*Total:* ${document.getElementById('total').innerText}\n*Endereço:* ${addr}`;
        window.open(`https://wa.me/556993060469?text=${encodeURIComponent(msg)}`);
    }

    window.onload = () => { render(); update(); };
</script>
</body>
</html>
