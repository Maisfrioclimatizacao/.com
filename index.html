<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Mais Frio Climatização | Presidente Médici</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #0d2a57;
            --secondary: #3498db;
            --accent: #25D366;
            --bg-light: #f4f7fa;
            --white: #ffffff;
            --shadow-premium: 0 20px 40px rgba(13, 42, 87, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-light); color: #2d3436; overflow-x: hidden; scroll-behavior: smooth; }

        /* ANIMAÇÕES PROFISSIONAIS */
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(40px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .reveal { 
            opacity: 0; 
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }

        /* HEADER */
        header { 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-weight: 700; color: var(--primary); font-size: 1.3rem; letter-spacing: -0.5px; }
        .logo span { color: var(--secondary); font-weight: 400; }

        .cart-btn {
            background: var(--primary); color: white; border: none; 
            padding: 12px 25px; border-radius: 50px; cursor: pointer;
            display: flex; align-items: center; gap: 12px; transition: 0.3s;
            box-shadow: 0 8px 20px rgba(13, 42, 87, 0.2);
        }
        .cart-btn:active { transform: scale(0.95); }

        /* HERO */
        .hero { 
            background: linear-gradient(145deg, var(--primary) 0%, #1e40af 100%); 
            color: white; padding: 60px 5% 40px; text-align: center; 
            border-bottom-left-radius: 50px; border-bottom-right-radius: 50px;
        }
        .search-box { 
            background: white; border-radius: 25px; display: flex; align-items: center; 
            padding: 5px 25px; max-width: 600px; margin: 25px auto; box-shadow: var(--shadow-premium);
        }
        .search-box input { border: none; padding: 15px; width: 100%; font-size: 16px; font-family: inherit; color: #333; }

        .filter-nav { display: flex; justify-content: center; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
        .nav-btn { 
            background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 24px; border-radius: 50px; cursor: pointer; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .nav-btn.active { background: var(--white); color: var(--primary); font-weight: 600; transform: translateY(-3px); }

        /* GRID */
        .container { padding: 40px 5%; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        
        .card { 
            background: var(--white); border-radius: 25px; overflow: hidden; 
            border: 1px solid rgba(0,0,0,0.03); transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .card:hover { transform: translateY(-12px); box-shadow: 0 30px 60px rgba(13, 42, 87, 0.12); border-color: var(--secondary); }
        .card-img { width: 100%; height: 180px; background-size: contain; background-repeat: no-repeat; background-position: center; background-color: #fff; padding: 20px; transition: 0.5s; }
        .card:hover .card-img { transform: scale(1.05); }

        .card-info { padding: 20px; text-align: center; }
        .btn-add { 
            width: 100%; padding: 14px; border: none; background: #f1f5f9; 
            color: var(--primary); font-weight: 700; cursor: pointer; 
            border-radius: 15px; transition: 0.3s;
        }
        .btn-add:hover { background: var(--primary); color: white; }

        /* CARRINHO */
        .cart-panel { 
            position: fixed; right: -100%; top: 0; width: 100%; max-width: 450px; 
            height: 100%; background: white; z-index: 2000; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
            display: flex; flex-direction: column; box-shadow: -30px 0 60px rgba(0,0,0,0.15); 
        }
        .cart-panel.open { right: 0; }
        .cart-items { flex-grow: 1; overflow-y: auto; padding: 25px; }
        
        /* CONTROLES DE QUANTIDADE GRANDES */
        .qty-row { 
            display: flex; align-items: center; background: #f8fafc; 
            border-radius: 15px; padding: 6px; gap: 15px; border: 1px solid #edf2f7;
        }
        .btn-qty-plus { 
            width: 40px; height: 40px; border-radius: 12px; border: none; 
            background: white; color: var(--primary); cursor: pointer; 
            font-size: 1.3rem; font-weight: 700; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .btn-qty-plus:active { transform: scale(0.9); background: #eee; }

        /* ÁREA PIX */
        .pix-box { 
            background: #f0fdf4; border: 2px dashed #bbf7d0; padding: 15px; 
            border-radius: 18px; margin-bottom: 20px; text-align: center;
        }
        .btn-copy-pix {
            background: var(--accent); color: white; border: none; padding: 8px 15px;
            border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 0.8rem;
            margin-top: 10px; transition: 0.3s; width: 100%;
        }

        /* TOAST */
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--primary); color: white; padding: 18px 35px; border-radius: 50px; 
            z-index: 3000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); font-weight: 500;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        @media (max-width: 480px) { 
            .grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .hero h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div id="toast"><i class="fas fa-check-circle"></i> Item Adicionado!</div>

<header>
    <div class="logo">MAIS FRIO <span>CLIMATIZAÇÃO</span></div>
    <button onclick="toggleCart()" class="cart-btn" id="cartBtn">
        <i class="fas fa-shopping-cart"></i> <span id="cart-count">0</span>
    </button>
</header>

<section class="hero reveal">
    <h1>Excelência em Ar Condicionado</h1>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="O que você procura hoje?" onkeyup="filterItems()">
    </div>
    <div class="filter-nav">
        <button class="nav-btn active" id="btnAll" onclick="filterByCategory('all')">Tudo</button>
        <button class="nav-btn" id="btnServ" onclick="filterByCategory('serviço')"><i class="fas fa-hand-holding-heart"></i> Serviços</button>
        <button class="nav-btn" id="btnPeca" onclick="filterByCategory('peça')"><i class="fas fa-cog"></i> Peças</button>
    </div>
</section>

<main class="container">
    <div class="grid" id="main-grid"></div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-top: 60px;">
        <div class="info-card reveal" style="background: white; padding: 30px; border-radius: 30px; border-left: 6px solid var(--secondary);">
            <h3 style="color:var(--primary); margin-bottom:10px;"><i class="fas fa-map-marker-alt"></i> Presidente Médici</h3>
            <p style="font-size: 0.9rem; color: #666;">Atendemos toda a cidade, zona rural e região com rapidez e garantia.</p>
        </div>
        <div class="info-card reveal" style="background: white; padding: 30px; border-radius: 30px; border-left: 6px solid var(--accent); animation-delay: 0.1s;">
            <h3 style="color:var(--primary); margin-bottom:10px;"><i class="fas fa-calendar-check"></i> Horários</h3>
            <p style="font-size: 0.9rem; color: #666;">Segunda a Sexta: 08:00 - 18:00<br>Sábados: 08:00 - 12:00</p>
        </div>
    </div>
</main>

<div id="cartPreview" class="cart-panel">
    <div style="padding:30px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
        <h3 style="font-weight:700; color:var(--primary); font-size: 1.4rem;">Meu Pedido</h3>
        <button onclick="toggleCart()" style="background:none; border:none; font-size:2rem; cursor:pointer; color:#ccc;">&times;</button>
    </div>
    
    <div id="cartItems" class="cart-items"></div>
    
    <div style="padding:30px; background:#fcfdfe; border-top:1px solid #eee;">
        <input type="text" id="address" placeholder="Onde entregar? (Endereço)" 
               style="width:100%; padding:15px; border-radius:15px; border:1px solid #e2e8f0; margin-bottom:12px; font-family:inherit;">
        
        <select id="paymentMethod" onchange="checkPix()" 
                style="width:100%; padding:15px; border-radius:15px; border:1px solid #e2e8f0; margin-bottom:15px; font-family:inherit; appearance:none; background:white;">
            <option value="Pix">Pagar no Pix (Copiável)</option>
            <option value="Cartão">Cartão (Débito/Crédito)</option>
            <option value="Dinheiro">Dinheiro</option>
        </select>

        <div id="pix-area" class="pix-box" style="display:none;">
            <p style="font-size: 0.75rem; color: #166534; font-weight: 600;">CHAVE PIX CNPJ:</p>
            <strong id="pixKey" style="font-size: 1rem; color: var(--primary);">59.874.260/0001-22</strong><br>
            <button class="btn-copy-pix" id="copyBtn" onclick="copyPix()">
                <i class="far fa-copy"></i> COPIAR CHAVE
            </button>
        </div>

        <div style="display:flex; justify-content:space-between; font-weight:700; font-size:1.3rem; margin-bottom:20px; color:var(--primary);">
            <span>Total:</span> <span id="total-price">R$ 0,00</span>
        </div>

        <button onclick="sendWhatsAppOrder()" 
                style="width:100%; padding:20px; background:var(--accent); color:white; border:none; border-radius:18px; font-weight:700; cursor:pointer; box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2);">
            FINALIZAR NO WHATSAPP
        </button>
    </div>
</div>

<script>
    // LISTA DEFINITIVA E COMPLETA (26 ITENS)
    const inventory = [
        { name: "Instalação Ar Novo", price: 400, img: "Seção de Serviços.png", cat: "serviço" },
        { name: "Instalação Ar Usado", price: 250, img: "Seção de Serviços.png", cat: "serviço" },
        { name: "Manutenção Preventiva", price: 150, img: "ManutencaoPreventiva.png", cat: "serviço" },
        { name: "Carga de Gás", price: 200, img: "CargadeGas.png", cat: "serviço" },
        { name: "Capacitor Duplo 25+2.5UF", price: 30, img: "CapacitorDuplo25+2.5UF.png", cat: "peça" },
        { name: "Capacitor Duplo 30UF", price: 36, img: "CapacitorDuplo25+2.5UF.png", cat: "peça" },
        { name: "Capacitor Duplo 35UF", price: 36, img: "CapacitorDuplo25+2.5UF.png", cat: "peça" },
        { name: "Capacitor Duplo 40UF", price: 36, img: "CapacitorDuplo25+2.5UF.png", cat: "peça" },
        { name: "Capacitor Ventilador 1.0UF", price: 8.50, img: "capacitordeventilador.png", cat: "peça" },
        { name: "Capacitor Ventilador 1.5UF", price: 8.50, img: "capacitordeventilador.png", cat: "peça" },
        { name: "Capacitor Ventilador 2.5UF", price: 8.50, img: "capacitordeventilador.png", cat: "peça" },
        { name: "Capacitor Ventilador 3.0UF", price: 8.50, img: "capacitordeventilador.png", cat: "peça" },
        { name: "Contactor 18A", price: 53.50, img: "Contactor18A.png", cat: "peça" },
        { name: "Contactor 25A", price: 135.00, img: "Contactor25A.png", cat: "peça" },
        { name: "Sensor Degelo AC 05k", price: 10, img: "SensorDegeloAC05k.png", cat: "peça" },
        { name: "Controle Ar Universal", price: 80, img: "ControlArUniversal.png", cat: "peça" },
        { name: "Gás R32 (13kg)", price: 1150.00, img: "gasr3213kg.png", cat: "peça" },
        { name: "Gás R-22 Lata 1kg", price: 130, img: "GasR-22Lata1kg.png", cat: "peça" },
        { name: "Gás R-410A Lata 800g", price: 110, img: "GásR-410ALata800g.png", cat: "peça" },
        { name: "Tubulação de Cobre (kg)", price: 165, img: "TubulaçãodeCobre(kg).png", cat: "peça" },
        { name: "Suporte L Condensadora 47cm", price: 27, img: "SuporteLCondensadora47cm.png", cat: "peça" },
        { name: "Válvula de Serviço 1/4", price: 36.50, img: "valvuladeservicio.png", cat: "peça" },
        { name: "Polipex 1/4", price: 3.99, img: "Polipex.png", cat: "peça" },
        { name: "Fita De PVC", price: 3.99, img: "FitaDePVC.png", cat: "peça" },
        { name: "Bucha Plástica 0,12 C", price: 0.60, img: "BuchaPlástic0,12C.png", cat: "peça" },
        { name: "Parafuso Sextavado", price: 1.50, img: "ParafusoSextavado.png", cat: "peça" }
    ];

    let cart = JSON.parse(localStorage.getItem('maisFrioCart')) || [];
    let currentCategory = 'all';

    function renderItems(term = "") {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = "";
        const filtered = inventory.filter(i => 
            i.name.toLowerCase().includes(term.toLowerCase()) && 
            (currentCategory === 'all' || i.cat === currentCategory)
        );
        filtered.forEach((item, index) => {
            grid.innerHTML += `
                <div class="card reveal" style="animation-delay: ${index * 0.05}s">
                    <div class="card-img" style="background-image: url('${item.img}')"></div>
                    <div class="card-info">
                        <h4 style="font-size: 0.85rem; font-weight: 600; min-height: 40px; color: var(--primary);">${item.name}</h4>
                        <div style="font-weight:700; color:var(--secondary); margin:10px 0;">R$ ${item.price.toFixed(2).replace('.',',')}</div>
                        <button class="btn-add" onclick="addToCart('${item.name}', ${item.price})">ADICIONAR</button>
                    </div>
                </div>`;
        });
    }

    function filterByCategory(cat) {
        currentCategory = cat;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(cat === 'all') document.getElementById('btnAll').classList.add('active');
        if(cat === 'serviço') document.getElementById('btnServ').classList.add('active');
        if(cat === 'peça') document.getElementById('btnPeca').classList.add('active');
        renderItems(document.getElementById('searchInput').value);
    }

    function addToCart(name, price) {
        let item = cart.find(p => p.name === name);
        if (item) item.qty++; else cart.push({ name, price, qty: 1 });
        saveAndUpdate();
        showToast();
    }

    function changeQty(name, delta) {
        let item = cart.find(p => p.name === name);
        if (item) {
            item.qty += delta;
            if (item.qty <= 0) cart = cart.filter(p => p.name !== name);
        }
        saveAndUpdate();
    }

    function saveAndUpdate() {
        localStorage.setItem('maisFrioCart', JSON.stringify(cart));
        updateCart();
    }

    function updateCart() {
        let total = 0, count = 0;
        document.getElementById("cartItems").innerHTML = cart.map(i => {
            total += i.price * i.qty; count += i.qty;
            return `
                <div class="cart-item-row" style="animation: slideUpFade 0.4s ease forwards">
                    <div style="flex:1">
                        <div style="font-size:0.9rem; font-weight:600; color:var(--primary);">${i.name}</div>
                        <div style="color:var(--secondary); font-weight:700;">R$ ${(i.price * i.qty).toFixed(2).replace('.',',')}</div>
                    </div>
                    <div class="qty-row">
                        <button class="btn-qty-plus" onclick="changeQty('${i.name}', -1)">-</button>
                        <span style="font-weight:700; min-width:20px; text-align:center;">${i.qty}</span>
                        <button class="btn-qty-plus" onclick="changeQty('${i.name}', 1)">+</button>
                    </div>
                </div>`;
        }).join('');
        document.getElementById("total-price").innerText = `R$ ${total.toFixed(2).replace('.',',')}`;
        document.getElementById("cart-count").innerText = count;
    }

    function copyPix() {
        const key = "59.874.260/0001-22";
        navigator.clipboard.writeText(key.replace(/\D/g, '')); // Copia apenas números para o banco
        const btn = document.getElementById('copyBtn');
        btn.innerHTML = '<i class="fas fa-check"></i> COPIADO!';
        btn.style.background = "#059669";
        setTimeout(() => {
            btn.innerHTML = '<i class="far fa-copy"></i> COPIAR CHAVE';
            btn.style.background = "var(--accent)";
        }, 2000);
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    function toggleCart() { document.getElementById("cartPreview").classList.toggle("open"); }
    function filterItems() { renderItems(document.getElementById('searchInput').value); }
    function checkPix() { document.getElementById('pix-area').style.display = (document.getElementById('paymentMethod').value === 'Pix') ? 'block' : 'none'; }
    
    function sendWhatsAppOrder() {
        const addr = document.getElementById("address").value;
        if (!addr) return alert("Por favor, informe seu endereço!");
        if (cart.length === 0) return alert("Seu carrinho está vazio!");
        let msg = `*NOVO PEDIDO - MAIS FRIO*\n\n`;
        cart.forEach(i => msg += `• ${i.name} (x${i.qty})\n`);
        msg += `\n*Total:* ${document.getElementById("total-price").innerText}\n*Endereço:* ${addr}\n*Pagamento:* ${document.getElementById('paymentMethod').value}`;
        window.open(`https://wa.me/556993060469?text=${encodeURIComponent(msg)}`);
        cart = []; saveAndUpdate();
    }

    // Inicialização
    renderItems();
    updateCart();
    checkPix();
</script>
</body>
</html>
