<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Mais Frio Climatização | Presidente Médici</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #0d2a57;
            --secondary: #3498db;
            --accent: #25D366;
            --bg-light: #f4f7fa;
            --white: #ffffff;
            --shadow-md: 0 10px 30px rgba(13, 42, 87, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-light); color: #2d3436; overflow-x: hidden; scroll-behavior: smooth; }

        /* ANIMAÇÕES PREMIUM */
        @keyframes expertReveal {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .reveal { opacity: 0; animation: expertReveal 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        /* HEADER */
        header { 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-weight: 700; color: var(--primary); font-size: 1.3rem; }
        .cart-btn {
            background: var(--primary); color: white; border: none; 
            padding: 10px 22px; border-radius: 50px; cursor: pointer;
            display: flex; align-items: center; gap: 10px; transition: 0.3s;
        }

        /* HERO & FILTRO */
        .hero { 
            background: linear-gradient(145deg, var(--primary) 0%, #1e40af 100%); 
            color: white; padding: 50px 5% 30px; text-align: center; 
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
        }
        .search-box { 
            background: white; border-radius: 20px; display: flex; align-items: center; 
            padding: 5px 25px; max-width: 600px; margin: 20px auto 15px; box-shadow: var(--shadow-md);
        }
        .search-box input { border: none; padding: 15px; width: 100%; outline: none; font-size: 16px; font-family: inherit; }
        
        /* BOTÃO DE SERVIÇOS RÁPIDO */
        .filter-tags { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .tag-btn { 
            background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 20px; border-radius: 50px; cursor: pointer; font-size: 0.9rem; transition: 0.3s;
        }
        .tag-btn.active { background: var(--white); color: var(--primary); font-weight: 600; }

        /* GRID */
        .container { padding: 30px 5%; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: var(--white); border-radius: 20px; overflow: hidden; border: 1px solid rgba(0,0,0,0.03); transition: 0.4s; }
        .card:hover { transform: translateY(-10px); box-shadow: var(--shadow-md); }
        .card-img { width: 100%; height: 160px; background-size: contain; background-repeat: no-repeat; background-position: center; background-color: #fff; padding: 15px; }
        .card-info { padding: 15px; text-align: center; }
        .btn-add { width: 100%; padding: 12px; border: none; background: #f8fafc; color: var(--primary); font-weight: 600; cursor: pointer; border-radius: 12px; transition: 0.3s; }
        .btn-add:hover { background: var(--primary); color: white; }

        /* CARRINHO (BOTÕES MAIORES) */
        .cart-panel { position: fixed; right: -100%; top: 0; width: 100%; max-width: 420px; height: 100%; background: white; z-index: 2000; transition: 0.5s cubic-bezier(0.7, 0, 0.3, 1); display: flex; flex-direction: column; }
        .cart-panel.open { right: 0; }
        .cart-item-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #f9f9f9; }
        
        .qty-control-large { 
            display: flex; align-items: center; background: #f1f5f9; 
            border-radius: 12px; padding: 5px; gap: 15px;
        }
        .btn-qty-lg { 
            width: 35px; height: 35px; border-radius: 8px; border: none; 
            background: var(--white); color: var(--primary); cursor: pointer; 
            font-size: 1.2rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center;
        }

        /* TOAST */
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--primary); color: white; padding: 15px 30px; border-radius: 50px; z-index: 3000; transition: 0.5s;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        .info-card { background: white; padding: 25px; border-radius: 25px; margin-top: 20px; border-top: 5px solid var(--secondary); }

        @media (max-width: 480px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } }
    </style>
</head>
<body>

<div id="toast">Item adicionado!</div>

<header>
    <div class="logo">MAIS FRIO <span>CLIMATIZAÇÃO</span></div>
    <button onclick="toggleCart()" class="cart-btn" id="cartBtn">
        <i class="fas fa-shopping-basket"></i> <span id="cart-count">0</span>
    </button>
</header>

<section class="hero reveal">
    <h1>O que você precisa?</h1>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar peça ou serviço..." onkeyup="filterItems()">
    </div>
    <div class="filter-tags">
        <button class="tag-btn active" id="btnAll" onclick="filterByCategory('all')">Todos</button>
        <button class="tag-btn" id="btnServ" onclick="filterByCategory('serviço')"><i class="fas fa-tools"></i> Apenas Serviços</button>
    </div>
</section>

<main class="container">
    <div class="grid" id="main-grid"></div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 40px;">
        <div class="info-card reveal">
            <h3><i class="fas fa-clock"></i> Horário</h3>
            <p>Seg à Sex: 08:00 - 18:00 / Sáb: 08:00 - 12:00</p>
        </div>
        <div class="info-card reveal" style="animation-delay: 0.1s;">
            <h3><i class="fas fa-map-marker-alt"></i> Região</h3>
            <p>Presidente Médici - RO e cidades vizinhas.</p>
        </div>
    </div>
</main>

<div id="cartPreview" class="cart-panel">
    <div style="padding:25px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
        <h3 style="font-weight:700;">Seu Pedido</h3>
        <button onclick="toggleCart()" style="background:none; border:none; font-size:1.8rem; cursor:pointer;">&times;</button>
    </div>
    <div id="cartItems" style="flex-grow:1; overflow-y:auto;"></div>
    <div style="padding:25px; background:#fcfdfe; border-top:1px solid #eee;">
        <input type="text" id="address" placeholder="Endereço de Entrega" style="width:100%; padding:12px; border-radius:12px; border:1px solid #ddd; margin-bottom:10px;">
        <select id="paymentMethod" onchange="checkPix()" style="width:100%; padding:12px; border-radius:12px; border:1px solid #ddd; margin-bottom:15px;">
            <option value="Pix">Pagar no Pix</option>
            <option value="Cartão">Cartão</option>
            <option value="Dinheiro">Dinheiro</option>
        </select>
        <div id="pix-area" style="background:#e8f5e9; padding:15px; border-radius:12px; margin-bottom:15px; display:none; text-align:center;">
            <small>Chave Pix:</small><br><strong>59.874.260/0001-22</strong>
        </div>
        <div style="display:flex; justify-content:space-between; font-weight:700; font-size:1.2rem; margin-bottom:20px;">
            <span>Total:</span> <span id="total-price">R$ 0,00</span>
        </div>
        <button onclick="sendWhatsAppOrder()" style="width:100%; padding:18px; background:var(--accent); color:white; border:none; border-radius:15px; font-weight:700; cursor:pointer;">
            FINALIZAR NO WHATSAPP
        </button>
    </div>
</div>

<script>
    const inventory = [
        { name: "Instalação Ar Novo", price: 400, img: "Seção de Serviços.png", cat: "serviço" },
        { name: "Instalação Ar Usado", price: 250, img: "Seção de Serviços.png", cat: "serviço" },
        { name: "Manutenção Preventiva", price: 150, img: "ManutencaoPreventiva.png", cat: "serviço" },
        { name: "Carga de Gás", price: 200, img: "CargadeGas.png", cat: "serviço" },
        { name: "Capacitor Duplo 25+2.5UF", price: 30, img: "CapacitorDuplo25+2.5UF.png", cat: "peça" },
        { name: "Capacitor Duplo 30UF", price: 36, img: "CapacitorDuplo25+2.5UF.png", cat: "peça" },
        { name: "Capacitor Duplo 35UF", price: 36, img: "CapacitorDuplo25+2.5UF.png", cat: "peça" },
        { name: "Capacitor Duplo 40UF", price: 36, img: "CapacitorDuplo25+2.5UF.png", cat: "peça" },
        { name: "Capacitor Ventilador 1.0UF", price: 8.50, img: "capacitordeventilador.png", cat: "peça" },
        { name: "Capacitor Ventilador 1.5UF", price: 8.50, img: "capacitordeventilador.png", cat: "peça" },
        { name: "Capacitor Ventilador 2.5UF", price: 8.50, img: "capacitordeventilador.png", cat: "peça" },
        { name: "Capacitor Ventilador 3.0UF", price: 8.50, img: "capacitordeventilador.png", cat: "peça" },
        { name: "Contactor 18A", price: 53.50, img: "Contactor18A.png", cat: "peça" },
        { name: "Contactor 25A", price: 135.00, img: "Contactor25A.png", cat: "peça" },
        { name: "Sensor Degelo AC 05k", price: 10, img: "SensorDegeloAC05k.png", cat: "peça" },
        { name: "Controle Ar Universal", price: 80, img: "ControlArUniversal.png", cat: "peça" },
        { name: "Gás R32 (13kg)", price: 1150.00, img: "gasr3213kg.png", cat: "peça" },
        { name: "Gás R-22 Lata 1kg", price: 130, img: "GasR-22Lata1kg.png", cat: "peça" },
        { name: "Gás R-410A Lata 800g", price: 110, img: "GásR-410ALata800g.png", cat: "peça" },
        { name: "Tubulação de Cobre (kg)", price: 165, img: "TubulaçãodeCobre(kg).png", cat: "peça" },
        { name: "Suporte L Condensadora 47cm", price: 27, img: "SuporteLCondensadora47cm.png", cat: "peça" },
        { name: "Válvula de Serviço 1/4", price: 36.50, img: "valvuladeservicio.png", cat: "peça" },
        { name: "Polipex 1/4", price: 3.99, img: "Polipex.png", cat: "peça" },
        { name: "Fita De PVC", price: 3.99, img: "FitaDePVC.png", cat: "peça" },
        { name: "Bucha Plástica 0,12 C", price: 0.60, img: "BuchaPlástic0,12C.png", cat: "peça" },
        { name: "Parafuso Sextavado", price: 1.50, img: "ParafusoSextavado.png", cat: "peça" }
    ];

    let cart = JSON.parse(localStorage.getItem('maisFrioCart')) || [];
    let currentCategory = 'all';

    function renderItems(term = "") {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = "";
        const filtered = inventory.filter(i => 
            i.name.toLowerCase().includes(term.toLowerCase()) && 
            (currentCategory === 'all' || i.cat === currentCategory)
        );
        filtered.forEach((item, index) => {
            grid.innerHTML += `
                <div class="card reveal" style="animation-delay: ${index * 0.05}s">
                    <div class="card-img" style="background-image: url('${item.img}')"></div>
                    <div class="card-info">
                        <h4 style="font-size: 0.85rem; height:40px;">${item.name}</h4>
                        <div style="color:var(--primary); font-weight:700; margin:10px 0;">R$ ${item.price.toFixed(2).replace('.',',')}</div>
                        <button class="btn-add" onclick="addToCart('${item.name}', ${item.price})">ADICIONAR</button>
                    </div>
                </div>`;
        });
    }

    function filterByCategory(cat) {
        currentCategory = cat;
        document.getElementById('btnAll').classList.toggle('active', cat === 'all');
        document.getElementById('btnServ').classList.toggle('active', cat === 'serviço');
        renderItems(document.getElementById('searchInput').value);
    }

    function addToCart(name, price) {
        let item = cart.find(p => p.name === name);
        if (item) item.qty++; else cart.push({ name, price, qty: 1 });
        saveAndUpdate();
        showToast();
    }

    function changeQty(name, delta) {
        let item = cart.find(p => p.name === name);
        if (item) {
            item.qty += delta;
            if (item.qty <= 0) cart = cart.filter(p => p.name !== name);
        }
        saveAndUpdate();
    }

    function saveAndUpdate() {
        localStorage.setItem('maisFrioCart', JSON.stringify(cart));
        updateCart();
    }

    function updateCart() {
        let total = 0, count = 0;
        document.getElementById("cartItems").innerHTML = cart.map(i => {
            total += i.price * i.qty; count += i.qty;
            return `
                <div class="cart-item-row">
                    <div style="flex:1">
                        <div style="font-size:0.85rem; font-weight:600;">${i.name}</div>
                        <div style="color:var(--secondary); font-weight:700;">R$ ${(i.price * i.qty).toFixed(2).replace('.',',')}</div>
                    </div>
                    <div class="qty-control-large">
                        <button class="btn-qty-lg" onclick="changeQty('${i.name}', -1)">-</button>
                        <span style="font-weight:700; min-width:20px; text-align:center;">${i.qty}</span>
                        <button class="btn-qty-lg" onclick="changeQty('${i.name}', 1)">+</button>
                    </div>
                </div>`;
        }).join('');
        document.getElementById("total-price").innerText = `R$ ${total.toFixed(2).replace('.',',')}`;
        document.getElementById("cart-count").innerText = count;
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    function toggleCart() { document.getElementById("cartPreview").classList.toggle("open"); }
    function filterItems() { renderItems(document.getElementById('searchInput').value); }
    function checkPix() { document.getElementById('pix-area').style.display = (document.getElementById('paymentMethod').value === 'Pix') ? 'block' : 'none'; }
    
    function sendWhatsAppOrder() {
        const addr = document.getElementById("address").value;
        if (!addr) return alert("Informe o endereço!");
        if (cart.length === 0) return alert("Carrinho vazio!");
        let msg = `*PEDIDO MAIS FRIO*\n\n`;
        cart.forEach(i => msg += `• ${i.name} (x${i.qty})\n`);
        msg += `\n*Total:* ${document.getElementById("total-price").innerText}\n*Endereço:* ${addr}`;
        window.open(`https://wa.me/556993060469?text=${encodeURIComponent(msg)}`);
        cart = []; saveAndUpdate();
    }

    renderItems();
    updateCart();
    checkPix();
</script>
</body>
</html>
