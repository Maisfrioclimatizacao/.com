<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mais Frio Climatização | Excelência desde 2011</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #0d2a57;
            --secondary: #3498db;
            --accent: #25D366;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            padding-bottom: 40px;
        }

        header {
            background: var(--white);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }

        .logo { font-weight: 700; color: var(--primary); font-size: 1.2rem; letter-spacing: -0.5px; }
        .logo span { color: var(--secondary); }

        .cart-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .hero {
            background: linear-gradient(135deg, var(--primary) 0%, #1e40af 100%);
            color: white;
            padding: 60px 5% 80px;
            text-align: center;
        }

        .hero h1 { font-size: 2.2rem; margin-bottom: 15px; font-weight: 700; }

        .search-box {
            background: white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            padding: 5px 20px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .search-box input {
            border: none;
            padding: 15px;
            width: 100%;
            outline: none;
            font-size: 1rem;
        }

        /* FILTERS BAR */
        .filters {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
            overflow-x: auto;
            padding: 0 5% 10px;
        }

        .filter-btn {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
            font-size: 0.85rem;
        }

        .filter-btn.active { background: var(--white); color: var(--primary); font-weight: 700; }

        .container { padding: 40px 5%; max-width: 1200px; margin: auto; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--white);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid rgba(0,0,0,0.03);
            transition: 0.3s;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--secondary); }
        .card h3 { font-size: 0.9rem; margin-bottom: 10px; color: var(--primary); min-height: 45px; }
        .card .price { font-size: 1.1rem; font-weight: 700; color: var(--text-dark); margin-bottom: 15px; }

        .add-btn {
            background: #f1f5f9;
            color: var(--primary);
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
        }
        .add-btn:hover { background: var(--primary); color: white; }

        /* CARRINHO PANEL */
        .cart-panel {
            position: fixed;
            right: -100%;
            top: 0;
            width: 100%;
            max-width: 420px;
            height: 100%;
            background: white;
            z-index: 2000;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            transition: 0.4s;
            display: flex;
            flex-direction: column;
        }
        .cart-panel.open { right: 0; }

        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            display: none;
            z-index: 3000;
            font-weight: 600;
        }

        /* Estilos do formulário no carrinho */
        .cart-footer { padding: 25px; background: #f8fafc; border-top: 1px solid #f1f5f9; }
        .form-select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; font-family: inherit; }
        .checkout-btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }

        @media (max-width: 480px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .hero h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div id="toast">Adicionado com sucesso! 🛒</div>

<header>
    <div class="logo">MAIS FRIO <span>CLIMATIZAÇÃO</span></div>
    <button class="cart-btn" id="header-cart-btn" onclick="toggleCart()">
        <i class="fas fa-shopping-basket"></i> <span id="cart-count">0</span>
    </button>
</header>

<section class="hero">
    <h1>Loja & Serviços</h1>
    <p>O que você precisa para seu ar-condicionado hoje?</p>
    <div class="search-box">
        <i class="fas fa-search" style="color:#94a3b8;"></i>
        <input type="text" id="searchInput" placeholder="Buscar item..." onkeyup="filterItems()">
    </div>

    <div class="filters">
        <button class="filter-btn active" onclick="setFilter('')">Tudo</button>
        <button class="filter-btn" onclick="setFilter('serviço')">Serviços</button>
        <button class="filter-btn" onclick="setFilter('elétrica')">Elétrica</button>
        <button class="filter-btn" onclick="setFilter('instalação')">Instalação</button>
        <button class="filter-btn" onclick="setFilter('fixação')">Fixação</button>
    </div>
</section>

<main class="container">
    <div class="grid" id="main-grid"></div>
</main>

<div id="cartPreview" class="cart-panel">
    <div style="padding: 25px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
        <h3>Seu Pedido</h3>
        <button onclick="toggleCart()" style="border:none; background:none; font-size:2rem; cursor:pointer;">&times;</button>
    </div>
    <div class="cart-content" id="cartItems" style="padding: 25px; flex-grow: 1; overflow-y: auto;"></div>
    <div class="cart-footer">
        <div id="service-scheduling" style="display:none; margin-bottom:15px;">
            <p style="font-size:0.75rem; font-weight:700; color:var(--primary); margin-bottom:5px;">AGENDAR VISITA:</p>
            <div style="display:flex; gap:5px;">
                <input type="date" id="serviceDate" class="form-select">
                <select id="serviceTime" class="form-select">
                    <option value="Manhã">Manhã</option>
                    <option value="Tarde">Tarde</option>
                </select>
            </div>
        </div>
        <input type="text" id="address" class="form-select" placeholder="Seu Endereço">
        <select id="paymentMethod" class="form-select">
            <option value="" disabled selected>Pagamento</option>
            <option value="PIX">PIX</option>
            <option value="Dinheiro">Dinheiro</option>
            <option value="Cartão">Cartão</option>
        </select>
        <div style="display:flex; justify-content:space-between; margin:15px 0; font-weight:700;">
            <span>Total:</span>
            <span id="total-price">R$ 0,00</span>
        </div>
        <button class="checkout-btn" onclick="sendWhatsAppOrder()">Finalizar no WhatsApp</button>
    </div>
</div>

<script>
    const inventory = [
        // CATEGORIA: SERVIÇO
        { name: "Instalação Ar Novo", price: 400, cat: "serviço" },
        { name: "Instalação Ar Usado", price: 250, cat: "serviço" },
        { name: "Manutenção Preventiva", price: 150, cat: "serviço" },
        { name: "Carga de Gás", price: 200, cat: "serviço" },

        // CATEGORIA: ELÉTRICA
        { name: "Capacitor Duplo 25+2.5UF", price: 30, cat: "elétrica" },
        { name: "Capacitor Duplo 40UF", price: 36, cat: "elétrica" },
        { name: "Capacitor Duplo 35UF", price: 36, cat: "elétrica" },
        { name: "Capacitor Duplo 30UF", price: 36, cat: "elétrica" },
        { name: "Contactor 18A", price: 53.50, cat: "elétrica" },
        { name: "Contactor 25A", price: 135.00, cat: "elétrica" },
        { name: "Sensor Degelo AC 05k", price: 10, cat: "elétrica" },
        { name: "Controle Ar Universal", price: 80, cat: "elétrica" },

        // CATEGORIA: INSTALAÇÃO
        { name: "Gás R-22 Lata 1kg", price: 130, cat: "instalação" },
        { name: "Tubulação de Cobre (kg)", price: 165, cat: "instalação" },
        { name: "Suporte L Condensadora 47cm", price: 27, cat: "instalação" },
        { name: "Polipex 1/4", price: 3.99, cat: "instalação" },
        { name: "Polipex 3/8", price: 4.90, cat: "instalação" },
        { name: "Polipex 1/2", price: 5.90, cat: "instalação" },
        { name: "Fita Isolante 10mm x 0,5m", price: 4.99, cat: "instalação" },
        { name: "Fita Isolante 18mm x 10m", price: 6.90, cat: "instalação" },
        { name: "Fita De PVC", price: 3.99, cat: "instalação" },

        // CATEGORIA: FIXAÇÃO
        { name: "Bucha Plástica 0,8 C", price: 0.20, cat: "fixação" },
        { name: "Bucha Plástica 0,10 C", price: 0.50, cat: "fixação" },
        { name: "Bucha Plástica 0,12 C", price: 0.60, cat: "fixação" },
        { name: "Parafuso Cônico", price: 0.35, cat: "fixação" },
        { name: "Parafuso Sextavado", price: 1.50, cat: "fixação" }
    ];

    let cart = JSON.parse(localStorage.getItem('maisFrioCart')) || [];
    let currentCategory = "";

    function renderItems(term = "") {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = "";
        const filtered = inventory.filter(i => {
            const matchesSearch = i.name.toLowerCase().includes(term.toLowerCase());
            const matchesCat = currentCategory === "" || i.cat === currentCategory;
            return matchesSearch && matchesCat;
        });

        filtered.forEach(item => {
            grid.innerHTML += `
                <div class="card">
                    <div>
                        <h3>${item.name}</h3>
                        <div class="price">R$ ${item.price.toFixed(2).replace('.', ',')}</div>
                    </div>
                    <button class="add-btn" onclick="addToCart('${item.name}', ${item.price})">Adicionar</button>
                </div>`;
        });
    }

    function addToCart(name, price) {
        let item = cart.find(p => p.name === name);
        if (item) item.qty++; else cart.push({ name, price, qty: 1 });
        saveAndRender();
        showFeedback();
    }

    function saveAndRender() {
        localStorage.setItem('maisFrioCart', JSON.stringify(cart));
        renderCart();
    }

    function renderCart() {
        const cartDiv = document.getElementById("cartItems");
        const totalSpan = document.getElementById("total-price");
        const sched = document.getElementById("service-scheduling");
        let total = 0, count = 0, hasService = false;

        cartDiv.innerHTML = cart.length === 0 ? '<p style="text-align:center;color:#999;">Vazio</p>' : '';
        
        cart.forEach(item => {
            total += item.price * item.qty;
            count += item.qty;
            if(inventory.find(i => i.name === item.name && i.cat === 'serviço')) hasService = true;
            cartDiv.innerHTML += `
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                    <div style="font-size:0.85rem;"><strong>${item.name}</strong><br>R$ ${item.price.toFixed(2)} x ${item.qty}</div>
                    <div>
                        <button onclick="changeQty('${item.name}', -1)" style="padding:2px 8px; cursor:pointer;">-</button>
                        <button onclick="changeQty('${item.name}', 1)" style="padding:2px 8px; cursor:pointer;">+</button>
                    </div>
                </div>`;
        });

        document.getElementById("cart-count").innerText = count;
        totalSpan.innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
        sched.style.display = hasService ? "block" : "none";
    }

    function changeQty(name, amt) {
        let item = cart.find(p => p.name === name);
        if(item) {
            item.qty += amt;
            if(item.qty <= 0) cart = cart.filter(p => p.name !== name);
            saveAndRender();
        }
    }

    function sendWhatsAppOrder() {
        const addr = document.getElementById("address").value;
        const pay = document.getElementById("paymentMethod").value;
        if (cart.length === 0 || !addr || !pay) return alert("Preencha todos os dados!");

        let msg = "*PEDIDO - MAIS FRIO CLIMATIZAÇÃO*\n\n";
        let total = 0;
        cart.forEach(i => {
            msg += `• ${i.name} (x${i.qty})\n`;
            total += i.price * i.qty;
        });
        msg += `\n💰 *TOTAL: R$ ${total.toFixed(2).replace('.', ',')}*`;
        msg += `\n📍 *Endereço:* ${addr}\n💳 *Pagamento:* ${pay}`;
        if(pay === "PIX") msg += `\n🔑 *PIX:* 59874260220`;

        window.open(`https://wa.me/556993060469?text=${encodeURIComponent(msg)}`);
    }

    function setFilter(c) {
        currentCategory = c;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.onclick.toString().includes(`'${c}'`)));
        renderItems();
    }

    function filterItems() { renderItems(document.getElementById('searchInput').value); }
    function toggleCart() { document.getElementById("cartPreview").classList.toggle("open"); }
    function showFeedback() {
        const t = document.getElementById('toast');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    renderItems();
    renderCart();
</script>
</body>
</html>
