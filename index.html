<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mais Frio | Climatização Profissional</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0f172a;
            --secondary: #0066ff;
            --accent: #22c55e;
            --surface: #ffffff;
            --bg: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --radius-lg: 24px;
            --radius-md: 16px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: var(--text-main); line-height: 1.5; overflow-x: hidden; }
        body.modal-open { overflow: hidden; }

        /* --- UI COMPONENTS --- */
        header { 
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 12px 6%; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: -1px; color: var(--primary); }
        .logo span { color: var(--secondary); }

        .hero { 
            padding: 40px 6% 60px; text-align: center;
            background: radial-gradient(circle at top right, #e2e8f0, #f8fafc);
        }
        .hero h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 20px; color: var(--primary); }

        .search-container {
            max-width: 550px; margin: 0 auto; position: relative;
        }
        .search-area { 
            background: white; border-radius: var(--radius-md); padding: 4px 16px; 
            display: flex; align-items: center; box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.05); transition: var(--transition);
        }
        .search-area:focus-within { transform: translateY(-2px); border-color: var(--secondary); box-shadow: 0 20px 25px -5px rgba(0, 102, 255, 0.1); }
        .search-area input { width: 100%; padding: 14px; border: none; outline: none; font-size: 1rem; font-weight: 500; }

        .tabs { display: flex; gap: 8px; justify-content: center; margin-top: 24px; overflow-x: auto; padding: 4px; scrollbar-width: none; }
        .tab { padding: 10px 20px; background: white; border-radius: 50px; font-size: 0.85rem; font-weight: 700; cursor: pointer; white-space: nowrap; transition: var(--transition); color: var(--text-muted); border: 1px solid #e2e8f0; }
        .tab.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* --- PRODUCT GRID --- */
        .container { padding: 20px 5% 100px; max-width: 1400px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; } }

        .card { 
            background: white; border-radius: var(--radius-lg); overflow: hidden; 
            display: flex; flex-direction: column; transition: var(--transition); 
            border: 1px solid rgba(0,0,0,0.03); position: relative;
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.08); }

        .img-box { height: 200px; padding: 20px; background: #fff; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .img-box img { max-width: 85%; max-height: 85%; object-fit: contain; transition: var(--transition); z-index: 2; }
        .card:hover .img-box img { transform: scale(1.08); }
        
        .badge { position: absolute; top: 12px; left: 12px; padding: 4px 10px; border-radius: 8px; font-size: 0.65rem; font-weight: 800; color: white; text-transform: uppercase; z-index: 5; }
        .badge.peca { background: var(--secondary); }
        .badge.servico { background: var(--accent); }

        .card-body { padding: 20px; display: flex; flex-direction: column; flex: 1; }
        .card h3 { font-size: 0.95rem; font-weight: 700; color: var(--primary); margin-bottom: 4px; line-height: 1.3; height: 2.6em; overflow: hidden; }
        .service-tag { color: #ef4444; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 4px; }

        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .price { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
        
        .btn-add { 
            width: 44px; height: 44px; background: var(--bg); border: none; border-radius: 14px; 
            color: var(--primary); cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center;
        }
        .btn-add:hover { background: var(--secondary); color: white; transform: rotate(90deg); }

        /* --- MINI FLOATING CART SUMMARY --- */
        .cart-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: var(--primary); color: white;
            padding: 16px 24px; border-radius: 20px; display: flex; justify-content: space-between;
            align-items: center; z-index: 900; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
            cursor: pointer; transition: var(--transition); visibility: hidden; opacity: 0;
        }
        .cart-bar.active { visibility: visible; opacity: 1; bottom: 30px; }

        /* --- SIDE CART --- */
        #sideCart { position: fixed; right: -100%; top: 0; width: 100%; max-width: 450px; height: 100%; background: white; z-index: 2000; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; }
        #sideCart.open { right: 0; }
        .cart-header { padding: 30px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; }
        .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-item { display: flex; gap: 15px; padding: 15px; background: #f8fafc; border-radius: var(--radius-md); margin-bottom: 12px; align-items: center; }

        .btn-checkout { width: 100%; padding: 20px; background: var(--accent); color: white; border: none; border-radius: var(--radius-md); font-weight: 800; font-size: 1rem; cursor: pointer; transition: var(--transition); }
        .btn-checkout:hover { filter: brightness(1.1); }

        /* --- WHATSAPP PULSE --- */
        .wp-float { position: fixed; bottom: 100px; right: 25px; width: 55px; height: 55px; background: var(--accent); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; z-index: 800; text-decoration: none; box-shadow: 0 10px 15px rgba(34, 197, 94, 0.3); transition: var(--transition); }
        .wp-float:hover { transform: scale(1.1); }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--primary); color: white; padding: 12px 24px; border-radius: 12px; z-index: 3000; font-weight: 700; transition: var(--transition); }
        #toast.active { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<header>
    <div class="logo">MAIS<span>FRIO</span></div>
    <div style="font-size: 0.7rem; font-weight: 700; background: #e2e8f0; padding: 4px 8px; border-radius: 6px;">V.2026 PRO</div>
</header>

<section class="hero">
    <h1>Conforto Térmico<br>Profissional</h1>
    <div class="search-container">
        <div class="search-area">
            <i class="fas fa-search" style="color:#94a3b8"></i>
            <input type="text" id="searchInput" placeholder="Buscar peça ou serviço..." onkeyup="render()">
        </div>
    </div>
    <div class="tabs">
        <div class="tab active" id="tab-all" onclick="filter('all')">Todos</div>
        <div class="tab" id="tab-servico" onclick="filter('servico')">Serviços</div>
        <div class="tab" id="tab-peca" onclick="filter('peca')">Peças</div>
    </div>
</section>

<main class="container">
    <div class="grid" id="grid"></div>
</main>

<div class="cart-bar" id="cartSummary" onclick="toggleCart()">
    <div style="display:flex; align-items:center; gap:12px">
        <div style="background:rgba(255,255,255,0.2); padding:8px 12px; border-radius:10px; font-weight:800;" id="cart-count">0</div>
        <span style="font-weight:700; font-size:0.9rem">Ver Carrinho</span>
    </div>
    <div id="cart-total-bar" style="font-weight:800; font-size:1.1rem">R$ 0,00</div>
</div>

<a href="https://wa.me/556993060469" class="wp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

<div id="sideCart">
    <div class="cart-header">
        <h2 style="font-weight:800; letter-spacing:-1px">Meu Pedido</h2>
        <i class="fas fa-times" onclick="toggleCart()" style="cursor:pointer; font-size:1.2rem; color:#cbd5e1"></i>
    </div>
    <div class="cart-items" id="cart-list"></div>
    <div style="padding: 25px; border-top: 1px solid #f1f5f9;">
        <input type="text" id="userAddr" class="premium-input" style="width:100%; padding:15px; border-radius:12px; border:1px solid #e2e8f0; margin-bottom:10px; outline:none" placeholder="Endereço Completo">
        <select id="userPay" class="premium-input" style="width:100%; padding:15px; border-radius:12px; border:1px solid #e2e8f0; margin-bottom:15px;" onchange="checkPix()">
            <option value="Pix">Pagar via Pix</option>
            <option value="Cartão">Cartão de Crédito</option>
            <option value="Dinheiro">Dinheiro</option>
        </select>
        <div id="pix-info" style="display:none; background:#f0fdf4; border:1px dashed #22c55e; padding:15px; border-radius:12px; text-align:center; margin-bottom:15px; cursor:pointer" onclick="copyPix()">
            <small style="color:#166534">Toque para copiar o CNPJ Pix:</small><br><strong style="color:#166534">59874260220</strong>
        </div>
        <button class="btn-checkout" onclick="sendOrder()">FINALIZAR PEDIDO</button>
    </div>
</div>

<div id="toast">Item adicionado com sucesso!</div>

<script>
    const inventory = [
        { name: "Mão de Obra Instalação (Ar Novo)", price: 400.00, img: "Seção de Serviços.png", cat: "servico" },
        { name: "Mão de Obra Instalação (Ar Usado)", price: 250.00, img: "Seção de Serviços.png", cat: "servico" },
        { name: "Limpeza + Higienização Completa", price: 150.00, img: "ManutencaoPreventiva.png", cat: "servico" },
        { name: "Carga de Gás (Serviço Completo)", price: 200.00, img: "CargadeGas.png", cat: "servico" },
        { name: "Capacitor Duplo 25+2.5UF", price: 30.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 30UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 35UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 40UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Ventilador 1.0UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 1.5UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 2.5UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 3.0UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Contactor 18A", price: 53.50, img: "Contactor18A.png", cat: "peca" },
        { name: "Contactor 25A", price: 135.00, img: "Contactor25A.png", cat: "peca" },
        { name: "Sensor Degelo AC 05k", price: 10.00, img: "SensorDegeloAC05k.png", cat: "peca" },
        { name: "Controle Ar Universal", price: 80.00, img: "ControlArUniversal.png", cat: "peca" },
        { name: "Gás R32 (Botija 13kg)", price: 1150.00, img: "gasr3213kg.png", cat: "peca" },
        { name: "Gás R-22 Lata 1kg", price: 130.00, img: "GasR-22Lata1kg.png", cat: "peca" },
        { name: "Gás R-410A Lata 800g", price: 110.00, img: "GásR-410ALata800g.png", cat: "peca" },
        { name: "Tubulação de Cobre (kg)", price: 165.00, img: "TubulaçãodeCobre(kg).png", cat: "peca" },
        { name: "Suporte L Condensadora 47cm", price: 27.00, img: "SuporteLCondensadora47cm.png", cat: "peca" },
        { name: "Válvula de Serviço 1/4", price: 36.50, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Válvula de Serviço 3/8", price: 55.99, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Válvula de Serviço 1/2", price: 62.99, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Polipex 1/4", price: 3.99, img: "Polipex.png", cat: "peca" },
        { name: "Polipex 3/8", price: 4.90, img: "Polipex.png", cat: "peca" },
        { name: "Polipex 1/2", price: 5.90, img: "Polipex.png", cat: "peca" },
        { name: "Fita Isolante 10mm", price: 4.99, img: "FitaIsolante18mmx10m.png", cat: "peca" },
        { name: "Fita Isolante 18mm", price: 6.90, img: "FitaIsolante18mmx10m.png", cat: "peca" },
        { name: "Fita De PVC", price: 3.99, img: "FitaDePVC.png", cat: "peca" },
        { name: "Bucha Plástica 0,8 C", price: 0.20, img: "BuchaPlástica0,8C.png", cat: "peca" },
        { name: "Bucha Plástica 0,10 C", price: 0.50, img: "BuchaPlástica0,10C.png", cat: "peca" },
        { name: "Bucha Plástica 0,12 C", price: 0.60, img: "BuchaPlástic0,12C.png", cat: "peca" },
        { name: "Parafuso Cônico", price: 0.35, img: "ParafusoCônico.png", cat: "peca" },
        { name: "Parafuso Sextavado", price: 1.50, img: "ParafusoSextavado.png", cat: "peca" }
    ];

    let cart = JSON.parse(localStorage.getItem('cart_mf_v4')) || [];
    let currentFilter = 'all';

    function removeAccents(str) {
        return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
    }

    function render() {
        const grid = document.getElementById('grid');
        const term = removeAccents(document.getElementById('searchInput').value);
        grid.innerHTML = "";
        
        const filtered = inventory.filter(item => {
            return removeAccents(item.name).includes(term) && (currentFilter === 'all' || item.cat === currentFilter);
        });
        
        filtered.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = "card";
            card.style.animation = `fadeInUp 0.5s ease forwards ${index * 0.05}s`;
            
            const note = item.cat === 'servico' ? '<span class="service-tag"><i class="fas fa-info-circle"></i> Somente Mão de Obra</span>' : '<span style="height:14px; display:block; margin-bottom:12px"></span>';

            card.innerHTML = `
                <div class="img-box">
                    <div class="badge ${item.cat}">${item.cat}</div>
                    <img src="${item.img}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/952/952771.png'">
                </div>
                <div class="card-body">
                    <h3>${item.name}</h3>
                    ${note}
                    <div class="price-row">
                        <span class="price">R$ ${item.price.toFixed(2).replace('.',',')}</span>
                        <button class="btn-add" onclick="add('${item.name}', ${item.price})">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </div>`;
            grid.appendChild(card);
        });
    }

    function add(n, p) {
        let x = cart.find(i => i.n === n);
        if(x) x.q++; else cart.push({n, p, q:1});
        save();
        showToast();
    }

    function save() {
        localStorage.setItem('cart_mf_v4', JSON.stringify(cart));
        updateUI();
    }

    function updateUI() {
        const list = document.getElementById('cart-list');
        const bar = document.getElementById('cartSummary');
        let tot = 0;
        let count = 0;
        list.innerHTML = "";
        
        cart.forEach((item, idx) => {
            tot += item.p * item.q;
            count += item.q;
            list.innerHTML += `
                <div class="cart-item">
                    <div style="flex:1">
                        <div style="font-weight:700; font-size:0.9rem">${item.n}</div>
                        <div style="color:var(--secondary); font-weight:800">R$ ${item.p.toFixed(2).replace('.',',')}</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:12px; background:white; padding:5px 12px; border-radius:10px">
                        <i class="fas fa-minus" onclick="changeQty(${idx}, -1)" style="font-size:0.7rem; cursor:pointer"></i>
                        <span style="font-weight:800">${item.q}</span>
                        <i class="fas fa-plus" onclick="changeQty(${idx}, 1)" style="font-size:0.7rem; cursor:pointer"></i>
                    </div>
                </div>`;
        });

        document.getElementById('cart-total-bar').innerText = "R$ " + tot.toFixed(2).replace('.',',');
        document.getElementById('cart-count').innerText = count;
        
        if(count > 0) bar.classList.add('active');
        else bar.classList.remove('active');
    }

    function changeQty(idx, val) {
        cart[idx].q += val;
        if(cart[idx].q <= 0) cart.splice(idx, 1);
        save();
    }

    function filter(cat) {
        currentFilter = cat;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-'+cat).classList.add('active');
        render();
    }

    function toggleCart() {
        document.getElementById('sideCart').classList.toggle('open');
        document.body.classList.toggle('modal-open');
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 2000);
    }

    function checkPix() {
        document.getElementById('pix-info').style.display = (document.getElementById('userPay').value === 'Pix') ? 'block' : 'none';
    }

    function copyPix() {
        navigator.clipboard.writeText("59874260220");
        alert("Pix Copiado!");
    }

    function sendOrder() {
        const ad = document.getElementById('userAddr').value;
        const pay = document.getElementById('userPay').value;
        if(!ad || cart.length === 0) return alert("Por favor, preencha o endereço!");

        let m = `*NOVO PEDIDO - MAIS FRIO*\n\n`;
        cart.forEach(i => m += `✅ ${i.n} (x${i.q})\n`);
        m += `\n*TOTAL:* ${document.getElementById('cart-total-bar').innerText}\n*PAGAMENTO:* ${pay}\n*ENDEREÇO:* ${ad}`;
        
        if(pay === 'Pix') m += `\n\n*CHAVE PIX CNPJ:* 59874260220`;

        window.open(`https://wa.me/556993060469?text=${encodeURIComponent(m)}`);
    }

    window.onload = () => { render(); updateUI(); };
</script>

</body>
</html>
