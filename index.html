<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mais Frio | Premium Climate Solutions</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --brand-primary: #0052FF;
            --brand-dark: #020617;
            --brand-surface: #ffffff;
            --brand-bg: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --glass-border: rgba(255, 255, 255, 0.2);
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-premium: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--brand-bg); color: var(--text-main); line-height: 1.5; overflow-x: hidden; }
        body.modal-open { overflow: hidden; }

        /* --- NAVEGAÇÃO ULTRACLEAN --- */
        nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 16px 6%; display: flex; justify-content: space-between; align-items: center;
        }

        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-circle { width: 32px; height: 32px; background: var(--brand-primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; box-shadow: 0 4px 12px rgba(0,82,255,0.3); }
        .logo-text { font-weight: 800; font-size: 18px; letter-spacing: -0.5px; color: var(--brand-dark); }
        .logo-text span { color: var(--brand-primary); }

        .cart-pill {
            background: var(--brand-dark); color: white; padding: 8px 16px; border-radius: 12px;
            display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none; font-weight: 700; font-size: 14px;
        }
        .cart-pill:active { transform: scale(0.95); }
        .cart-dot { background: var(--brand-primary); padding: 2px 6px; border-radius: 6px; font-size: 10px; }

        /* --- HERO ESTRUTURADO --- */
        .hero-v2 { padding: 40px 6% 60px; background: white; text-align: center; border-bottom: 1px solid #f1f5f9; }
        .hero-v2 h1 { font-size: 32px; font-weight: 800; color: var(--brand-dark); letter-spacing: -1px; margin-bottom: 16px; }
        .hero-v2 p { color: var(--text-muted); font-size: 15px; max-width: 400px; margin: 0 auto 30px; }

        .search-box-v2 {
            background: #f1f5f9; border-radius: 16px; padding: 4px 16px;
            display: flex; align-items: center; max-width: 500px; margin: 0 auto;
            border: 1px solid transparent; transition: 0.3s;
        }
        .search-box-v2:focus-within { background: white; border-color: var(--brand-primary); box-shadow: 0 0 0 4px rgba(0,82,255,0.1); }
        .search-box-v2 input { border: none; background: none; padding: 12px; width: 100%; font-size: 15px; font-weight: 600; outline: none; }
        .search-box-v2 i { color: var(--text-muted); }

        /* --- CATEGORIAS --- */
        .scroller { overflow-x: auto; padding: 20px 0; display: flex; gap: 10px; justify-content: center; scrollbar-width: none; }
        .chip {
            padding: 10px 20px; border-radius: 12px; background: white; border: 1px solid #e2e8f0;
            font-size: 13px; font-weight: 700; color: var(--text-muted); cursor: pointer; transition: 0.2s;
        }
        .chip.active { background: var(--brand-dark); color: white; border-color: var(--brand-dark); }

        /* --- GRID DE PRODUTOS PREMIUM --- */
        .main-container { padding: 30px 6%; max-width: 1200px; margin: 0 auto; }
        .grid-v2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        @media (min-width: 768px) { .grid-v2 { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; } }

        .card-v2 {
            background: white; border-radius: 24px; border: 1px solid #f1f5f9; padding: 12px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative;
        }
        .card-v2:hover { transform: translateY(-8px); box-shadow: var(--shadow-premium); border-color: transparent; }

        .img-viewport {
            background: #f8fafc; border-radius: 18px; width: 100%; height: 160px;
            display: flex; align-items: center; justify-content: center; padding: 15px; margin-bottom: 16px;
        }
        .img-viewport img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .card-v2 h3 { font-size: 14px; font-weight: 700; color: var(--brand-dark); margin-bottom: 8px; line-height: 1.3; height: 36px; overflow: hidden; }
        .card-footer-v2 { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .price-v2 { font-weight: 800; font-size: 16px; color: var(--brand-primary); }

        .btn-plus {
            width: 40px; height: 40px; background: var(--brand-dark); color: white; border: none;
            border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .btn-plus:hover { background: var(--brand-primary); transform: rotate(90deg); }

        /* --- CHECKOUT LATERAL --- */
        .cart-aside {
            position: fixed; right: -100%; top: 0; width: 100%; max-width: 420px; height: 100%;
            background: white; z-index: 2000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; padding: 30px;
        }
        .cart-aside.open { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .cart-list { flex: 1; overflow-y: auto; }

        .cart-item-v2 { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; }
        .item-qty { background: #f1f5f9; padding: 4px 10px; border-radius: 8px; display: flex; gap: 12px; align-items: center; font-weight: 700; }

        /* --- INPUTS PREMIUM --- */
        .input-v2 {
            background: #f8fafc; border: 1px solid #e2e8f0; padding: 16px; border-radius: 14px;
            width: 100%; margin-bottom: 12px; font-weight: 600; outline: none; transition: 0.3s;
        }
        .input-v2:focus { border-color: var(--brand-primary); background: white; }

        .btn-final {
            background: var(--brand-primary); color: white; padding: 20px; border: none;
            border-radius: 16px; width: 100%; font-weight: 800; font-size: 16px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,82,255,0.2); transition: 0.3s;
        }
        .btn-final:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,82,255,0.3); }

        .overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.4); backdrop-filter: blur(4px); z-index: 1900; display: none; }
        .overlay.show { display: block; }
        
        .pix-badge {
            background: #ecfdf5; border: 1px dashed #10b981; padding: 15px; border-radius: 12px;
            text-align: center; color: #065f46; font-weight: 700; cursor: pointer; margin-bottom: 20px;
        }

        #toast-alert {
            position: fixed; top: 100px; left: 50%; transform: translateX(-50%) translateY(-50px);
            background: var(--brand-dark); color: white; padding: 12px 24px; border-radius: 40px;
            font-weight: 700; font-size: 13px; opacity: 0; transition: 0.4s; z-index: 3000;
        }
        #toast-alert.active { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<nav>
    <div class="logo-box">
        <div class="logo-circle">MF</div>
        <div class="logo-text">MAIS <span>FRIO</span></div>
    </div>
    <button class="cart-pill" onclick="openCart()">
        <i class="fas fa-shopping-bag"></i>
        <span>Sacola</span>
        <div class="cart-dot" id="cart-count">0</div>
    </button>
</nav>

<section class="hero-v2">
    <h1>Peças & Serviços</h1>
    <p>Tecnologia em climatização e manutenção certificada para o seu conforto.</p>
    <div class="search-box-v2">
        <i class="fas fa-search"></i>
        <input type="text" id="search" placeholder="O que você precisa hoje?" onkeyup="renderItems()">
    </div>
    <div class="scroller">
        <div class="chip active" id="c-all" onclick="setCat('all')">Todos</div>
        <div class="chip" id="c-servico" onclick="setCat('servico')">Serviços</div>
        <div class="chip" id="c-peca" onclick="setCat('peca')">Peças Originais</div>
    </div>
</section>

<div class="main-container">
    <div class="grid-v2" id="items-grid"></div>
</div>

<div class="overlay" id="uiOverlay" onclick="closeCart()"></div>

<div class="cart-aside" id="cartSidebar">
    <div class="cart-header">
        <h2 style="font-weight: 800;">Meu Pedido</h2>
        <i class="fas fa-times" onclick="closeCart()" style="cursor:pointer; opacity: 0.3;"></i>
    </div>
    
    <div class="cart-list" id="cart-items-container"></div>

    <div style="margin-top: 20px;">
        <input type="text" id="custAddr" class="input-v2" placeholder="Endereço de entrega">
        <select id="custPay" class="input-v2" onchange="checkPixUI()">
            <option value="Pix">Pix (Copia e Cola)</option>
            <option value="Cartão">Cartão de Crédito/Débito</option>
            <option value="Dinheiro">Dinheiro</option>
        </select>

        <div id="pix-display" class="pix-badge" onclick="copyCNPJ()" style="display:none;">
            <small>Clique para copiar o CNPJ Pix:</small><br>
            <strong>59874260220</strong>
        </div>

        <div style="display:flex; justify-content: space-between; padding: 20px 0; border-top: 1px solid #f1f5f9;">
            <span style="font-weight: 600; color: var(--text-muted);">Total</span>
            <span id="cart-total" style="font-weight: 800; font-size: 20px; color: var(--brand-primary);">R$ 0,00</span>
        </div>
        
        <button class="btn-final" onclick="sendOrder()">
            FINALIZAR NO WHATSAPP
        </button>
    </div>
</div>

<div id="toast-alert">Item adicionado à sacola</div>

<script>
    const data = [
        { name: "Instalação Ar Novo", price: 400.00, img: "Seção de Serviços.png", cat: "servico" },
        { name: "Instalação Ar Usado", price: 250.00, img: "Seção de Serviços.png", cat: "servico" },
        { name: "Manutenção Preventiva", price: 150.00, img: "ManutencaoPreventiva.png", cat: "servico" },
        { name: "Carga de Gás", price: 200.00, img: "CargadeGas.png", cat: "servico" },
        { name: "Capacitor Duplo 25+2.5UF", price: 30.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 30UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 35UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 40UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Ventilador 1.0UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 1.5UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 2.5UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 3.0UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Contactor 18A", price: 53.50, img: "Contactor18A.png", cat: "peca" },
        { name: "Contactor 25A", price: 135.00, img: "Contactor25A.png", cat: "peca" },
        { name: "Sensor Degelo AC 05k", price: 10.00, img: "SensorDegeloAC05k.png", cat: "peca" },
        { name: "Controle Ar Universal", price: 80.00, img: "ControlArUniversal.png", cat: "peca" },
        { name: "Gás R32 (13kg)", price: 1150.00, img: "gasr3213kg.png", cat: "peca" },
        { name: "Gás R-22 Lata 1kg", price: 130.00, img: "GasR-22Lata1kg.png", cat: "peca" },
        { name: "Gás R-410A Lata 800g", price: 110.00, img: "GásR-410ALata800g.png", cat: "peca" },
        { name: "Tubulação de Cobre (kg)", price: 165.00, img: "TubulaçãodeCobre(kg).png", cat: "peca" },
        { name: "Suporte L Condensadora 47cm", price: 27.00, img: "SuporteLCondensadora47cm.png", cat: "peca" },
        { name: "Válvula de Serviço 1/4", price: 36.50, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Válvula de Serviço 3/8", price: 55.99, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Válvula de Serviço 1/2", price: 62.99, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Polipex 1/4", price: 3.99, img: "Polipex.png", cat: "peca" },
        { name: "Polipex 3/8", price: 4.90, img: "Polipex.png", cat: "peca" },
        { name: "Polipex 1/2", price: 5.90, img: "Polipex.png", cat: "peca" },
        { name: "Fita Isolante 10mm x 0,5m", price: 4.99, img: "FitaIsolante18mmx10m.png", cat: "peca" },
        { name: "Fita Isolante 18mm x 10m", price: 6.90, img: "FitaIsolante18mmx10m.png", cat: "peca" },
        { name: "Fita De PVC", price: 3.99, img: "FitaDePVC.png", cat: "peca" },
        { name: "Bucha Plástica 0,8 C", price: 0.20, img: "BuchaPlástica0,8C.png", cat: "peca" },
        { name: "Bucha Plástica 0,10 C", price: 0.50, img: "BuchaPlástica0,10C.png", cat: "peca" },
        { name: "Bucha Plástica 0,12 C", price: 0.60, img: "BuchaPlástic0,12C.png", cat: "peca" },
        { name: "Parafuso Cônico", price: 0.35, img: "ParafusoCônico.png", cat: "peca" },
        { name: "Parafuso Sextavado", price: 1.50, img: "ParafusoSextavado.png", cat: "peca" }
    ];

    let cart = JSON.parse(localStorage.getItem('mf_v2_cart')) || [];
    let currentCat = 'all';

    function renderItems() {
        const grid = document.getElementById('items-grid');
        const search = document.getElementById('search').value.toLowerCase();
        grid.innerHTML = "";

        const filtered = data.filter(i => 
            i.name.toLowerCase().includes(search) && (currentCat === 'all' || i.cat === currentCat)
        );

        filtered.forEach(item => {
            const div = document.createElement('div');
            div.className = 'card-v2';
            div.innerHTML = `
                <div class="img-viewport">
                    <img src="${item.img}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/952/952771.png'">
                </div>
                <h3>${item.name}</h3>
                <div class="card-footer-v2">
                    <span class="price-v2">R$ ${item.price.toFixed(2).replace('.',',')}</span>
                    <button class="btn-plus" onclick="addToCart('${item.name}', ${item.price})">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
            `;
            grid.appendChild(div);
        });
    }

    function setCat(c) {
        currentCat = c;
        document.querySelectorAll('.chip').forEach(el => el.classList.remove('active'));
        document.getElementById('c-'+c).classList.add('active');
        renderItems();
    }

    function addToCart(n, p) {
        let exists = cart.find(i => i.n === n);
        if(exists) exists.q++; else cart.push({n, p, q: 1});
        save();
        triggerToast();
    }

    function save() {
        localStorage.setItem('mf_v2_cart', JSON.stringify(cart));
        const list = document.getElementById('cart-items-container');
        let total = 0;
        list.innerHTML = "";

        cart.forEach((item, idx) => {
            total += item.p * item.q;
            list.innerHTML += `
                <div class="cart-item-v2">
                    <div style="flex:1">
                        <div style="font-weight:700; font-size:14px;">${item.n}</div>
                        <div style="color:var(--brand-primary); font-weight:800;">R$ ${(item.p*item.q).toFixed(2).replace('.',',')}</div>
                    </div>
                    <div class="item-qty">
                        <i class="fas fa-minus" onclick="changeQty(${idx}, -1)" style="cursor:pointer; font-size:10px;"></i>
                        <span>${item.q}</span>
                        <i class="fas fa-plus" onclick="changeQty(${idx}, 1)" style="cursor:pointer; font-size:10px;"></i>
                    </div>
                </div>
            `;
        });
        document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2).replace('.',',')}`;
        document.getElementById('cart-count').innerText = cart.reduce((a,b) => a+b.q, 0);
        checkPixUI();
    }

    function changeQty(i, v) {
        cart[i].q += v;
        if(cart[i].q <= 0) cart.splice(i, 1);
        save();
    }

    function openCart() {
        document.getElementById('cartSidebar').classList.add('open');
        document.getElementById('uiOverlay').classList.add('show');
        document.body.classList.add('modal-open');
    }

    function closeCart() {
        document.getElementById('cartSidebar').classList.remove('open');
        document.getElementById('uiOverlay').classList.remove('show');
        document.body.classList.remove('modal-open');
    }

    function checkPixUI() {
        const pay = document.getElementById('custPay').value;
        document.getElementById('pix-display').style.display = pay === 'Pix' ? 'block' : 'none';
    }

    function copyCNPJ() {
        navigator.clipboard.writeText("59874260220");
        alert("CNPJ Copiado!");
    }

    function triggerToast() {
        const t = document.getElementById('toast-alert');
        t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 2000);
    }

    function sendOrder() {
        const addr = document.getElementById('custAddr').value;
        if(!addr || cart.length === 0) return alert("Preencha o endereço de entrega.");
        let m = `*SOLICITAÇÃO DE SERVIÇO / PEÇAS*\n\n`;
        cart.forEach(i => m += `✅ ${i.n} (x${i.q})\n`);
        m += `\n*Pagamento:* ${document.getElementById('custPay').value}\n*Total:* ${document.getElementById('cart-total').innerText}\n*Local:* ${addr}`;
        window.open(`https://wa.me/556993060469?text=${encodeURIComponent(m)}`);
    }

    window.onload = () => { renderItems(); save(); };
</script>
</body>
</html>
