<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mais Frio Climatização | Soluções Profissionais</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0a192f;
            --secondary: #007aff;
            --accent: #25d366; /* Cor oficial do WhatsApp */
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --transition: all 0.3s var(--spring);
            --shadow-sm: 0 2px 4px rgba(10, 25, 47, 0.05);
            --shadow-md: 0 10px 20px rgba(10, 25, 47, 0.08);
            --shadow-lg: 0 20px 40px rgba(10, 25, 47, 0.12);
        }

        body.modal-open { overflow: hidden; position: fixed; width: 100%; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--primary); overflow-x: hidden; line-height: 1.5; }

        /* --- BOTÃO FLUTUANTE WHATSAPP --- */
        .whatsapp-float {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 25px;
            right: 25px;
            background-color: var(--accent);
            color: #FFF;
            border-radius: 50px;
            text-align: center;
            font-size: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: var(--transition);
            animation: pulse 2s infinite;
        }

        .whatsapp-float:hover {
            transform: scale(1.1) rotate(10deg);
            background-color: #128c7e;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        /* --- HEADER PREMIUM --- */
        header { 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 18px 6%; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 999; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: -0.8px; text-transform: uppercase; }
        .logo span { color: var(--secondary); }
        
        .btn-cart-top { 
            background: var(--primary); color: white; padding: 12px 24px; border-radius: 50px; 
            cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 700;
        }

        /* --- HERO --- */
        .hero { 
            background: linear-gradient(135deg, #0a192f 0%, #061121 100%); 
            color: white; padding: 70px 6% 90px; text-align: center;
            border-bottom-left-radius: 60px; border-bottom-right-radius: 60px;
            display: flex; flex-direction: column; align-items: center;
        }
        .hero h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 25px; max-width: 700px; line-height: 1.1; }
        
        .search-area { 
            background: white; border-radius: 25px; padding: 6px 25px; 
            width: 100%; max-width: 550px; display: flex; align-items: center; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.2); margin-bottom: 40px;
        }
        .search-area input { width: 100%; padding: 15px; border: none; outline: none; font-size: 1rem; font-weight: 600; color: #333; }

        .tabs { display: flex; gap: 15px; justify-content: center; width: 100%; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .tab { padding: 14px 30px; background: rgba(255,255,255,0.08); border-radius: 50px; font-size: 0.85rem; font-weight: 700; cursor: pointer; white-space: nowrap; transition: var(--transition); }
        .tab.active { background: white; color: var(--primary); transform: scale(1.05); }

        /* --- GRID & CARDS (IMAGENS CENTRALIZADAS) --- */
        .container { padding: 50px 5%; max-width: 1300px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; } }

        .card { 
            background: white; border-radius: 30px; overflow: hidden; display: flex; 
            flex-direction: column; transition: var(--transition); border: 1px solid rgba(0,0,0,0.03);
        }
        .img-box { width: 100%; height: 200px; position: relative; display: flex; align-items: center; justify-content: center; padding: 20px; background: #fff; }
        .img-box img { max-width: 95%; max-height: 95%; object-fit: contain; }
        
        .badge { position: absolute; top: 15px; left: 15px; padding: 6px 14px; border-radius: 50px; font-size: 0.65rem; font-weight: 800; color: white; text-transform: uppercase; z-index: 5; }
        .badge.peca { background: var(--secondary); }
        .badge.servico { background: #28cd41; }

        .card-body { padding: 22px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .price { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 18px; display: block; }
        
        .btn-add { width: 100%; background: #f0f2f5; padding: 15px; border-radius: 20px; border: none; font-weight: 800; cursor: pointer; color: var(--primary); transition: var(--transition); }
        .btn-add:hover { background: var(--primary); color: white; }

        /* --- CARRINHO --- */
        .overlay { position: fixed; inset: 0; background: rgba(10, 25, 47, 0.4); backdrop-filter: blur(10px); z-index: 1900; display: none; }
        .overlay.active { display: block; }

        #sideCart { position: fixed; right: -100%; top: 0; width: 92%; max-width: 450px; height: 100%; background: #ffffff; z-index: 2000; transition: 0.5s var(--spring); display: flex; flex-direction: column; }
        #sideCart.open { right: 0; }
        
        .cart-header { padding: 30px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; }
        .cart-items { flex: 1; overflow-y: auto; padding: 25px; }
        .cart-item { background: #f8fafc; padding: 18px; border-radius: 22px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }

        .cart-footer { padding: 30px 25px; border-top: 1px solid #f0f0f0; }
        .premium-input { width: 100%; padding: 16px; border-radius: 15px; border: 2px solid #f1f5f9; margin-bottom: 12px; font-weight: 600; outline: none; }

        .btn-finish-whatsapp { width: 100%; padding: 20px; background: #28cd41; color: white; border: none; border-radius: 20px; font-weight: 800; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 12px; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--primary); color: white; padding: 18px 40px; border-radius: 50px; z-index: 3000; transition: 0.5s var(--spring); font-weight: 800; }
        #toast.active { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<a href="https://wa.me/556993060469?text=Olá! Vim pelo site e gostaria de tirar uma dúvida." class="whatsapp-float" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

<header>
    <div class="logo">MAIS FRIO <span>CLIMATIZAÇÃO</span></div>
    <div class="btn-cart-top" onclick="toggleCart()">
        <i class="fas fa-shopping-basket"></i> <span id="cart-count">0</span>
    </div>
</header>

<section class="hero">
    <h1>Peças originais &<br>Serviços certificados.</h1>
    <div class="search-area">
        <i class="fas fa-search" style="color:#adb5bd"></i>
        <input type="text" id="searchInput" placeholder="O que você precisa hoje?" onkeyup="render()">
    </div>
    <div class="tabs">
        <div class="tab active" id="tab-all" onclick="filter('all')">Todos Itens</div>
        <div class="tab" id="tab-servico" onclick="filter('servico')">Serviços</div>
        <div class="tab" id="tab-peca" onclick="filter('peca')">Peças</div>
    </div>
</section>

<main class="container">
    <div class="grid" id="grid"></div>
</main>

<div class="overlay" id="cartOverlay" onclick="toggleCart()"></div>

<div id="sideCart">
    <div class="cart-header">
        <h2 style="font-weight: 800;">Seu Carrinho</h2>
        <i class="fas fa-times-circle" onclick="toggleCart()" style="cursor:pointer; font-size: 1.8rem; opacity: 0.2;"></i>
    </div>
    <div class="cart-items" id="cart-list"></div>
    <div class="cart-footer">
        <input type="text" id="userAddr" class="premium-input" placeholder="Endereço de Entrega">
        <select id="userPay" class="premium-input" onchange="checkPix()">
            <option value="Pix">Pix (Copia e Cola)</option>
            <option value="Cartão de Crédito/Débito">Cartão de Crédito/Débito</option>
            <option value="Dinheiro">Dinheiro</option>
        </select>
        <div id="pix-info" style="display:none; background:#f0fff4; border:2px dashed #c3e6cb; padding:15px; border-radius:15px; text-align:center; margin-bottom:15px; cursor:pointer;" onclick="copyPix()">
            <small>Clique para copiar o CNPJ Pix:</small><br><strong>59874260220</strong>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <span style="font-weight: 600; opacity: 0.5;">Total:</span>
            <span id="cart-total" style="font-weight: 800; font-size: 1.5rem;">R$ 0,00</span>
        </div>
        <button onclick="sendOrder()" class="btn-finish-whatsapp">
            <i class="fab fa-whatsapp"></i> FINALIZAR NO WHATSAPP
        </button>
    </div>
</div>

<div id="toast">✅ Item adicionado!</div>

<script>
    const inventory = [
        { name: "Instalação Ar Novo", price: 400.00, img: "Seção de Serviços.png", cat: "servico" },
        { name: "Instalação Ar Usado", price: 250.00, img: "Seção de Serviços.png", cat: "servico" },
        { name: "Manutenção Preventiva", price: 150.00, img: "ManutencaoPreventiva.png", cat: "servico" },
        { name: "Carga de Gás", price: 200.00, img: "CargadeGas.png", cat: "servico" },
        { name: "Capacitor Duplo 25+2.5UF", price: 30.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 30UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 35UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 40UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Ventilador 1.0UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 1.5UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 2.5UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 3.0UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Contactor 18A", price: 53.50, img: "Contactor18A.png", cat: "peca" },
        { name: "Contactor 25A", price: 135.00, img: "Contactor25A.png", cat: "peca" },
        { name: "Sensor Degelo AC 05k", price: 10.00, img: "SensorDegeloAC05k.png", cat: "peca" },
        { name: "Controle Ar Universal", price: 80.00, img: "ControlArUniversal.png", cat: "peca" },
        { name: "Gás R32 (13kg)", price: 1150.00, img: "gasr3213kg.png", cat: "peca" },
        { name: "Gás R-22 Lata 1kg", price: 130.00, img: "GasR-22Lata1kg.png", cat: "peca" },
        { name: "Gás R-410A Lata 800g", price: 110.00, img: "GásR-410ALata800g.png", cat: "peca" },
        { name: "Tubulação de Cobre (kg)", price: 165.00, img: "TubulaçãodeCobre(kg).png", cat: "peca" },
        { name: "Suporte L Condensadora 47cm", price: 27.00, img: "SuporteLCondensadora47cm.png", cat: "peca" },
        { name: "Válvula de Serviço 1/4", price: 36.50, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Válvula de Serviço 3/8", price: 55.99, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Válvula de Serviço 1/2", price: 62.99, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Polipex 1/4", price: 3.99, img: "Polipex.png", cat: "peca" },
        { name: "Polipex 3/8", price: 4.90, img: "Polipex.png", cat: "peca" },
        { name: "Polipex 1/2", price: 5.90, img: "Polipex.png", cat: "peca" },
        { name: "Fita Isolante 10mm x 0,5m", price: 4.99, img: "FitaIsolante18mmx10m.png", cat: "peca" },
        { name: "Fita Isolante 18mm x 10m", price: 6.90, img: "FitaIsolante18mmx10m.png", cat: "peca" },
        { name: "Fita De PVC", price: 3.99, img: "FitaDePVC.png", cat: "peca" },
        { name: "Bucha Plástica 0,8 C", price: 0.20, img: "BuchaPlástica0,8C.png", cat: "peca" },
        { name: "Bucha Plástica 0,10 C", price: 0.50, img: "BuchaPlástica0,10C.png", cat: "peca" },
        { name: "Bucha Plástica 0,12 C", price: 0.60, img: "BuchaPlástic0,12C.png", cat: "peca" },
        { name: "Parafuso Cônico", price: 0.35, img: "ParafusoCônico.png", cat: "peca" },
        { name: "Parafuso Sextavado", price: 1.50, img: "ParafusoSextavado.png", cat: "peca" }
    ];

    let cart = [];
    let currentFilter = 'all';

    function render() {
        const grid = document.getElementById('grid');
        const term = document.getElementById('searchInput').value.toLowerCase();
        grid.innerHTML = "";
        inventory.filter(i => i.name.toLowerCase().includes(term) && (currentFilter === 'all' || i.cat === currentFilter))
        .forEach(item => {
            grid.innerHTML += `
                <div class="card">
                    <div class="img-box">
                        <div class="badge ${item.cat}">${item.cat}</div>
                        <img src="${item.img}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/952/952771.png'">
                    </div>
                    <div class="card-body">
                        <h3 style="font-size:0.9rem; font-weight:700; height:40px; overflow:hidden;">${item.name}</h3>
                        <div class="price">R$ ${item.price.toFixed(2).replace('.',',')}</div>
                        <button class="btn-add" onclick="add('${item.name}', ${item.price})">ADICIONAR</button>
                    </div>
                </div>`;
        });
    }

    function filter(cat) {
        currentFilter = cat;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-'+cat).classList.add('active');
        render();
    }

    function add(n, p) {
        let x = cart.find(i => i.n === n);
        if(x) x.q++; else cart.push({n, p, q:1});
        updateUI();
        showToast();
    }

    function updateUI() {
        const list = document.getElementById('cart-list');
        let tot = 0;
        list.innerHTML = "";
        cart.forEach((item, idx) => {
            tot += item.p * item.q;
            list.innerHTML += `
                <div class="cart-item">
                    <div>
                        <div style="font-weight:700; font-size:0.9rem;">${item.n}</div>
                        <div style="color:var(--secondary); font-weight:800;">R$ ${(item.p * item.q).toFixed(2).replace('.',',')}</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:10px">
                        <button onclick="changeQty(${idx},-1)" style="width:25px; border-radius:5px; border:1px solid #ddd;">-</button>
                        <b>${item.q}</b>
                        <button onclick="changeQty(${idx},1)" style="width:25px; border-radius:5px; border:1px solid #ddd;">+</button>
                    </div>
                </div>`;
        });
        document.getElementById('cart-total').innerText = "R$ " + tot.toFixed(2).replace('.',',');
        document.getElementById('cart-count').innerText = cart.reduce((a, b) => a + b.q, 0);
    }

    function changeQty(idx, v) {
        cart[idx].q += v;
        if(cart[idx].q <= 0) cart.splice(idx, 1);
        updateUI();
    }

    function toggleCart() {
        document.getElementById('sideCart').classList.toggle('open');
        document.getElementById('cartOverlay').classList.toggle('active');
        document.body.classList.toggle('modal-open');
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 2000);
    }

    function checkPix() {
        document.getElementById('pix-info').style.display = (document.getElementById('userPay').value === 'Pix') ? 'block' : 'none';
    }

    function copyPix() {
        navigator.clipboard.writeText("59874260220");
        alert("CNPJ Copiado!");
    }

    function sendOrder() {
        const ad = document.getElementById('userAddr').value;
        if(!ad || cart.length === 0) return alert("Preencha o endereço!");
        let m = `*PEDIDO MAIS FRIO*\n\n`;
        cart.forEach(i => m += `▪️ ${i.n} (x${i.q})\n`);
        m += `\n*Pagamento:* ${document.getElementById('userPay').value}\n*Total:* ${document.getElementById('cart-total').innerText}\n*Endereço:* ${ad}`;
        window.open(`https://wa.me/556993060469?text=${encodeURIComponent(m)}`);
    }

    window.onload = render;
</script>
</body>
</html>
