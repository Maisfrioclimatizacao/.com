<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mais Frio | Elite Climatização</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0a192f;
            --secondary: #007aff;
            --accent: #28cd41;
            --bg: #f2f2f7;
            --card-bg: #ffffff;
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body.modal-open { overflow: hidden; position: fixed; width: 100%; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--primary); }

        /* --- STATUS BAR & HEADER --- */
        .status-bar { background: var(--primary); color: white; padding: 10px; text-align: center; font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; }
        
        header { 
            background: rgba(255, 255, 255, 0.75); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 18px 6%; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-weight: 800; font-size: 1.3rem; letter-spacing: -0.5px; }
        .logo span { color: var(--secondary); }
        
        .btn-cart-top { 
            background: var(--primary); color: white; padding: 12px 22px; border-radius: 50px; 
            cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 700; 
            box-shadow: 0 8px 20px rgba(10, 25, 47, 0.2); transition: 0.3s var(--spring);
        }

        /* --- HERO & BUSCA --- */
        .hero { 
            background: linear-gradient(135deg, #0a192f 0%, #061121 100%); 
            color: white; padding: 60px 6% 40px; text-align: left; 
            border-bottom-left-radius: 50px; border-bottom-right-radius: 50px;
            position: relative; overflow: hidden;
        }
        .hero::after { content: ''; position: absolute; top: -50%; right: -10%; width: 300px; height: 300px; background: var(--secondary); filter: blur(120px); opacity: 0.3; }

        .hero h1 { font-size: 1.8rem; font-weight: 800; line-height: 1.2; margin-bottom: 20px; }
        
        .search-area { 
            background: rgba(255,255,255,1); border-radius: 20px; padding: 6px 15px; 
            max-width: 600px; display: flex; align-items: center; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); margin-bottom: 30px;
        }
        .search-area input { width: 100%; padding: 14px; border: none; outline: none; font-size: 1rem; font-weight: 600; }

        /* --- CATEGORIAS --- */
        .tabs { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { 
            padding: 12px 25px; background: rgba(255,255,255,0.1); border-radius: 50px; 
            font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: 0.3s; 
            white-space: nowrap; border: 1px solid rgba(255,255,255,0.1);
        }
        .tab.active { background: white; color: var(--primary); transform: scale(1.05); }

        /* --- GRID & CARDS --- */
        .container { padding: 40px 5%; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); } }

        .card { 
            background: var(--card-bg); border-radius: 30px; overflow: hidden; 
            display: flex; flex-direction: column; transition: 0.4s var(--spring); 
            border: 1px solid rgba(0,0,0,0.02); opacity: 0; transform: translateY(30px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }
        .card.active { opacity: 1; transform: translateY(0); }
        .card:hover { transform: translateY(-12px) scale(1.02); box-shadow: 0 25px 50px rgba(0,0,0,0.08); }

        .img-box { width: 100%; height: 200px; overflow: hidden; position: relative; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s var(--spring); }
        .card:hover .img-box img { transform: scale(1.1); }
        
        /* Badge de Categoria */
        .badge { 
            position: absolute; top: 15px; left: 15px; padding: 6px 12px; 
            border-radius: 50px; font-size: 0.65rem; font-weight: 800; 
            text-transform: uppercase; z-index: 2; color: white;
        }
        .badge.peca { background: var(--secondary); }
        .badge.servico { background: var(--accent); }

        .card-body { padding: 20px; text-align: left; }
        .card h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 8px; color: #1d1d1f; height: 40px; overflow: hidden; }
        .price { font-size: 1.4rem; font-weight: 800; color: var(--primary); margin-bottom: 18px; }
        
        .btn-add { 
            width: 100%; background: #f2f2f7; padding: 15px; border-radius: 18px; 
            border: none; font-weight: 800; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-add:hover { background: var(--secondary); color: white; }

        /* --- CARRINHO (REESTILIZADO) --- */
        #sideCart { 
            position: fixed; right: -100%; top: 0; width: 95%; max-width: 450px; 
            height: 100%; background: #0a192f; color: white; z-index: 2000; 
            transition: 0.5s var(--spring); display: flex; flex-direction: column;
            box-shadow: -20px 0 60px rgba(0,0,0,0.4);
        }
        #sideCart.open { right: 0; }
        .cart-header { padding: 35px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .cart-item { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); 
            padding: 18px; border-radius: 25px; margin-bottom: 15px;
        }

        .premium-input { 
            width: 100%; padding: 18px; border-radius: 18px; border: none; 
            margin-bottom: 12px; background: rgba(255,255,255,0.08); 
            color: white; font-weight: 600; font-size: 1rem;
        }

        /* --- TOAST & FOOTER --- */
        #toast { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(120px); 
            background: var(--accent); color: white; padding: 18px 35px; border-radius: 50px; 
            z-index: 3000; transition: 0.5s var(--spring); font-weight: 800; box-shadow: 0 15px 30px rgba(40,205,65,0.3);
        }
        #toast.active { transform: translateX(-50%) translateY(0); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1900; display: none; backdrop-filter: blur(12px); }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<div class="status-bar">
    <i class="fas fa-certificate"></i> ESPECIALISTA EM INVERTER E VRF
</div>

<header>
    <div class="logo">MAIS FRIO <span>PRO</span></div>
    <div class="btn-cart-top" onclick="toggleCart()">
        <i class="fas fa-shopping-bag"></i> <span id="cart-count">0</span>
    </div>
</header>

<section class="hero">
    <h1>Peças originais &<br>Serviços certificados.</h1>
    <div class="search-area">
        <i class="fas fa-search" style="color: #666; font-size: 1.2rem;"></i>
        <input type="text" id="searchInput" placeholder="O que você procura hoje?" onkeyup="render()">
    </div>
    <div class="tabs">
        <div class="tab active" id="tab-all" onclick="filter('all')">Todos os Itens</div>
        <div class="tab" id="tab-servico" onclick="filter('servico')">Serviços Profissionais</div>
        <div class="tab" id="tab-peca" onclick="filter('peca')">Peças e Reposição</div>
    </div>
</section>

<main class="container">
    <div class="grid" id="grid"></div>
</main>

<div class="overlay" id="cartOverlay" onclick="toggleCart()"></div>

<div id="sideCart">
    <div class="cart-header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="font-weight: 800; font-size: 1.8rem;">Meu Pedido</h2>
            <i class="fas fa-times-circle" onclick="toggleCart()" style="font-size: 2rem; cursor: pointer; opacity: 0.3;"></i>
        </div>
    </div>
    
    <div class="cart-items" id="cart-list"></div>
    
    <div class="cart-footer" style="padding: 30px; background: #0e223d; border-radius: 40px 40px 0 0;">
        <input type="text" id="userAddr" class="premium-input" placeholder="Endereço de Entrega">
        
        <select id="userPay" class="premium-input" onchange="checkPix()" style="appearance: none;">
            <option value="Pix">Pagamento via Pix</option>
            <option value="Cartão">Cartão na Entrega</option>
            <option value="Dinheiro">Dinheiro</option>
        </select>

        <div id="pix-box" style="background: rgba(40, 205, 65, 0.1); border: 1px dashed var(--accent); padding: 20px; border-radius: 20px; margin-bottom: 20px; text-align: center; display: none;">
            <small style="opacity: 0.6; font-weight: 700; letter-spacing: 1px;">COPIAR CHAVE CNPJ</small><br>
            <strong style="font-size: 1.2rem; display: block; margin: 10px 0;">59874260220</strong>
            <button onclick="copyPix()" style="background: var(--accent); border: none; color: white; padding: 10px 25px; border-radius: 12px; font-weight: 800; cursor: pointer;">COPIAR AGORA</button>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <span style="opacity: 0.5; font-weight: 600;">Subtotal</span>
            <span id="cart-total" style="font-weight: 800; font-size: 1.8rem;">R$ 0,00</span>
        </div>
        
        <button class="btn-finish" onclick="sendOrder()" style="width: 100%; padding: 22px; background: var(--accent); color: white; border-radius: 22px; border: none; font-weight: 800; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 15px 35px rgba(40,205,65,0.3);">
            <i class="fab fa-whatsapp" style="font-size: 1.4rem;"></i> ENVIAR PARA O WHATSAPP
        </button>
    </div>
</div>

<div id="toast">✅ Adicionado com sucesso!</div>

<script>
    // Lista completa com Categorias
    const inventory = [
        { name: "Instalação Ar Novo", price: 400.00, img: "Seção de Serviços.png", cat: "servico" },
        { name: "Instalação Ar Usado", price: 250.00, img: "Seção de Serviços.png", cat: "servico" },
        { name: "Manutenção Preventiva", price: 150.00, img: "ManutencaoPreventiva.png", cat: "servico" },
        { name: "Carga de Gás", price: 200.00, img: "CargadeGas.png", cat: "servico" },
        { name: "Capacitor Duplo 25+2.5UF", price: 30.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 30UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 35UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 40UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Ventilador 1.0UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 1.5UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 2.5UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 3.0UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Contactor 18A", price: 53.50, img: "Contactor18A.png", cat: "peca" },
        { name: "Contactor 25A", price: 135.00, img: "Contactor25A.png", cat: "peca" },
        { name: "Sensor Degelo AC 05k", price: 10.00, img: "SensorDegeloAC05k.png", cat: "peca" },
        { name: "Controle Ar Universal", price: 80.00, img: "ControlArUniversal.png", cat: "peca" },
        { name: "Gás R32 (13kg)", price: 1150.00, img: "gasr3213kg.png", cat: "peca" },
        { name: "Gás R-22 Lata 1kg", price: 130.00, img: "GasR-22Lata1kg.png", cat: "peca" },
        { name: "Gás R-410A Lata 800g", price: 110.00, img: "GásR-410ALata800g.png", cat: "peca" },
        { name: "Tubulação de Cobre (kg)", price: 165.00, img: "TubulaçãodeCobre(kg).png", cat: "peca" },
        { name: "Suporte L Condensadora 47cm", price: 27.00, img: "SuporteLCondensadora47cm.png", cat: "peca" },
        { name: "Válvula de Serviço 1/4", price: 36.50, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Válvula de Serviço 3/8", price: 55.99, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Válvula de Serviço 1/2", price: 62.99, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Polipex 1/4", price: 3.99, img: "Polipex.png", cat: "peca" },
        { name: "Polipex 3/8", price: 4.90, img: "Polipex.png", cat: "peca" },
        { name: "Polipex 1/2", price: 5.90, img: "Polipex.png", cat: "peca" },
        { name: "Fita Isolante 10mm x 0,5m", price: 4.99, img: "FitaIsolante18mmx10m.png", cat: "peca" },
        { name: "Fita Isolante 18mm x 10m", price: 6.90, img: "FitaIsolante18mmx10m.png", cat: "peca" },
        { name: "Fita De PVC", price: 3.99, img: "FitaDePVC.png", cat: "peca" },
        { name: "Bucha Plástica 0,8 C", price: 0.20, img: "BuchaPlástica0,8C.png", cat: "peca" },
        { name: "Bucha Plástica 0,10 C", price: 0.50, img: "BuchaPlástica0,10C.png", cat: "peca" },
        { name: "Bucha Plástica 0,12 C", price: 0.60, img: "BuchaPlástic0,12C.png", cat: "peca" },
        { name: "Parafuso Cônico", price: 0.35, img: "ParafusoCônico.png", cat: "peca" },
        { name: "Parafuso Sextavado", price: 1.50, img: "ParafusoSextavado.png", cat: "peca" }
    ];

    let cart = [];
    let currentFilter = 'all';

    function render() {
        const grid = document.getElementById('grid');
        const term = document.getElementById('searchInput').value.toLowerCase();
        grid.innerHTML = "";
        
        const filtered = inventory.filter(i => 
            i.name.toLowerCase().includes(term) && 
            (currentFilter === 'all' || i.cat === currentFilter)
        );

        filtered.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = "card";
            card.innerHTML = `
                <div class="img-box">
                    <div class="badge ${item.cat}">${item.cat === 'peca' ? 'Peça' : 'Serviço'}</div>
                    <img src="${item.img}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/952/952771.png'">
                </div>
                <div class="card-body">
                    <h3>${item.name}</h3>
                    <div class="price">R$ ${item.price.toFixed(2).replace('.',',')}</div>
                    <button class="btn-add" onclick="add('${item.name}', ${item.price})">
                        <i class="fas fa-plus"></i> ADICIONAR
                    </button>
                </div>
            `;
            grid.appendChild(card);
            setTimeout(() => card.classList.add('active'), idx * 40);
        });
    }

    function filter(cat) {
        currentFilter = cat;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-'+cat).classList.add('active');
        render();
    }

    function toggleCart() {
        document.getElementById('sideCart').classList.toggle('open');
        document.getElementById('cartOverlay').classList.toggle('active');
        document.body.classList.toggle('modal-open');
        if(document.getElementById('sideCart').classList.contains('open')) update();
    }

    function add(n, p) {
        let x = cart.find(i => i.n === n);
        if(x) x.q++; else cart.push({n, p, q:1});
        update();
        const t = document.getElementById('toast');
        t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 2500);
    }

    function update() {
        let tot = 0;
        document.getElementById('cart-list').innerHTML = cart.map((i, idx) => {
            tot += i.p * i.q;
            return `
            <div class="cart-item" style="animation: itemIn 0.4s ${idx * 0.1}s var(--spring) forwards; opacity:0;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <div style="font-weight:700; font-size:0.9rem">${i.n}</div>
                        <div style="font-weight:800; color:var(--secondary); margin-top:5px;">R$ ${(i.p*i.q).toFixed(2)}</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:15px; background:rgba(255,255,255,0.05); padding:8px 15px; border-radius:50px;">
                        <button onclick="changeQty(${idx},-1)" style="background:none; border:none; color:white; font-size:1.2rem; cursor:pointer;">-</button>
                        <span style="font-weight:800" id="qty-${idx}">${i.q}</span>
                        <button onclick="changeQty(${idx},1)" style="background:none; border:none; color:white; font-size:1.2rem; cursor:pointer;">+</button>
                    </div>
                </div>
            </div>`;
        }).join('');
        document.getElementById('cart-total').innerText = "R$ " + tot.toFixed(2).replace('.',',');
        document.getElementById('cart-count').innerText = cart.reduce((a,b)=>a+b.q, 0);
    }

    function changeQty(idx, v) {
        cart[idx].q += v;
        if(cart[idx].q <= 0) cart.splice(idx, 1);
        update();
    }

    function checkPix() {
        const pay = document.getElementById('userPay').value;
        document.getElementById('pix-box').style.display = (pay === 'Pix') ? 'block' : 'none';
    }

    function copyPix() {
        navigator.clipboard.writeText("59874260220");
        alert("Chave Pix Copiada com Sucesso!");
    }

    function sendOrder() {
        const ad = document.getElementById('userAddr').value;
        const pay = document.getElementById('userPay').value;
        if(!ad || cart.length === 0) return alert("Por favor, informe o endereço e adicione itens.");
        let m = `*NOVO PEDIDO - MAIS FRIO*\n\n`;
        cart.forEach(i => m += `✅ ${i.n} (x${i.q})\n`);
        m += `\n*Pagamento:* ${pay}\n*Total:* ${document.getElementById('cart-total').innerText}\n*Endereço:* ${ad}`;
        window.open(`https://wa.me/556993060469?text=${encodeURIComponent(m)}`);
    }

    window.onload = () => { render(); checkPix(); };
</script>
</body>
</html>
