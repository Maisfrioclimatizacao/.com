<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mais Frio Climatização | Catálogo Profissional</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0a192f;
            --secondary: #007aff;
            --accent: #25d366;
            --bg: #f8fafc;
            --spring: cubic-bezier(0.3, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--primary); overflow-x: hidden; width: 100%; }
        body.modal-open { overflow: hidden; height: 100vh; }

        /* --- ANIMAÇÕES --- */
        @keyframes reveal {
            from { opacity: 0; transform: translateY(25px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes pulse-soft {
            0% { transform: translate(-50%, 0) scale(1); }
            50% { transform: translate(-50%, -6px) scale(1.03); }
            100% { transform: translate(-50%, 0) scale(1); }
        }

        /* --- HEADER & HERO --- */
        header { 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-weight: 800; font-size: 1rem; text-transform: uppercase; letter-spacing: -0.5px; }
        .logo span { color: var(--secondary); }
        
        .btn-cart-top { 
            background: var(--primary); color: white; padding: 8px 16px; border-radius: 12px; 
            cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 700;
            transition: 0.3s var(--spring);
        }
        .btn-cart-top:active { transform: scale(0.9); }

        .hero { 
            background: linear-gradient(135deg, #0a192f 0%, #112240 100%); 
            color: white; padding: 40px 6% 60px; text-align: center;
            border-bottom-left-radius: 35px; border-bottom-right-radius: 35px;
        }
        .hero h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 20px; animation: reveal 0.8s var(--spring); }
        
        .search-area { 
            background: white; border-radius: 15px; padding: 4px 15px; 
            width: 100%; max-width: 450px; display: flex; align-items: center; 
            margin: 0 auto 25px; box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            animation: reveal 1s var(--spring) backwards;
        }
        .search-area input { width: 100%; padding: 12px; border: none; outline: none; font-size: 1rem; font-weight: 600; color: var(--primary); }

        .tabs { display: flex; gap: 8px; justify-content: center; overflow-x: auto; padding: 5px; animation: reveal 1.2s var(--spring) backwards; }
        .tab { padding: 10px 20px; background: rgba(255,255,255,0.1); border-radius: 12px; font-size: 0.8rem; font-weight: 700; cursor: pointer; color: white; transition: 0.4s; border: 1px solid transparent; }
        .tab.active { background: white; color: var(--primary); transform: scale(1.1); box-shadow: 0 8px 15px rgba(0,0,0,0.2); }

        /* --- GRID & CARDS --- */
        .container { padding: 25px 4% 140px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; } }

        .card { 
            background: white; border-radius: 20px; overflow: hidden; display: flex; 
            flex-direction: column; transition: 0.4s var(--spring); box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            animation: reveal 0.7s var(--spring) backwards;
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.08); }
        
        .img-box { width: 100%; height: 140px; display: flex; align-items: center; justify-content: center; padding: 15px; position: relative; }
        .img-box img { max-width: 85%; max-height: 85%; object-fit: contain; transition: 0.5s var(--spring); }
        
        .badge { position: absolute; top: 10px; left: 10px; padding: 4px 8px; border-radius: 8px; font-size: 0.5rem; font-weight: 800; color: white; text-transform: uppercase; z-index: 5; }
        .badge.peca { background: var(--secondary); }
        .badge.servico { background: var(--accent); }

        .card-body { padding: 12px; flex: 1; display: flex; flex-direction: column; }
        .card h3 { font-size: 0.8rem; font-weight: 700; min-height: 38px; margin-bottom: 4px; }
        .price { font-size: 1.1rem; font-weight: 800; margin-bottom: 12px; }
        
        .btn-add { width: 100%; background: #f1f5f9; padding: 12px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 0.75rem; }
        .btn-add:hover { background: var(--primary); color: white; }

        /* --- BARRA BOTTOM --- */
        .cart-bar {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%) translateY(150px);
            width: 90%; max-width: 420px; background: var(--primary); color: white;
            padding: 14px 20px; border-radius: 20px; z-index: 900; transition: 0.6s var(--spring);
            display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); cursor: pointer;
        }
        .cart-bar.active { transform: translateX(-50%) translateY(0); animation: pulse-soft 3s infinite ease-in-out; }
        
        .bar-count { justify-self: start; }
        .bar-label { justify-self: center; font-weight: 800; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
        .bar-total { justify-self: end; font-weight: 800; font-size: 0.95rem; }
        .pill { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 8px; font-weight: 800; }

        /* --- CARRINHO SIDEBAR --- */
        .overlay { position: fixed; inset: 0; background: rgba(10, 25, 47, 0.4); backdrop-filter: blur(4px); z-index: 1900; opacity: 0; visibility: hidden; transition: 0.4s; }
        .overlay.active { opacity: 1; visibility: visible; }

        #sideCart { position: fixed; top: 0; right: 0; width: 88%; max-width: 380px; height: 100%; background: white; z-index: 2000; transform: translateX(100%); transition: 0.6s var(--spring); display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.1); }
        #sideCart.open { transform: translateX(0); }
        .cart-header { padding: 20px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .cart-items { flex: 1; overflow-y: auto; padding: 15px; }
        .cart-item { background: #f8fafc; padding: 12px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; animation: reveal 0.4s var(--spring) backwards; }

        .cart-footer { padding: 20px; border-top: 1px solid #f1f5f9; background: white; }
        .premium-input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #f1f5f9; margin-bottom: 10px; font-weight: 600; outline: none; transition: 0.3s; }
        .premium-input:focus { border-color: var(--secondary); }

        #addr-container { transition: 0.5s var(--spring); overflow: hidden; }
        #addr-container.hidden { height: 0; opacity: 0; margin: 0; pointer-events: none; }

        #pix-info { display:none; background:#f0fdf4; padding:15px; border-radius:12px; text-align:center; margin-bottom:12px; border: 2px dashed var(--accent); animation: reveal 0.3s var(--spring); }
        .btn-finish { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--primary); color: white; padding: 12px 25px; border-radius: 12px; z-index: 3000; transition: 0.5s var(--spring); font-weight: 700; }
        #toast.active { transform: translateX(-50%) translateY(0); }
    </style>
</head>
