<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mais Frio Climatização | Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0a192f;
            --secondary: #007aff;
            --accent: #25d366;
            --bg: #f5f5f7;
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --transition: all 0.4s var(--spring);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--primary); overflow-x: hidden; }
        body.modal-open { overflow: hidden; }

        /* --- ANIMAÇÃO DE ENTRADA --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- BOTÃO WHATSAPP FLUTUANTE --- */
        .whatsapp-float {
            position: fixed; width: 60px; height: 60px; bottom: 25px; right: 25px;
            background-color: var(--accent); color: #FFF; border-radius: 50px;
            text-align: center; font-size: 30px; box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
            z-index: 1000; display: flex; align-items: center; justify-content: center;
            text-decoration: none; transition: var(--transition);
            animation: pulse 2s infinite;
        }
        .whatsapp-float:hover { transform: scale(1.1) rotate(10deg); }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        /* --- HEADER --- */
        header { 
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 15px 6%; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 999; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-weight: 800; font-size: 1.1rem; text-transform: uppercase; }
        .logo span { color: var(--secondary); }
        
        .btn-cart-top { 
            background: var(--primary); color: white; padding: 10px 20px; border-radius: 50px; 
            cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 700;
            transition: var(--transition);
        }
        .btn-cart-top:hover { transform: scale(1.05); }

        /* --- HERO --- */
        .hero { 
            background: linear-gradient(135deg, #0a192f 0%, #061121 100%); 
            color: white; padding: 60px 6% 80px; text-align: center;
            border-bottom-left-radius: 50px; border-bottom-right-radius: 50px;
        }
        .hero h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 25px; line-height: 1.1; }
        
        .search-area { 
            background: white; border-radius: 20px; padding: 5px 20px; 
            width: 100%; max-width: 500px; display: flex; align-items: center; 
            margin: 0 auto 35px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transition: var(--transition);
        }
        .search-area:focus-within { transform: translateY(-5px); box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        .search-area input { width: 100%; padding: 12px; border: none; outline: none; font-size: 1rem; font-weight: 600; }

        .tabs { display: flex; gap: 12px; justify-content: center; overflow-x: auto; padding-bottom: 10px; }
        .tab { padding: 12px 25px; background: rgba(255,255,255,0.1); border-radius: 50px; font-size: 0.8rem; font-weight: 700; cursor: pointer; white-space: nowrap; transition: var(--transition); border: 1px solid transparent; }
        .tab.active { background: white; color: var(--primary); transform: scale(1.05); }

        /* --- GRID & CARDS --- */
        .container { padding: 40px 5%; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); } }

        .card { 
            background: white; border-radius: 25px; overflow: hidden; display: flex; 
            flex-direction: column; transition: var(--transition); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            animation: fadeInUp 0.6s ease backwards;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

        .img-box { width: 100%; height: 180px; position: relative; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .img-box img { max-width: 90%; max-height: 90%; object-fit: contain; transition: transform 0.6s var(--spring); }
        .card:hover .img-box img { transform: scale(1.15); }
        
        .badge { position: absolute; top: 12px; left: 12px; padding: 5px 12px; border-radius: 50px; font-size: 0.6rem; font-weight: 800; color: white; text-transform: uppercase; z-index: 5; }
        .badge.peca { background: var(--secondary); }
        .badge.servico { background: #28cd41; }

        .card-body { padding: 20px; text-align: center; }
        .card h3 { font-size: 0.95rem; font-weight: 700; height: 40px; margin-bottom: 10px; color: var(--primary); }
        .price { font-size: 1.3rem; font-weight: 800; color: var(--primary); margin-bottom: 15px; display: block; }
        
        .btn-add { 
            width: 100%; background: #f0f2f5; padding: 12px; border-radius: 15px; 
            border: none; font-weight: 800; cursor: pointer; transition: var(--transition); 
        }
        .btn-add:hover { background: var(--primary); color: white; transform: scale(1.03); }

        /* --- CARRINHO --- */
        .overlay { position: fixed; inset: 0; background: rgba(10, 25, 47, 0.4); backdrop-filter: blur(8px); z-index: 1900; display: none; }
        .overlay.active { display: block; }

        #sideCart { 
            position: fixed; right: -100%; top: 0; width: 90%; max-width: 400px; height: 100%; 
            background: white; z-index: 2000; transition: 0.5s var(--spring); display: flex; flex-direction: column; 
        }
        #sideCart.open { right: 0; }
        
        .cart-header { padding: 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-item { background: #f8fafc; padding: 15px; border-radius: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; animation: fadeInUp 0.4s ease; }

        .cart-footer { padding: 25px; border-top: 1px solid #eee; }
        .premium-input { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #f1f5f9; margin-bottom: 10px; font-weight: 600; outline: none; }

        .btn-finish { 
            width: 100%; padding: 18px; background: #28cd41; color: white; 
            border: none; border-radius: 15px; font-weight: 800; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; gap: 10px; transition: var(--transition);
        }
        .btn-finish:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(40,205,65,0.3); }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--primary); color: white; padding: 15px 35px; border-radius: 50px; z-index: 3000; transition: 0.5s var(--spring); font-weight: 800; }
        #toast.active { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<a href="https://wa.me/556993060469" class="whatsapp-float" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

<header>
    <div class="logo">MAIS FRIO <span>CLIMATIZAÇÃO</span></div>
    <div class="btn-cart-top" onclick="toggleCart()">
        <i class="fas fa-shopping-basket"></i> <span id="cart-count">0</span>
    </div>
</header>

<section class="hero">
    <h1>Peças & Serviços<br>Profissionais</h1>
    <div class="search-area">
        <i class="fas fa-search" style="color:#ccc"></i>
        <input type="text" id="searchInput" placeholder="O que busca?" onkeyup="render()">
    </div>
    <div class="tabs">
        <div class="tab active" id="tab-all" onclick="filter('all')">Todos</div>
        <div class="tab" id="tab-servico" onclick="filter('servico')">Serviços</div>
        <div class="tab" id="tab-peca" onclick="filter('peca')">Peças</div>
    </div>
</section>

<main class="container">
    <div class="grid" id="grid"></div>
</main>

<div class="overlay" id="cartOverlay" onclick="toggleCart()"></div>

<div id="sideCart">
    <div class="cart-header">
        <h2 style="font-weight: 800;">Carrinho</h2>
        <i class="fas fa-times" onclick="toggleCart()" style="cursor:pointer; font-size: 1.5rem;"></i>
    </div>
    <div class="cart-items" id="cart-list"></div>
    <div class="cart-footer">
        <input type="text" id="userAddr" class="premium-input" placeholder="Seu Endereço">
        <select id="userPay" class="premium-input" onchange="checkPix()">
            <option value="Pix">Pix</option>
            <option value="Cartão">Cartão</option>
            <option value="Dinheiro">Dinheiro</option>
        </select>
        <div id="pix-info" style="display:none; background:#e6ffed; padding:12px; border-radius:12px; text-align:center; margin-bottom:10px; border: 1px dashed #28cd41;" onclick="copyPix()">
            <small>CNPJ Pix (clique p/ copiar):</small><br><strong>59874260220</strong>
        </div>
        <div style="display: flex; justify-content: space-between; margin: 15px 0;">
            <span style="font-weight: 600;">Total:</span>
            <span id="cart-total" style="font-weight: 800; font-size: 1.4rem;">R$ 0,00</span>
        </div>
        <button onclick="sendOrder()" class="btn-finish">
            <i class="fab fa-whatsapp"></i> FINALIZAR PEDIDO
        </button>
    </div>
</div>

<div id="toast">✅ Adicionado!</div>

<script>
    const inventory = [
        { name: "Instalação Ar Novo", price: 400.00, img: "Seção de Serviços.png", cat: "servico" },
        { name: "Instalação Ar Usado", price: 250.00, img: "Seção de Serviços.png", cat: "servico" },
        { name: "Manutenção Preventiva", price: 150.00, img: "ManutencaoPreventiva.png", cat: "servico" },
        { name: "Carga de Gás", price: 200.00, img: "CargadeGas.png", cat: "servico" },
        { name: "Capacitor Duplo 25+2.5UF", price: 30.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 30UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Contactor 18A", price: 53.50, img: "Contactor18A.png", cat: "peca" },
        { name: "Controle Ar Universal", price: 80.00, img: "ControlArUniversal.png", cat: "peca" },
        { name: "Gás R-410A Lata 800g", price: 110.00, img: "GásR-410ALata800g.png", cat: "peca" },
        { name: "Suporte L Condensadora", price: 27.00, img: "SuporteLCondensadora47cm.png", cat: "peca" },
        { name: "Fita De PVC", price: 3.99, img: "FitaDePVC.png", cat: "peca" },
        { name: "Parafuso Sextavado", price: 1.50, img: "ParafusoSextavado.png", cat: "peca" }
    ];

    let cart = JSON.parse(localStorage.getItem('cart_mf_premium')) || [];
    let currentFilter = 'all';

    function render() {
        const grid = document.getElementById('grid');
        const term = document.getElementById('searchInput').value.toLowerCase();
        grid.innerHTML = "";
        
        const filtered = inventory.filter(i => i.name.toLowerCase().includes(term) && (currentFilter === 'all' || i.cat === currentFilter));
        
        filtered.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = "card";
            card.style.animationDelay = `${index * 0.05}s`;
            card.innerHTML = `
                <div class="img-box">
                    <div class="badge ${item.cat}">${item.cat}</div>
                    <img src="${item.img}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/952/952771.png'">
                </div>
                <div class="card-body">
                    <h3>${item.name}</h3>
                    <div class="price">R$ ${item.price.toFixed(2).replace('.',',')}</div>
                    <button class="btn-add" onclick="add('${item.name}', ${item.price})">ADICIONAR</button>
                </div>`;
            grid.appendChild(card);
        });
    }

    function filter(cat) {
        currentFilter = cat;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-'+cat).classList.add('active');
        render();
    }

    function add(n, p) {
        let x = cart.find(i => i.n === n);
        if(x) x.q++; else cart.push({n, p, q:1});
        save();
        showToast();
    }

    function save() {
        localStorage.setItem('cart_mf_premium', JSON.stringify(cart));
        updateUI();
    }

    function updateUI() {
        const list = document.getElementById('cart-list');
        let tot = 0;
        list.innerHTML = "";
        cart.forEach((item, idx) => {
            tot += item.p * item.q;
            list.innerHTML += `
                <div class="cart-item">
                    <div>
                        <div style="font-weight:700; font-size:0.85rem;">${item.n}</div>
                        <div style="color:var(--secondary); font-weight:800;">R$ ${(item.p * item.q).toFixed(2).replace('.',',')}</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:10px">
                        <button onclick="changeQty(${idx}, -1)" style="width:24px; height:24px; border-radius:6px; border:1px solid #ddd; background:white;">-</button>
                        <span style="font-weight:800;">${item.q}</span>
                        <button onclick="changeQty(${idx}, 1)" style="width:24px; height:24px; border-radius:6px; border:1px solid #ddd; background:white;">+</button>
                    </div>
                </div>`;
        });
        document.getElementById('cart-total').innerText = "R$ " + tot.toFixed(2).replace('.',',');
        document.getElementById('cart-count').innerText = cart.reduce((a, b) => a + b.q, 0);
    }

    function changeQty(idx, val) {
        cart[idx].q += val;
        if(cart[idx].q <= 0) cart.splice(idx, 1);
        save();
    }

    function toggleCart() {
        document.getElementById('sideCart').classList.toggle('open');
        document.getElementById('cartOverlay').classList.toggle('active');
        document.body.classList.toggle('modal-open');
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 2000);
    }

    function checkPix() {
        document.getElementById('pix-info').style.display = (document.getElementById('userPay').value === 'Pix') ? 'block' : 'none';
    }

    function copyPix() {
        navigator.clipboard.writeText("59874260220");
        alert("Pix Copiado!");
    }

    function sendOrder() {
        const ad = document.getElementById('userAddr').value;
        if(!ad || cart.length === 0) return alert("Preencha o endereço!");
        let m = `*PEDIDO MAIS FRIO*\n\n`;
        cart.forEach(i => m += `▪️ ${i.n} (x${i.q})\n`);
        m += `\n*Total:* ${document.getElementById('cart-total').innerText}\n*Endereço:* ${ad}`;
        window.open(`https://wa.me/556993060469?text=${encodeURIComponent(m)}`);
    }

    window.onload = () => { render(); updateUI(); };
</script>
</body>
</html>
