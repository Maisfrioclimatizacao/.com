<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mais Frio | Climatização</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0a192f;
            --secondary: #007aff;
            --accent: #28cd41;
            --bg: #f2f2f7;
            --card-bg: #ffffff;
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body.modal-open { overflow: hidden; position: fixed; width: 100%; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--primary); }

        /* --- HEADER & STATUS --- */
        .status-bar { background: var(--primary); color: white; padding: 10px; text-align: center; font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; }
        
        header { 
            background: rgba(255, 255, 255, 0.75); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 18px 6%; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-weight: 800; font-size: 1.1rem; letter-spacing: -0.5px; text-transform: uppercase; }
        .logo span { color: var(--secondary); }
        
        .btn-cart-top { 
            background: var(--primary); color: white; padding: 10px 20px; border-radius: 50px; 
            cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 700; 
            box-shadow: 0 8px 20px rgba(10, 25, 47, 0.2); transition: 0.3s;
        }

        /* --- HERO CENTRALIZADO --- */
        .hero { 
            background: linear-gradient(135deg, #0a192f 0%, #061121 100%); 
            color: white; padding: 60px 6%; text-align: center;
            border-bottom-left-radius: 50px; border-bottom-right-radius: 50px;
            display: flex; flex-direction: column; align-items: center;
        }
        .hero h1 { font-size: 2rem; font-weight: 800; margin-bottom: 25px; max-width: 600px; line-height: 1.2; }
        
        .search-area { 
            background: white; border-radius: 20px; padding: 5px 20px; 
            width: 100%; max-width: 500px; display: flex; align-items: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); margin-bottom: 30px;
        }
        .search-area input { width: 100%; padding: 14px; border: none; outline: none; font-size: 1rem; font-weight: 600; }

        .tabs { display: flex; gap: 10px; justify-content: center; width: 100%; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .tab { padding: 12px 20px; background: rgba(255,255,255,0.1); border-radius: 50px; font-size: 0.8rem; font-weight: 700; cursor: pointer; white-space: nowrap; }
        .tab.active { background: white; color: var(--primary); }

        /* --- GRID --- */
        .container { padding: 40px 5%; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); } }

        .card { background: white; border-radius: 25px; overflow: hidden; display: flex; flex-direction: column; transition: 0.4s var(--spring); opacity: 0; transform: translateY(20px); }
        .card.active { opacity: 1; transform: translateY(0); }
        .img-box { width: 100%; height: 180px; position: relative; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 10px; left: 10px; padding: 5px 10px; border-radius: 50px; font-size: 0.6rem; font-weight: 800; color: white; text-transform: uppercase; }
        .badge.peca { background: var(--secondary); }
        .badge.servico { background: var(--accent); }

        .card-body { padding: 15px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card h3 { font-size: 0.9rem; font-weight: 700; height: 35px; overflow: hidden; margin-bottom: 10px; }
        .price { font-size: 1.3rem; font-weight: 800; color: var(--primary); margin-bottom: 15px; }
        .btn-add { width: 100%; background: #f2f2f7; padding: 12px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; }

        /* --- CARRINHO --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1900; display: none; backdrop-filter: blur(8px); }
        .overlay.active { display: block; }

        #sideCart { position: fixed; right: -100%; top: 0; width: 90%; max-width: 400px; height: 100%; background: #0a192f; color: white; z-index: 2000; transition: 0.4s var(--spring); display: flex; flex-direction: column; }
        #sideCart.open { right: 0; }
        .cart-header { padding: 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
        
        .cart-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .qty-btn { background: var(--secondary); border: none; color: white; width: 25px; height: 25px; border-radius: 5px; cursor: pointer; font-weight: 800; }

        .cart-footer { padding: 25px; background: #0e223d; border-radius: 30px 30px 0 0; }
        .premium-input { width: 100%; padding: 12px; border-radius: 10px; border: none; margin-bottom: 10px; font-weight: 600; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--accent); color: white; padding: 15px 30px; border-radius: 50px; z-index: 3000; transition: 0.4s; font-weight: 800; }
        #toast.active { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="status-bar">ESPECIALISTA EM INVERTER E VRF</div>

<header>
    <div class="logo">MAIS FRIO <span>CLIMATIZAÇÃO</span></div>
    <div class="btn-cart-top" onclick="toggleCart()">
        <i class="fas fa-shopping-bag"></i> <span id="cart-count">0</span>
    </div>
</header>

<section class="hero">
    <h1>Peças originais &<br>Serviços certificados.</h1>
    <div class="search-area">
        <i class="fas fa-search" style="color:#999"></i>
        <input type="text" id="searchInput" placeholder="O que você procura?" onkeyup="render()">
    </div>
    <div class="tabs">
        <div class="tab active" id="tab-all" onclick="filter('all')">Todos</div>
        <div class="tab" id="tab-servico" onclick="filter('servico')">Serviços</div>
        <div class="tab" id="tab-peca" onclick="filter('peca')">Peças</div>
    </div>
</section>

<main class="container">
    <div class="grid" id="grid"></div>
</main>

<div class="overlay" id="cartOverlay" onclick="toggleCart()"></div>

<div id="sideCart">
    <div class="cart-header">
        <h2 style="font-weight: 800;">Meu Pedido</h2>
        <i class="fas fa-times" onclick="toggleCart()" style="cursor:pointer; font-size: 1.5rem;"></i>
    </div>
    <div class="cart-items" id="cart-list"></div>
    <div class="cart-footer">
        <input type="text" id="userAddr" class="premium-input" placeholder="Seu Endereço Completo">
        <select id="userPay" class="premium-input" onchange="checkPix()">
            <option value="Pix">Pagamento via Pix</option>
            <option value="Cartão">Cartão na Entrega</option>
            <option value="Dinheiro">Dinheiro</option>
        </select>
        <div id="pix-info" style="display:none; background:rgba(40,205,65,0.1); padding:10px; border-radius:10px; margin-bottom:10px; text-align:center; border: 1px dashed var(--accent);">
            <small>Chave CNPJ:</small><br><strong>59874260220</strong>
        </div>
        <div style="display: flex; justify-content: space-between; margin: 15px 0;">
            <span style="opacity:0.7">Total:</span>
            <span id="cart-total" style="font-weight:800; font-size:1.4rem">R$ 0,00</span>
        </div>
        <button onclick="sendOrder()" style="width:100%; padding:18px; background:var(--accent); color:white; border:none; border-radius:15px; font-weight:800; cursor:pointer;">ENVIAR PEDIDO</button>
    </div>
</div>

<div id="toast">✅ Adicionado!</div>

<script>
    const inventory = [
        { name: "Instalação Ar Novo", price: 400.00, img: "Seção de Serviços.png", cat: "servico" },
        { name: "Instalação Ar Usado", price: 250.00, img: "Seção de Serviços.png", cat: "servico" },
        { name: "Manutenção Preventiva", price: 150.00, img: "ManutencaoPreventiva.png", cat: "servico" },
        { name: "Carga de Gás", price: 200.00, img: "CargadeGas.png", cat: "servico" },
        { name: "Capacitor Duplo 25+2.5UF", price: 30.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 30UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 35UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Duplo 40UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png", cat: "peca" },
        { name: "Capacitor Ventilador 1.0UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 1.5UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 2.5UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Capacitor Ventilador 3.0UF", price: 8.50, img: "capacitordeventilador.png", cat: "peca" },
        { name: "Contactor 18A", price: 53.50, img: "Contactor18A.png", cat: "peca" },
        { name: "Contactor 25A", price: 135.00, img: "Contactor25A.png", cat: "peca" },
        { name: "Sensor Degelo AC 05k", price: 10.00, img: "SensorDegeloAC05k.png", cat: "peca" },
        { name: "Controle Ar Universal", price: 80.00, img: "ControlArUniversal.png", cat: "peca" },
        { name: "Gás R32 (13kg)", price: 1150.00, img: "gasr3213kg.png", cat: "peca" },
        { name: "Gás R-22 Lata 1kg", price: 130.00, img: "GasR-22Lata1kg.png", cat: "peca" },
        { name: "Gás R-410A Lata 800g", price: 110.00, img: "GásR-410ALata800g.png", cat: "peca" },
        { name: "Tubulação de Cobre (kg)", price: 165.00, img: "TubulaçãodeCobre(kg).png", cat: "peca" },
        { name: "Suporte L Condensadora 47cm", price: 27.00, img: "SuporteLCondensadora47cm.png", cat: "peca" },
        { name: "Válvula de Serviço 1/4", price: 36.50, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Válvula de Serviço 3/8", price: 55.99, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Válvula de Serviço 1/2", price: 62.99, img: "valvuladeservicio.png", cat: "peca" },
        { name: "Polipex 1/4", price: 3.99, img: "Polipex.png", cat: "peca" },
        { name: "Polipex 3/8", price: 4.90, img: "Polipex.png", cat: "peca" },
        { name: "Polipex 1/2", price: 5.90, img: "Polipex.png", cat: "peca" },
        { name: "Fita Isolante 10mm x 0,5m", price: 4.99, img: "FitaIsolante18mmx10m.png", cat: "peca" },
        { name: "Fita Isolante 18mm x 10m", price: 6.90, img: "FitaIsolante18mmx10m.png", cat: "peca" },
        { name: "Fita De PVC", price: 3.99, img: "FitaDePVC.png", cat: "peca" },
        { name: "Bucha Plástica 0,8 C", price: 0.20, img: "BuchaPlástica0,8C.png", cat: "peca" },
        { name: "Bucha Plástica 0,10 C", price: 0.50, img: "BuchaPlástica0,10C.png", cat: "peca" },
        { name: "Bucha Plástica 0,12 C", price: 0.60, img: "BuchaPlástic0,12C.png", cat: "peca" },
        { name: "Parafuso Cônico", price: 0.35, img: "ParafusoCônico.png", cat: "peca" },
        { name: "Parafuso Sextavado", price: 1.50, img: "ParafusoSextavado.png", cat: "peca" }
    ];

    let cart = [];
    let currentFilter = 'all';

    function render() {
        const grid = document.getElementById('grid');
        const term = document.getElementById('searchInput').value.toLowerCase();
        grid.innerHTML = "";
        const filtered = inventory.filter(i => i.name.toLowerCase().includes(term) && (currentFilter === 'all' || i.cat === currentFilter));
        filtered.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = "card";
            card.innerHTML = `
                <div class="img-box">
                    <div class="badge ${item.cat}">${item.cat}</div>
                    <img src="${item.img}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/952/952771.png'">
                </div>
                <div class="card-body">
                    <h3>${item.name}</h3>
                    <div class="price">R$ ${item.price.toFixed(2).replace('.',',')}</div>
                    <button class="btn-add" onclick="add('${item.name}', ${item.price})">ADICIONAR</button>
                </div>`;
            grid.appendChild(card);
            setTimeout(() => card.classList.add('active'), idx * 30);
        });
    }

    function filter(cat) {
        currentFilter = cat;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-'+cat).classList.add('active');
        render();
    }

    function add(n, p) {
        let x = cart.find(i => i.n === n);
        if(x) x.q++; else cart.push({n, p, q:1});
        update(); // Chama a atualização aqui!
        const t = document.getElementById('toast');
        t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 2000);
    }

    function update() {
        const list = document.getElementById('cart-list');
        let tot = 0;
        list.innerHTML = "";
        cart.forEach((item, idx) => {
            tot += item.p * item.q;
            list.innerHTML += `
                <div class="cart-item">
                    <div>
                        <div style="font-weight:700; font-size:0.8rem">${item.n}</div>
                        <div style="color:var(--secondary); font-weight:800">R$ ${(item.p * item.q).toFixed(2)}</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:10px">
                        <button class="qty-btn" onclick="changeQty(${idx}, -1)">-</button>
                        <span style="font-weight:800">${item.q}</span>
                        <button class="qty-btn" onclick="changeQty(${idx}, 1)">+</button>
                    </div>
                </div>`;
        });
        document.getElementById('cart-total').innerText = "R$ " + tot.toFixed(2).replace('.',',');
        document.getElementById('cart-count').innerText = cart.reduce((a, b) => a + b.q, 0);
    }

    function changeQty(idx, val) {
        cart[idx].q += val;
        if(cart[idx].q <= 0) cart.splice(idx, 1);
        update();
    }

    function toggleCart() {
        document.getElementById('sideCart').classList.toggle('open');
        document.getElementById('cartOverlay').classList.toggle('active');
        document.body.classList.toggle('modal-open');
    }

    function checkPix() {
        const pay = document.getElementById('userPay').value;
        document.getElementById('pix-info').style.display = (pay === 'Pix') ? 'block' : 'none';
    }

    function sendOrder() {
        const ad = document.getElementById('userAddr').value;
        const pay = document.getElementById('userPay').value;
        if(!ad || cart.length === 0) return alert("Adicione itens e seu endereço!");
        let m = `*PEDIDO MAIS FRIO CLIMATIZAÇÃO*\n\n`;
        cart.forEach(i => m += `✅ ${i.n} (x${i.q})\n`);
        m += `\n*Pagamento:* ${pay}\n*Total:* ${document.getElementById('cart-total').innerText}\n*Endereço:* ${ad}`;
        window.open(`https://wa.me/556993060469?text=${encodeURIComponent(m)}`);
    }

    window.onload = () => { render(); checkPix(); };
</script>
</body>
</html>
