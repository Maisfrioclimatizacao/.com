<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mais Frio | Premium Experience</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0a192f;
            --secondary: #007aff;
            --accent: #28cd41;
            --bg: #f5f5f7;
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body.modal-open { overflow: hidden; position: fixed; width: 100%; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--primary); }

        /* --- UI COMPONENTS --- */
        header { 
            background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 15px 6%; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .btn-cart-top { background: var(--primary); color: white; padding: 10px 20px; border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 700; transition: 0.3s; }

        .hero { background: var(--primary); color: white; padding: 50px 6% 40px; text-align: center; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; }
        .search-area { background: white; border-radius: 18px; padding: 5px 15px; max-width: 500px; margin: 20px auto; display: flex; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .search-area input { width: 100%; padding: 12px; border: none; outline: none; font-size: 16px; }

        /* --- GRID DE PRODUTOS --- */
        .container { padding: 25px 5%; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); } }

        .card { background: white; border-radius: 25px; overflow: hidden; display: flex; flex-direction: column; transition: 0.4s var(--spring); border: 1px solid rgba(0,0,0,0.03); opacity: 0; transform: translateY(20px); }
        .card.active { opacity: 1; transform: translateY(0); }
        .img-box { width: 100%; height: 160px; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover .img-box img { transform: scale(1.1); }
        .card-body { padding: 15px; text-align: center; }
        .btn-add { width: 100%; background: var(--bg); padding: 12px; border-radius: 15px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-add:active { transform: scale(0.95); background: var(--secondary); color: white; }

        /* --- CARRINHO PREMIUM (ANIMAÇÕES) --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1900; display: none; backdrop-filter: blur(8px); }
        .overlay.active { display: block; }

        #sideCart { 
            position: fixed; right: -100%; top: 0; width: 90%; max-width: 450px; 
            height: 100%; background: #0a192f; color: white; z-index: 2000; 
            transition: 0.5s var(--spring); display: flex; flex-direction: column;
            box-shadow: -20px 0 50px rgba(0,0,0,0.3);
        }
        #sideCart.open { right: 0; }

        .cart-header { padding: 30px; display: flex; justify-content: space-between; align-items: center; }
        .cart-items { flex: 1; overflow-y: auto; padding: 0 20px; }
        
        /* Animação de entrada dos itens no carrinho */
        .cart-item { 
            background: white; color: var(--primary); padding: 15px; border-radius: 22px; 
            margin-bottom: 12px; display: flex; align-items: center; gap: 15px;
            animation: itemIn 0.5s var(--spring) forwards; opacity: 0; transform: translateX(30px);
        }
        @keyframes itemIn { to { opacity: 1; transform: translateX(0); } }

        .cart-item img { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; }
        
        .qty-controls { display: flex; align-items: center; gap: 12px; background: #f2f2f7; padding: 5px 12px; border-radius: 50px; }
        .qty-controls button { border: none; background: none; font-size: 1.2rem; cursor: pointer; font-weight: 800; color: var(--secondary); width: 25px; }
        .qty-num { font-weight: 800; min-width: 20px; text-align: center; transition: 0.2s; }
        .qty-num.bump { transform: scale(1.4); color: var(--secondary); }

        .cart-footer { padding: 30px; background: #0e223d; border-radius: 40px 40px 0 0; }
        .pix-box { 
            background: rgba(40, 205, 65, 0.1); border: 1px dashed var(--accent); 
            padding: 20px; border-radius: 20px; margin: 15px 0; text-align: center;
        }
        
        /* Botão Finalizar Pulsante */
        .btn-finish { 
            width: 100%; padding: 20px; background: var(--accent); color: white; 
            border-radius: 20px; border: none; font-weight: 800; font-size: 1rem; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 10px 20px rgba(40,205,65,0.3);
            animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(40, 205, 65, 0.7); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 15px rgba(40, 205, 65, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(40, 205, 65, 0); }
        }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--accent); color: white; padding: 15px 30px; border-radius: 50px; z-index: 3000; transition: 0.4s var(--spring); font-weight: 700; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        #toast.active { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<header>
    <div class="logo">MAIS FRIO <span>PRO</span></div>
    <div class="btn-cart-top" onclick="toggleCart()">
        <i class="fas fa-shopping-bag"></i> <span id="cart-count">0</span>
    </div>
</header>

<section class="hero">
    <h1>Excelência em Climatização</h1>
    <div class="search-area">
        <i class="fas fa-search" style="color:#ccc"></i>
        <input type="text" id="searchInput" placeholder="O que seu ar condicionado precisa?" onkeyup="render()">
    </div>
</section>

<main class="container">
    <div class="grid" id="grid"></div>
</main>

<div class="overlay" id="cartOverlay" onclick="toggleCart()"></div>

<div id="sideCart">
    <div class="cart-header">
        <h2 style="font-weight: 800; font-size: 1.5rem;">Meu Pedido</h2>
        <i class="fas fa-times-circle" onclick="toggleCart()" style="font-size: 1.8rem; cursor: pointer; opacity: 0.5;"></i>
    </div>
    
    <div class="cart-items" id="cart-list">
        </div>
    
    <div class="cart-footer">
        <input type="text" id="userAddr" class="premium-input" placeholder="Onde será a entrega/serviço?" style="width: 100%; padding: 15px; border-radius: 15px; border: none; margin-bottom: 10px;">
        
        <div class="pix-box">
            <small style="opacity: 0.7; font-weight: 700;">CHAVE PIX CNPJ</small><br>
            <strong style="font-size: 1.2rem;">59874260220</strong><br>
            <button onclick="copyPix()" id="btnCopy" style="margin-top: 10px; background: var(--accent); border: none; color: white; padding: 5px 15px; border-radius: 10px; font-weight: 700;">COPIAR CHAVE</button>
        </div>

        <div style="display: flex; justify-content: space-between; margin: 15px 0;">
            <span style="opacity: 0.7;">Total Geral:</span>
            <span id="cart-total" style="font-weight: 800; font-size: 1.6rem;">R$ 0,00</span>
        </div>
        
        <button class="btn-finish" onclick="sendOrder()">
            <i class="fab fa-whatsapp"></i> FINALIZAR NO WHATSAPP
        </button>
    </div>
</div>

<div id="toast">✅ Chave Pix Copiada!</div>

<script>
    const inventory = [
        { name: "Instalação Ar Novo", price: 400.00, img: "Seção de Serviços.png" },
        { name: "Instalação Ar Usado", price: 250.00, img: "Seção de Serviços.png" },
        { name: "Manutenção Preventiva", price: 150.00, img: "ManutencaoPreventiva.png" },
        { name: "Carga de Gás", price: 200.00, img: "CargadeGas.png" },
        { name: "Capacitor Duplo 25+2.5UF", price: 30.00, img: "CapacitorDuplo25+2.5UF.png" },
        { name: "Capacitor Duplo 30UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png" },
        { name: "Capacitor Duplo 35UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png" },
        { name: "Capacitor Duplo 40UF", price: 36.00, img: "CapacitorDuplo25+2.5UF.png" }
    ];

    let cart = [];

    function render() {
        const grid = document.getElementById('grid');
        const term = document.getElementById('searchInput').value.toLowerCase();
        grid.innerHTML = "";
        
        inventory.filter(i => i.name.toLowerCase().includes(term)).forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = "card";
            card.innerHTML = `
                <div class="img-box"><img src="${item.img}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/952/952771.png'"></div>
                <div class="card-body">
                    <h3 style="font-size:0.9rem; margin-bottom:10px;">${item.name}</h3>
                    <div style="font-weight:800; color:var(--secondary); margin-bottom:12px;">R$ ${item.price.toFixed(2)}</div>
                    <button class="btn-add" onclick="add('${item.name}', ${item.price}, '${item.img}')">ADICIONAR</button>
                </div>
            `;
            grid.appendChild(card);
            setTimeout(() => card.classList.add('active'), idx * 50);
        });
    }

    function toggleCart() {
        const c = document.getElementById('sideCart');
        const o = document.getElementById('cartOverlay');
        c.classList.toggle('open');
        o.classList.toggle('active');
        document.body.classList.toggle('modal-open');
        if(c.classList.contains('open')) update(); // Re-renderiza para disparar animações
    }

    function add(n, p, img) {
        let x = cart.find(i => i.n === n);
        if(x) x.q++; else cart.push({n, p, q:1, img});
        update();
        document.getElementById('cart-count').innerText = cart.reduce((a,b)=>a+b.q, 0);
    }

    function update() {
        let tot = 0;
        const list = document.getElementById('cart-list');
        list.innerHTML = cart.map((i, idx) => {
            tot += i.p * i.q;
            return `
            <div class="cart-item" style="animation-delay: ${idx * 0.1}s">
                <img src="${i.img}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/952/952771.png'">
                <div style="flex:1">
                    <div style="font-weight:700; font-size:0.85rem">${i.n}</div>
                    <div style="font-weight:800; color:var(--secondary)">R$ ${i.p.toFixed(2)}</div>
                </div>
                <div class="qty-controls">
                    <button onclick="changeQty(${idx},-1)">-</button>
                    <span class="qty-num" id="qty-${idx}">${i.q}</span>
                    <button onclick="changeQty(${idx},1)">+</button>
                </div>
            </div>`;
        }).join('');
        document.getElementById('cart-total').innerText = "R$ " + tot.toFixed(2).replace('.',',');
    }

    function changeQty(idx, v) {
        const el = document.getElementById(`qty-${idx}`);
        el.classList.add('bump');
        setTimeout(() => el.classList.remove('bump'), 200);

        cart[idx].q += v;
        if(cart[idx].q <= 0) {
            cart.splice(idx, 1);
        }
        update();
        document.getElementById('cart-count').innerText = cart.reduce((a,b)=>a+b.q, 0);
    }

    function copyPix() {
        navigator.clipboard.writeText("59874260220");
        const t = document.getElementById('toast');
        t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 2500);
    }

    function sendOrder() {
        const ad = document.getElementById('userAddr').value;
        if(!ad || cart.length === 0) return alert("Preencha o endereço e adicione itens!");
        let m = `*NOVO PEDIDO - MAIS FRIO*\n\n`;
        cart.forEach(i => m += `✅ ${i.n} (x${i.q})\n`);
        m += `\n*Total:* ${document.getElementById('cart-total').innerText}\n*Endereço:* ${ad}`;
        window.open(`https://wa.me/556993060469?text=${encodeURIComponent(m)}`);
    }

    window.onload = render;
</script>
</body>
</html>
